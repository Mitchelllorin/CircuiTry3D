name: Cleanup Merged Branches

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — list branches that would be deleted without actually deleting them'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete branches merged into main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dryRun = context.payload.inputs?.dry_run !== 'false';
            const protectedBranches = new Set(['main', 'master', 'develop']);

            core.info(`Mode: ${dryRun ? 'DRY RUN (no branches will be deleted)' : 'LIVE (branches will be deleted)'}`);

            // Collect all remote branches
            const allBranches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            let toDelete = [];
            for (const branch of allBranches) {
              const name = branch.name;
              if (protectedBranches.has(name)) continue;

              // A branch is merged if its tip is reachable from main.
              // behind_by == 0 means the branch has no commits that main doesn't have.
              try {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: name,
                  head: 'main',
                });
                if (comparison.behind_by === 0) {
                  toDelete.push(name);
                }
              } catch (err) {
                core.warning(`Could not compare branch '${name}': ${err.message}`);
              }
            }

            core.info(`\nFound ${toDelete.length} merged branch(es):`);
            for (const name of toDelete) {
              core.info(`  - ${name}`);
            }

            if (dryRun) {
              core.notice(`Dry run complete. ${toDelete.length} branch(es) would be deleted. Set dry_run=false to delete them.`);
              return;
            }

            let deleted = 0;
            let alreadyGone = 0;
            let failed = 0;
            for (const name of toDelete) {
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${name}` });
                core.info(`Deleted: ${name}`);
                deleted++;
              } catch (err) {
                const message = err.response?.data?.message ?? err.message ?? '';
                if (err.status === 422 && message.includes('Reference does not exist')) {
                  core.info(`Already gone: ${name}`);
                  alreadyGone++;
                } else {
                  core.error(`Failed to delete '${name}': [${err.status}] ${message}`);
                  failed++;
                }
              }
            }

            const summary = `Deleted ${deleted} branch(es), ${alreadyGone} already gone, ${failed} failure(s).`;
            core.notice(summary);
            if (failed > 0) {
              core.setFailed(summary);
            }
