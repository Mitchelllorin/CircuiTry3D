name: Delete Merged Branch

on:
  pull_request:
    types:
      - closed

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete head branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.pull_request.head.ref;

            // Never delete the default/protected branches
            const protectedBranches = ['main', 'master', 'develop'];
            if (protectedBranches.includes(branch)) {
              core.notice(`Skipping deletion of protected branch: ${branch}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              core.notice(`Deleted branch: ${branch}`);
            } catch (err) {
              const message = err.response?.data?.message ?? err.message ?? '';
              // GitHub returns 422 with "Reference does not exist" when the branch was already deleted
              if (err.status === 422 && message.includes('Reference does not exist')) {
                core.notice(`Branch already deleted: ${branch}`);
              } else {
                core.error(`Failed to delete branch '${branch}': [${err.status}] ${message}`);
                throw err;
              }
            }