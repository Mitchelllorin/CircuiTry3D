name: Setup Branch Protection

# Run this workflow once (manually) to apply branch-protection rules to `main`.
# It calls the GitHub REST API directly using the built-in GITHUB_TOKEN, which
# requires the token to have `administration:write` permission.
#
# How to run:
#   1. Go to Actions → "Setup Branch Protection" → Run workflow → Run workflow
#
# What it does:
#   - Requires at least 1 approving pull-request review before merging
#   - Enforces CODEOWNERS reviews (see .github/CODEOWNERS)
#   - Requires the "Build & Test" CI status check to pass (ci.yml)
#   - Blocks force-pushes to main
#   - Blocks deletion of the main branch

on:
  workflow_dispatch:

jobs:
  protect:
    name: Apply branch-protection rules to main
    runs-on: ubuntu-latest
    permissions:
      # Required to update branch protection rules via the API
      administration: write
      contents: read

    steps:
      - name: Apply branch protection rules
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const branch = 'main';

            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,

              // ── Pull-request reviews ──────────────────────────────────────
              required_pull_request_reviews: {
                dismiss_stale_reviews:            true,
                require_code_owner_reviews:       true,
                required_approving_review_count:  1,
              },

              // ── Required status checks ────────────────────────────────────
              // 'Build & Test' is the job name defined in .github/workflows/ci.yml
              required_status_checks: {
                strict:   true,
                contexts: ['Build & Test'],
              },

              // ── Other protections ─────────────────────────────────────────
              enforce_admins:            false,
              restrictions:              null,
              allow_force_pushes:        false,
              allow_deletions:           false,
              block_creations:           false,
              required_conversation_resolution: true,
            });

            core.notice(`Branch protection rules successfully applied to '${branch}'.`);

      - name: Show applied settings
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getBranchProtection({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              branch: 'main',
            });

            const prr = data.required_pull_request_reviews;
            const rsc = data.required_status_checks;

            core.summary
              .addHeading('Branch protection applied to `main`')
              .addTable([
                [{ data: 'Setting',  header: true }, { data: 'Value', header: true }],
                ['Required reviewers',                String(prr?.required_approving_review_count ?? 0)],
                ['Dismiss stale reviews',             String(prr?.dismiss_stale_reviews ?? false)],
                ['Require CODEOWNERS review',         String(prr?.require_code_owner_reviews ?? false)],
                ['Required status checks',            (rsc?.contexts ?? []).join(', ') || 'none'],
                ['Strict (branch must be up-to-date)', String(rsc?.strict ?? false)],
                ['Allow force pushes',                String(data.allow_force_pushes?.enabled ?? false)],
                ['Allow deletions',                   String(data.allow_deletions?.enabled ?? false)],
                ['Require conversation resolution',   String(data.required_conversation_resolution?.enabled ?? false)],
              ])
              .write();
