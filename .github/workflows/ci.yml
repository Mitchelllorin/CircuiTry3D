name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # Skip CI on screenshot-regeneration commits pushed by the bot — those commits
    # only update image assets and contain no code changes that need validation.
    # Pull request runs are never skipped.
    if: github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip screenshots]')
    permissions:
      contents: read

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
