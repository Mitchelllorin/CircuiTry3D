name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      # Upload the production build as a downloadable artifact on pull requests
      # so the team can review the exact build before merging.
      - name: Upload preview build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: dist/
          retention-days: 7

      # Post a comment on the PR with a direct link to the preview artifact.
      - name: Comment preview link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactName = `preview-build-pr-${context.payload.pull_request.number}-${context.sha}`;
            const body = [
              '## 🔍 Preview build ready',
              '',
              `A production build of this PR has been uploaded as a GitHub Actions artifact.`,
              '',
              `**[📦 Download preview artifact →](${runUrl})**`,
              '',
              `Artifact name: \`${artifactName}\``,
              '',
              `To preview locally:`,
              '```',
              '# Download and unzip the artifact, then serve it:',
              'npx serve dist',
              '```',
              '',
              `> This comment is updated on every push to the PR branch.`,
            ].join('\n');

            // Find an existing bot comment to update instead of creating a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const botComment = comments.find(
              c => c.user?.type === 'Bot' && c.body?.includes('🔍 Preview build ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
