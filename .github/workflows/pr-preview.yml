# Builds and deploys a live preview of every PR to GitHub Pages, then posts
# the URL as a PR comment.  Cleans up the preview when the PR is closed.
#
# Preview URL: https://<owner>.github.io/CircuiTry3D/pr-preview/pr-<number>/
#
# Required repo settings (one-time, done in GitHub UI):
#   Settings → Pages → Source: "Deploy from a branch" → branch: gh-pages, folder: / (root)
#   Settings → Actions → General → Workflow permissions: "Read and write permissions"

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write        # push to gh-pages branch
  pull-requests: write   # post / update the preview comment

# Cancel any in-progress preview build for the same PR so the latest push wins.
concurrency:
  group: github-pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.19.0'
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  # ── Deploy preview ────────────────────────────────────────────────────────
  deploy-preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Upsert PR preview button comment
        uses: actions/github-script@v7
        env:
          MARKER: "<!-- pr-preview-button -->"
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = process.env.MARKER;
            const MAX_ATTEMPTS = Number(process.env.PREVIEW_POLL_ATTEMPTS || "18");
            const POLL_INTERVAL_MS = Number(process.env.PREVIEW_POLL_INTERVAL_MS || "10000");
            const TOTAL_WAIT_SECONDS = (MAX_ATTEMPTS * POLL_INTERVAL_MS) / 1000;
            const ALLOWED_HOST_SUFFIXES = ["vercel.app", "circuitry3d.net", "github.io"];
            const isAllowedPreviewUrl = (value) => {
              try {
                const parsed = new URL(value);
                if (parsed.protocol !== "https:") return false;
                return ALLOWED_HOST_SUFFIXES.some((suffix) =>
                  parsed.hostname === suffix || parsed.hostname.endsWith(`.${suffix}`)
                );
              } catch {
                return false;
              }
            };

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            // Poll up to 3 minutes (18 x 10s) because external preview deployments
            // can appear shortly after this workflow starts.
            let previewUrl = null;

      - name: Compute preview settings
        id: pages
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY_OWNER}"
          base_path="${PAGES_BASE_PATH:-/$repo_name/}"
          case "$base_path" in
            /*) ;;
            *) base_path="/$base_path" ;;
          esac
          case "$base_path" in
            */) ;;
            *) base_path="$base_path/" ;;
          esac
          origin="${PAGES_ORIGIN:-https://$owner_name.github.io}"
          origin="${origin%/}"
          preview_dir="pr-preview/pr-${PR_NUMBER}"
          preview_base_path="${base_path}${preview_dir}/"
          echo "origin=$origin" >> "$GITHUB_OUTPUT"
          echo "preview_dir=$preview_dir" >> "$GITHUB_OUTPUT"
          echo "preview_base_path=$preview_base_path" >> "$GITHUB_OUTPUT"
          echo "preview_url=${origin}${preview_base_path}" >> "$GITHUB_OUTPUT"

      - name: Build (PR-scoped base path)
        run: npm run build
        env:
          VITE_BASE_PATH: /CircuiTry3D/pr-preview/pr-${{ env.PR_NUMBER }}/

      - name: Deploy preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: pr-preview/pr-${{ env.PR_NUMBER }}
          # Keep the rest of the gh-pages tree intact (production root + other PRs).
          clean: false
          single-commit: false

      - name: Find existing preview comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ env.PR_NUMBER }}
          comment-author: github-actions[bot]
          body-includes: '<!-- circuitry3d-pr-preview -->'

      - name: Post / update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ env.PR_NUMBER }}
          edit-mode: replace
          body: |
            <!-- circuitry3d-pr-preview -->
            ## 🔍 PR Preview deployed

            | | |
            |---|---|
            | **Preview URL** | https://mitchelllorin.github.io/CircuiTry3D/pr-preview/pr-${{ env.PR_NUMBER }}/ |
            | **Commit** | ${{ github.event.pull_request.head.sha }} |

            > Preview updates automatically on every push to this PR.

  # ── Clean up preview on close ─────────────────────────────────────────────
  cleanup-preview:
    name: Remove Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Delete PR preview folder
        run: |
          PREVIEW_DIR="pr-preview/pr-${{ env.PR_NUMBER }}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -r "$PREVIEW_DIR"
            git commit -m "chore: remove preview for PR ${{ env.PR_NUMBER }}"
            git push
          else
            echo "No preview directory found for PR ${{ env.PR_NUMBER }}, nothing to clean up."
          fi

      - name: Find existing preview comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ env.PR_NUMBER }}
          comment-author: github-actions[bot]
          body-includes: '<!-- circuitry3d-pr-preview -->'

      - name: Update comment to mark preview as removed
        if: steps.find-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- circuitry3d-pr-preview -->
            ## ~~🔍 PR Preview deployed~~

            Preview has been removed — this PR is closed.
