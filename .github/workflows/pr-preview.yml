# How PR preview deployments work:
# 1. On every PR push (opened / synchronize / reopened):
#    a. The app is built with a unique base path for this PR's preview URL.
#    b. `rossjrw/pr-preview-action` pushes the build to the `gh-pages`
#       branch under `pr-preview/pr-<number>/`.
#    c. The action posts a comment on the PR with the live preview URL:
#         https://mitchelllorin.github.io/CircuiTry3D/pr-preview/pr-<number>/
# 2. On PR close / merge the action automatically removes the subdirectory
#    so stale previews don't accumulate on the gh-pages branch.
#
# No extra repository secrets are required — GITHUB_TOKEN is sufficient.

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

# One preview deployment per PR at a time; cancel any in-progress build
# for the same PR so the latest push always wins.
concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip the build entirely when the PR is being closed / merged —
      # the preview action only needs to remove the subdirectory.
      - name: Set up Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build
        env:
          # Each PR gets its own base path so assets resolve correctly
          # at the preview subdirectory URL.
          PAGES_BASE_PATH: /CircuiTry3D/pr-preview/pr-${{ github.event.pull_request.number }}/

      # Deploys the build to gh-pages/pr-preview/pr-<number>/ and posts a
      # comment on the PR.  On `closed` events it removes the directory instead.
      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          token: ${{ secrets.GITHUB_TOKEN }}
