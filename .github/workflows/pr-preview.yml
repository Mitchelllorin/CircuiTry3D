name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: github-pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    name: Deploy preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.id == github.event.repository.id && github.event.pull_request.head.repo.owner.id == github.event.repository.owner.id

    env:
      # 18 * 10000ms = 180000ms (180s) total wait for external preview providers to report back.
      PREVIEW_POLL_ATTEMPTS: '18'
      PREVIEW_POLL_INTERVAL_MS: '10000'

    steps:
      - name: Upsert PR preview button comment
        uses: actions/github-script@v7
        env:
          MARKER: "<!-- pr-preview-button -->"
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = process.env.MARKER;
            const MAX_ATTEMPTS = Number(process.env.PREVIEW_POLL_ATTEMPTS || "18");
            const POLL_INTERVAL_MS = Number(process.env.PREVIEW_POLL_INTERVAL_MS || "10000");
            const TOTAL_WAIT_SECONDS = (MAX_ATTEMPTS * POLL_INTERVAL_MS) / 1000;
            const ALLOWED_HOST_SUFFIXES = ["vercel.app", "circuitry3d.net", "github.io"];
            const isAllowedPreviewUrl = (value) => {
              try {
                const parsed = new URL(value);
                if (parsed.protocol !== "https:") return false;
                return ALLOWED_HOST_SUFFIXES.some((suffix) =>
                  parsed.hostname === suffix || parsed.hostname.endsWith(`.${suffix}`)
                );
              } catch {
                return false;
              }
            };

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            // Poll up to 3 minutes (18 x 10s) because external preview deployments
            // can appear shortly after this workflow starts.
            let previewUrl = null;

      - name: Compute preview settings
        id: pages
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY_OWNER}"
          base_path="${PAGES_BASE_PATH:-/$repo_name/}"
          case "$base_path" in
            /*) ;;
            *) base_path="/$base_path" ;;
          esac
          case "$base_path" in
            */) ;;
            *) base_path="$base_path/" ;;
          esac
          origin="${PAGES_ORIGIN:-https://$owner_name.github.io}"
          origin="${origin%/}"
          preview_dir="pr-preview/pr-${PR_NUMBER}"
          preview_base_path="${base_path}${preview_dir}/"
          echo "origin=$origin" >> "$GITHUB_OUTPUT"
          echo "preview_dir=$preview_dir" >> "$GITHUB_OUTPUT"
          echo "preview_base_path=$preview_base_path" >> "$GITHUB_OUTPUT"
          echo "preview_url=${origin}${preview_base_path}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.preview_base_path }}
          VITE_DEMO_MODE: 'true'
          VITE_OWNER_KEY: ${{ secrets.VITE_OWNER_KEY }}
          VITE_OWNER_KEY_HASH: ${{ secrets.VITE_OWNER_KEY_HASH }}
        run: npm run build

      - name: Publish preview to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAGES_BRANCH: gh-pages
          PREVIEW_DIR: ${{ steps.pages.outputs.preview_dir }}
          REPOSITORY_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          SOURCE_DIST: ${{ github.workspace }}/dist
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          workdir="$(mktemp -d)"
          if git ls-remote --exit-code --heads "$REPOSITORY_URL" "$GH_PAGES_BRANCH" >/dev/null 2>&1; then
            git clone --branch "$GH_PAGES_BRANCH" --single-branch "$REPOSITORY_URL" "$workdir"
          else
            git clone "$REPOSITORY_URL" "$workdir"
            cd "$workdir"
            git checkout --orphan "$GH_PAGES_BRANCH"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          cd "$workdir"
          mkdir -p "$PREVIEW_DIR"
          rsync -a --delete "$SOURCE_DIST"/ "$PREVIEW_DIR"/
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "Preview already up to date."
            exit 0
          fi

          git commit -m "Deploy preview for PR #${{ github.event.pull_request.number }}"
          git push origin "$GH_PAGES_BRANCH"

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.pages.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- github-pages-preview -->';
            const body = `${marker}\n🚀 Preview ready: ${process.env.PREVIEW_URL}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    name: Remove preview
    runs-on: ubuntu-latest

    steps:
      - name: Remove preview from gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAGES_BRANCH: gh-pages
          PREVIEW_DIR: pr-preview/pr-${{ github.event.pull_request.number }}
          REPOSITORY_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --heads "$REPOSITORY_URL" "$GH_PAGES_BRANCH" >/dev/null 2>&1; then
            echo "gh-pages branch does not exist yet."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          workdir="$(mktemp -d)"
          git clone --branch "$GH_PAGES_BRANCH" --single-branch "$REPOSITORY_URL" "$workdir"
          cd "$workdir"

          if [ ! -d "$PREVIEW_DIR" ]; then
            echo "Preview directory already absent."
            exit 0
          fi

          rm -rf "$PREVIEW_DIR"
          git add -A
          if git diff --cached --quiet; then
            echo "No preview cleanup needed."
            exit 0
          fi

          git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
          git push origin "$GH_PAGES_BRANCH"

      - name: Update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- github-pages-preview -->';
            const body = `${marker}\n🧹 Preview removed because this pull request was closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (!existing) {
              return;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
