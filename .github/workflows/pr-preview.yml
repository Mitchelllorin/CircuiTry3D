name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

# Cancel any in-progress preview build for the same PR so the latest push wins.
concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.19.0'
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  # ── Deploy preview ────────────────────────────────────────────────────────
  deploy-preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = process.env.MARKER;
            const MAX_ATTEMPTS = Number(process.env.PREVIEW_POLL_ATTEMPTS || "18");
            const POLL_INTERVAL_MS = Number(process.env.PREVIEW_POLL_INTERVAL_MS || "10000");
            const TOTAL_WAIT_SECONDS = (MAX_ATTEMPTS * POLL_INTERVAL_MS) / 1000;
            const ALLOWED_HOST_SUFFIXES = ["vercel.app", "circuitry3d.net", "github.io"];
            const isAllowedPreviewUrl = (value) => {
              try {
                const parsed = new URL(value);
                if (parsed.protocol !== "https:") return false;
                return ALLOWED_HOST_SUFFIXES.some((suffix) =>
                  parsed.hostname === suffix || parsed.hostname.endsWith(`.${suffix}`)
                );
              } catch {
                return false;
              }
            };

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          OUTPUT=$(npx vercel --token ${{ secrets.VERCEL_TOKEN }} --yes --json 2>/dev/null || npx vercel --token ${{ secrets.VERCEL_TOKEN }} --yes 2>&1)
          DEPLOY_URL=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))" 2>/dev/null || echo "$OUTPUT" | grep -E '^https://' | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Portrait screenshots ──────────────────────────────────────────────
      # CircuiTry3D was designed in portrait orientation. Capture portrait
      # phone screenshots (412×915 px) from the local preview so the owner
      # can evaluate every PR in the canonical review viewport.

      - name: Install Playwright browser
        if: github.event.action != 'closed'
        run: npx playwright install chromium --with-deps

      - name: Start preview server
        if: github.event.action != 'closed'
        run: npm run preview &

      - name: Wait for preview server
        if: github.event.action != 'closed'
        run: |
          echo "Waiting for preview server on port 4173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173 >/dev/null 2>&1; then
              echo "Server is ready."
              exit 0
            fi
            echo "  attempt $i/30…"
            sleep 2
          done
          echo "::error::Preview server did not become ready after 60 seconds."
          exit 1

      - name: Capture portrait screenshots
        if: github.event.action != 'closed'
        run: npm run capture-pr-portrait:local

      - name: Upload portrait screenshots
        if: github.event.action != 'closed'
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-portrait-preview
          path: pr-portrait-screenshots/
          if-no-files-found: warn
