name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

# One preview deployment per PR at a time; cancel any in-progress build
# for the same PR so the latest push always wins.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    name: Deploy Preview
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (preview mode)
        env:
          VITE_DEMO_MODE: 'true'
          VITE_OWNER_KEY_HASH: ${{ secrets.OWNER_KEY_HASH }}
        # Deploy sub-path: /pr-preview/pr-<number>/
        run: npm run build -- --base=/pr-preview/pr-${{ env.PR_NUMBER }}/

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy
          token: ${{ secrets.GITHUB_TOKEN }}

  remove-preview:
    if: github.event.action == 'closed'
    name: Remove Preview
    runs-on: ubuntu-latest

    steps:
      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
          token: ${{ secrets.GITHUB_TOKEN }}
