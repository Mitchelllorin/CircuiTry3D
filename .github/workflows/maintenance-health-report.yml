name: Maintenance Health Report

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert weekly health report issue
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- maintenance-health-report -->';
            const title = '🛠️ Weekly maintenance health report';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const trackedWorkflowNames = [
              'CI',
              'Deploy to GitHub Pages',
              'Build AAB',
              'Generate Play Store Screenshots',
              'Generate Component Showcase Screenshots',
              'Generate Promo Footage'
            ];

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100
            });

            const getRunSummary = async (workflowName) => {
              const workflow = workflows.find((w) => w.name === workflowName);
              if (!workflow) {
                return { workflowName, status: 'missing', conclusion: 'missing', htmlUrl: null, updatedAt: null };
              }

              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: 1
              });

              const run = data.workflow_runs[0];
              if (!run) {
                return { workflowName, status: 'no-runs', conclusion: 'no-runs', htmlUrl: null, updatedAt: null };
              }

              return {
                workflowName,
                status: run.status || 'unknown',
                conclusion: run.conclusion || 'pending',
                htmlUrl: run.html_url || null,
                updatedAt: run.updated_at || run.created_at || null
              };
            };

            const summaries = [];
            for (const name of trackedWorkflowNames) {
              summaries.push(await getRunSummary(name));
            }

            const indicator = (status, conclusion) => {
              if (status === 'missing' || status === 'no-runs') return '⚪';
              if (status !== 'completed') return '🟡';
              if (conclusion === 'success') return '🟢';
              return '🔴';
            };

            const formatDate = (value) => {
              if (!value) return '—';
              const parsed = new Date(value);
              return Number.isNaN(parsed.getTime()) ? '—' : parsed.toISOString();
            };

            const rows = summaries.map((item) => {
              const icon = indicator(item.status, item.conclusion);
              const wfCell = item.htmlUrl ? `[${item.workflowName}](${item.htmlUrl})` : item.workflowName;
              return `| ${icon} | ${wfCell} | ${item.status} | ${item.conclusion} | ${formatDate(item.updatedAt)} |`;
            });

            const body = [
              marker,
              '## Weekly automation status',
              '',
              `Generated: ${new Date().toISOString()}`,
              '',
              '| Health | Workflow | Status | Conclusion | Last Updated |',
              '|---|---|---|---|---|',
              ...rows,
              '',
              '_This issue is automatically updated each week._'
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find((issue) => issue.body && issue.body.includes(marker));

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body
              });
              core.info(`Updated health report issue #${existing.number}.`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
              core.info(`Created health report issue #${created.data.number}.`);
            }
