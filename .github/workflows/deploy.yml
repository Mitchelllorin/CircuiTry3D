# Deploys the production build to GitHub Pages whenever a commit lands on main.
#
# One-time repo setup required (done once in GitHub UI, not repeated by CI):
#   Settings → Pages → Source: "Deploy from a branch" → branch: gh-pages, folder: / (root)
#   Settings → Actions → General → Workflow permissions: "Read and write permissions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to push the gh-pages branch

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Production site lives at https://<owner>.github.io/CircuiTry3D/
          VITE_BASE_PATH: /CircuiTry3D/

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          # Don't wipe PR-preview subdirectories that live alongside the root
          # production deployment.
          clean-exclude: pr-preview
          single-commit: true

