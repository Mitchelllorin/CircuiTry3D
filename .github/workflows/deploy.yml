name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute Pages settings
        id: pages
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
          PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN }}
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY_OWNER}"
          base_path="${PAGES_BASE_PATH:-/$repo_name/}"
          case "$base_path" in
            /*) ;;
            *) base_path="/$base_path" ;;
          esac
          case "$base_path" in
            */) ;;
            *) base_path="$base_path/" ;;
          esac
          origin="${PAGES_ORIGIN:-https://$owner_name.github.io}"
          origin="${origin%/}"
          echo "base_path=$base_path" >> "$GITHUB_OUTPUT"
          echo "origin=$origin" >> "$GITHUB_OUTPUT"
          echo "site_url=${origin}${base_path%/}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          VITE_DEMO_MODE: 'true'
          VITE_OWNER_KEY: ${{ secrets.VITE_OWNER_KEY }}
          VITE_OWNER_KEY_HASH: ${{ secrets.VITE_OWNER_KEY_HASH }}
        run: npm run build

      - name: Add GitHub Pages metadata
        env:
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: |
          set -euo pipefail
          touch dist/.nojekyll
          if [ -n "${PAGES_CNAME:-}" ]; then
            printf '%s\n' "$PAGES_CNAME" > dist/CNAME
          fi

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAGES_BRANCH: gh-pages
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
          REPOSITORY_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          SOURCE_DIST: ${{ github.workspace }}/dist
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          workdir="$(mktemp -d)"
          if git ls-remote --exit-code --heads "$REPOSITORY_URL" "$GH_PAGES_BRANCH" >/dev/null 2>&1; then
            git clone --branch "$GH_PAGES_BRANCH" --single-branch "$REPOSITORY_URL" "$workdir"
          else
            git clone "$REPOSITORY_URL" "$workdir"
            cd "$workdir"
            git checkout --orphan "$GH_PAGES_BRANCH"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          cd "$workdir"
          mkdir -p pr-preview
          rsync -a --delete --exclude 'pr-preview' "$SOURCE_DIST"/ ./
          touch .nojekyll
          if [ -n "${PAGES_CNAME:-}" ]; then
            printf '%s\n' "$PAGES_CNAME" > CNAME
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No production Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy site for ${GITHUB_SHA}"
          git push origin "$GH_PAGES_BRANCH"
