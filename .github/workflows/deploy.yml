# Deploy CircuiTry3D to GitHub Pages on every push to main.
# The live demo URL is: https://mitchelllorin.github.io/CircuiTry3D/
#
# One-time setup (repo owner):
#   Settings → Pages → Source: "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any queued/in-progress run so the
# latest commit is always what ends up live.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GitHub Pages serves this repo under /CircuiTry3D/ — this matches
          # the default base path already set in vite.config.ts.
          VITE_BASE_PATH: /CircuiTry3D/
          VITE_DEMO_MODE: 'true'
          VITE_PAYMENT_URL: 'https://play.google.com/store/apps/details?id=com.circuitry3d.app'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

