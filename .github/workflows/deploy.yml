name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Only one deployment at a time; don't cancel an in-progress run.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (demo mode)
        env:
          VITE_DEMO_MODE: 'true'
          # OWNER_KEY_HASH is the SHA-256 hex digest of the owner password.
          # Set this in GitHub → Settings → Secrets and variables → Actions
          # as a repository secret named OWNER_KEY_HASH.
          VITE_OWNER_KEY_HASH: ${{ secrets.OWNER_KEY_HASH }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          # Preserve the pr-preview/ subdirectory so active PR previews
          # are not wiped on each production deployment.
          keep_files: true
