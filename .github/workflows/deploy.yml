# Production is served by Vercel — this workflow is kept for optional manual
# re-deployment to GitHub Pages (e.g. fallback or mirror).
# `keep_files: true` preserves the pr-preview/ directory managed by pr-preview.yml.

name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

# Only one production deployment at a time; don't cancel an in-progress run.
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Sets the Vite base path so all assets are rooted at the
          # GitHub Pages sub-path for this repository.
          PAGES_BASE_PATH: /CircuiTry3D/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Preserves the pr-preview/ directory so open PR previews are not wiped.
          keep_files: true
