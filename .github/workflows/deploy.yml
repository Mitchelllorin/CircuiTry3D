# Production is served by Vercel — this workflow is kept for optional manual
# re-deployment to GitHub Pages (e.g. fallback or mirror).
# `keep_files: true` preserves the pr-preview/ directory managed by pr-preview.yml.

name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any queued/in-progress run so the
# latest commit is always what ends up live.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GitHub Pages serves this repo under /CircuiTry3D/ — this matches
          # the default base path already set in vite.config.ts.
          VITE_BASE_PATH: /CircuiTry3D/
          VITE_DEMO_MODE: 'true'
          VITE_PAYMENT_URL: 'https://play.google.com/store/apps/details?id=com.circuitry3d.app'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Preserves the pr-preview/ directory so open PR previews are not wiped.
          keep_files: true
