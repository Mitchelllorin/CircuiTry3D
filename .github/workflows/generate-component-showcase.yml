name: Generate Component Showcase Screenshots

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  component-showcase:
    runs-on: ubuntu-latest
    # Skip when the push was itself a regeneration commit to avoid infinite loops.
    # Manual workflow_dispatch runs always proceed.
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip screenshots]')
    permissions:
      contents: write

    env:
      NODE_VERSION: '20.19.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build web app
        run: npm run build

      - name: Start preview server
        run: npm run preview &

      - name: Wait for preview server
        run: |
          echo "Waiting for preview server on port 4173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173 >/dev/null 2>&1; then
              echo "Server is ready."
              exit 0
            fi
            echo "  attempt $i/30…"
            sleep 2
          done
          echo "::error::Preview server did not become ready after 60 seconds."
          exit 1

      - name: Capture component showcase screenshots
        run: npm run component-showcase:local

      - name: Upload component-shots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: component-shots
          path: public/component-shots/
          if-no-files-found: error

      - name: Commit updated component shots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/component-shots/
          if git diff --cached --quiet; then
            echo "No component-shot changes to commit."
          else
            git commit -m "chore: regenerate component showcase screenshots [skip screenshots]"
            git pull --rebase origin main
            git push
          fi
