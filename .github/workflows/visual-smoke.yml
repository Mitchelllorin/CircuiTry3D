name: Visual Smoke Checks

on:
  schedule:
    - cron: '0 5 * * 1,4'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20.19.0'
      SMOKE_OUTPUT_DIR: /tmp/ct3d-visual-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build web app
        run: npm run build

      - name: Start preview server
        run: npm run preview &

      - name: Wait for preview server
        run: |
          echo "Waiting for preview server on port 4173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173 >/dev/null 2>&1; then
              echo "Server is ready."
              exit 0
            fi
            echo "  attempt $i/30…"
            sleep 2
          done
          echo "::error::Preview server did not become ready after 60 seconds."
          exit 1

      - name: Run visual smoke script
        run: npm run smoke:visual

      - name: Upload smoke captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-smoke-captures
          path: /tmp/ct3d-visual-smoke/
          if-no-files-found: warn
