# Vercel PR Preview
#
# Builds the app in DEMO mode and deploys it as a Vercel Preview on every PR
# push.  The preview URL is posted as a PR comment for review.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       – Personal access token from vercel.com/account/tokens
#   VERCEL_ORG_ID      – Vercel project Settings → General
#   VERCEL_PROJECT_ID  – Vercel project Settings → General
#
# If any of those secrets are absent the deploy steps are skipped and the
# workflow exits cleanly – no red X.

name: Vercel Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.19.0'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel (Demo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # ── Check whether the Vercel secrets are configured ──────────────────
      - name: Check secrets
        id: secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  VERCEL_TOKEN not set – skipping Vercel deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # ── Build (demo mode) ─────────────────────────────────────────────────
      - name: Install Vercel CLI
        if: steps.secrets.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Build
        if: steps.secrets.outputs.configured == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Deploy preview
        id: deploy
        if: steps.secrets.outputs.configured == 'true'
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      # ── Post / update PR comment ──────────────────────────────────────────
      - name: Comment on PR
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const url    = '${{ steps.deploy.outputs.url }}';
            const sha    = '${{ github.event.pull_request.head.sha }}';
            const marker = '<!-- vercel-preview-url -->';
            const body   = `${marker}
            ## 🚀 Vercel Demo Preview

            | | |
            |---|---|
            | **Preview URL** | [${url}](${url}) |
            | **Mode** | Demo (VITE_DEMO_MODE=true) |
            | **Commit** | \`${sha}\` |`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

