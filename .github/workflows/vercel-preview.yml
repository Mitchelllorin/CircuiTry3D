# Vercel PR Preview
#
# On every PR push this workflow builds the app in DEMO mode and deploys it
# as a Vercel Preview Deployment.  The deployment URL is posted as a PR
# comment so the owner can review the build before it is published.
#
# Vercel Deployment Protection (the "owner key"):
#   Enable "Vercel Authentication" (or "Password Protection" on Pro) in the
#   Vercel project's Settings → Deployment Protection page.  Once enabled,
#   only authenticated Vercel users with access to your team can open the
#   preview URL — everyone else sees a gate page.
#
# Required GitHub repository secrets:
#   VERCEL_TOKEN       – Personal access token from vercel.com/account/tokens
#   VERCEL_ORG_ID      – Found in Vercel project Settings → General
#   VERCEL_PROJECT_ID  – Found in Vercel project Settings → General

name: Vercel Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-vercel-preview:
    name: Deploy to Vercel (Demo)
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '20.19.0'
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull Vercel project settings (environment variables, etc.)
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Build with the Vercel toolchain so it picks up vercel.json overrides
      # (notably VITE_DEMO_MODE=true) and produce the output directory.
      - name: Build (demo mode)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy the pre-built output as a preview deployment and capture the URL.
      - name: Deploy preview to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"

      # Post (or update) a PR comment with the Vercel preview URL.
      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = '${{ steps.deploy.outputs.url }}';
            const marker    = '<!-- vercel-preview-url -->';
            const body      = `${marker}
            ## 🚀 Vercel Demo Preview

            | | |
            |---|---|
            | **Preview URL** | [${deployUrl}](${deployUrl}) |
            | **Mode** | Demo (VITE_DEMO_MODE=true) |
            | **Commit** | \`${{ github.event.pull_request.head.sha }}\` |

            > This preview is protected by Vercel Deployment Protection.
            > Only authorised team members can access it.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
