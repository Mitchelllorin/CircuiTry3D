<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background depth gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>

    <!-- Per-letter glow filters -->
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.23
                0 0 0 0 0.51
                0 0 0 0 0.96
                0 0 0 18 -7"
        result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.98
                0 0 0 0 0.45
                0 0 0 0 0.09
                0 0 0 18 -7"
        result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.13
                0 0 0 0 0.77
                0 0 0 0 0.37
                0 0 0 18 -7"
        result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle circuit trace decorations -->
  <g opacity="0.12" fill="none" stroke-linecap="round">
    <!-- Top-left trace cluster -->
    <polyline points="0,96 60,96 60,60 96,60" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="60" cy="96" r="3.5" fill="#3b82f6" stroke="none"/>
    <circle cx="96" cy="60" r="3.5" fill="#3b82f6" stroke="none"/>

    <!-- Top-right trace cluster -->
    <polyline points="512,96 452,96 452,60 416,60" stroke="#f97316" stroke-width="2"/>
    <circle cx="452" cy="96" r="3.5" fill="#f97316" stroke="none"/>
    <circle cx="416" cy="60" r="3.5" fill="#f97316" stroke="none"/>

    <!-- Bottom-left trace cluster -->
    <polyline points="0,416 60,416 60,452 96,452" stroke="#22c55e" stroke-width="2"/>
    <circle cx="60" cy="416" r="3.5" fill="#22c55e" stroke="none"/>
    <circle cx="96" cy="452" r="3.5" fill="#22c55e" stroke="none"/>

    <!-- Bottom-right trace cluster -->
    <polyline points="512,416 452,416 452,452 416,452" stroke="#22c55e" stroke-width="2"/>
    <circle cx="452" cy="416" r="3.5" fill="#22c55e" stroke="none"/>
    <circle cx="416" cy="452" r="3.5" fill="#22c55e" stroke="none"/>

    <!-- Center-top accent line -->
    <line x1="200" y1="40" x2="312" y2="40" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="200" cy="40" r="2.5" fill="#94a3b8" stroke="none"/>
    <circle cx="312" cy="40" r="2.5" fill="#94a3b8" stroke="none"/>

    <!-- Center-bottom accent line -->
    <line x1="200" y1="472" x2="312" y2="472" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="200" cy="472" r="2.5" fill="#94a3b8" stroke="none"/>
    <circle cx="312" cy="472" r="2.5" fill="#94a3b8" stroke="none"/>
  </g>

  <!-- ── Row 1: C (blue) + T (orange) ── -->
  <text
    x="138" y="278"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="230" font-weight="900"
    fill="#3b82f6"
    text-anchor="middle"
    filter="url(#glowBlue)">C</text>

  <text
    x="374" y="278"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="230" font-weight="900"
    fill="#f97316"
    text-anchor="middle"
    filter="url(#glowOrange)">T</text>

  <!-- ── Row 2: 3D (green) ── -->
  <text
    x="256" y="446"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="170" font-weight="900"
    fill="#22c55e"
    text-anchor="middle"
    filter="url(#glowGreen)">3D</text>
</svg>
