<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CircuiTry3D</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        max(16px, env(safe-area-inset-top, 0px))
        max(12px, env(safe-area-inset-right, 0px))
        max(16px, env(safe-area-inset-bottom, 0px))
        max(12px, env(safe-area-inset-left, 0px));
      background: radial-gradient(125% 125% at 50% 10%, rgba(47,84,235,0.25) 0%, rgba(9,17,43,0.85) 45%, #050b1f 100%);
      color: #f9fafc;
      font-family: "Inter", "Poppins", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      text-align: center;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(80% 80% at 50% 20%, rgba(15,54,120,0.35) 0%, rgba(4,9,26,0.8) 60%, rgba(4,9,26,0.95) 100%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.9;
    }
    .landing-page {
      position: relative;
      z-index: 1;
      width: min(960px, 100%);
      max-width: calc(100vw - 24px);
      padding: clamp(32px, 6vw, 56px) 12px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(22px, 5.5vw, 48px);
      text-align: center;
    }
    .wordmark {
      font-size: clamp(38px, 9.4vw, 92px);
      font-weight: 900;
      letter-spacing: -0.015em;
      line-height: 1.06;
      display: inline-flex;
      gap: 6px;
      margin-inline: auto;
      margin-bottom: clamp(2px, 0.8vw, 8px);
      filter: drop-shadow(0 0 22px rgba(40,255,190,0.4));
    }
    .wordmark span { display: inline-block; }
    .wordmark .brand-blue {
      color: #88ccff;
      text-shadow: 0 0 18px rgba(136, 204, 255, 0.7), 0 0 34px rgba(136, 204, 255, 0.55);
    }
    .wordmark .brand-orange {
      color: #ff8844;
      text-shadow: 0 0 16px rgba(255, 136, 68, 0.65), 0 0 30px rgba(255, 136, 68, 0.55);
    }
    .wordmark .brand-green {
      color: #00ff88;
      text-shadow: 0 0 18px rgba(0, 255, 136, 0.7), 0 0 34px rgba(0, 255, 136, 0.55);
    }
    .logo-mark {
      width: clamp(180px, 46vw, 300px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-inline: auto;
      margin-top: clamp(2px, 0.8vw, 8px);
      margin-bottom: clamp(4px, 1vw, 10px);
      filter: drop-shadow(0 0 18px rgba(45, 212, 191, 0.45));
    }
    .logo-mark img {
      width: 100%;
      height: auto;
      display: block;
    }
    .subtitle {
      color: #9db8ff;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.42em;
      padding-inline-start: 0.42em;
      font-size: clamp(0.72rem, 2.4vw, 0.95rem);
      margin-top: 0;
      text-align: center;
      opacity: 0.92;
    }
    .status-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      width: min(420px, 100%);
      margin-inline: auto;
    }
    .status-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      position: relative;
      overflow: visible;
    }
    .status-bar-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(136, 204, 255, 0.12);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      border: 1px solid rgba(136, 204, 255, 0.18);
    }
    .status-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg,
        rgba(136,204,255,0.3) 0%,
        rgba(136,204,255,0.65) 55%,
        rgba(180,225,255,0.9) 80%,
        rgba(255,255,255,0.97) 100%
      );
    }
    .status-bar::after {
      content: "";
      position: absolute;
      top: 50%;
      left: var(--photon-pos, 0%);
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, rgba(200,235,255,0.75) 45%, transparent 100%);
      box-shadow:
        0 0 4px 2px rgba(255,255,255,0.95),
        0 0 10px 4px rgba(136,204,255,1),
        0 0 22px 8px rgba(136,204,255,0.75),
        0 0 42px 18px rgba(136,204,255,0.32);
      pointer-events: none;
      opacity: var(--photon-opacity, 0);
      transition: opacity 0.5s ease;
    }
    .status-text {
      font-size: 0.88rem;
      letter-spacing: 0.16em;
      padding-inline-start: 0.16em;
      text-transform: uppercase;
      color: rgba(136, 204, 255, 0.92);
      font-weight: 600;
      text-align: center;
      transition: opacity 0.25s ease;
    }
    .status-text.status-ready {
      animation: status-ready-pulse 2.8s ease-in-out infinite;
    }
    @keyframes status-ready-pulse {
      0%, 100% { opacity: 0.92; }
      50% { opacity: 1; color: rgba(180, 230, 255, 1); }
    }
    .launch-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 48px;
      border-radius: 999px;
      border: 2px solid rgba(136, 204, 255, 0.42);
      background: rgba(136, 204, 255, 0.15);
      color: #f8fafc;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(136, 204, 255, 0.2), 0 0 40px rgba(136, 204, 255, 0.1);
      margin-top: 8px;
    }
    .launch-button:hover {
      border-color: rgba(136, 204, 255, 0.75);
      background: rgba(136, 204, 255, 0.25);
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(136, 204, 255, 0.3), 0 0 60px rgba(136, 204, 255, 0.2);
    }
    @media (max-height: 640px) {
      body {
        justify-content: flex-start;
        align-items: center;
        padding-top: max(48px, env(safe-area-inset-top, 0px));
      }
      .landing-page { gap: 22px; }
    }
    @media (orientation: landscape) and (max-height: 480px) {
      body {
        justify-content: flex-start;
        align-items: center;
        padding-top: max(12px, env(safe-area-inset-top, 0px));
        padding-left: max(16px, env(safe-area-inset-left, 0px));
        padding-right: max(16px, env(safe-area-inset-right, 0px));
        padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
      }
      .landing-page {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 12px 24px;
        align-items: center;
        justify-content: center;
        padding: 8px;
      }
      .logo-mark {
        width: clamp(72px, 18vw, 110px);
      }
      .wordmark {
        font-size: clamp(24px, 6vw, 40px);
      }
      .subtitle {
        display: none;
      }
      .status-wrapper {
        gap: 8px;
      }
    }
    .landing-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 16px;
      padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.25rem 0.5rem;
      font-size: 0.72rem;
      z-index: 10;
    }
    .landing-footer-link {
      color: rgba(147, 197, 253, 0.55);
      text-decoration: none;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s ease;
    }
    .landing-footer-link:hover {
      color: rgba(147, 197, 253, 0.9);
    }
    .landing-footer-sep {
      color: rgba(147, 197, 253, 0.25);
    }
    .fuse-badge {
      color: rgba(147, 197, 253, 0.35);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .fuse-badge abbr {
      text-decoration: none;
      font-style: normal;
    }

  </style>
</head>
<body>
  <div class="landing-page">
      <div class="wordmark">
        <span class="brand-blue">Circui</span>
        <span class="brand-orange">Try</span>
        <span class="brand-green">3D</span>
      </div>
      <div class="logo-mark" aria-hidden="true">
        <img src="/app-icon-no-text.svg" alt="" />
      </div>
      <div class="subtitle">Professional Circuit Design</div>
    <div class="status-wrapper">
      <div class="status-text" id="status-text">Initializing…</div>
      <div class="status-bar" id="status-bar">
        <div class="status-bar-track">
          <div class="status-fill" id="status-fill"></div>
        </div>
      </div>
      <a class="launch-button" href="/app" id="launch-btn">Launch</a>
    </div>
  </div>
  <footer class="landing-footer">
    <nav aria-label="Legal information">
      <a class="landing-footer-link" href="/privacy">Privacy Policy</a>
      <span class="landing-footer-sep" aria-hidden="true">·</span>
      <a class="landing-footer-link" href="/data-safety">Data Safety</a>
      <span class="landing-footer-sep" aria-hidden="true">·</span>
      <a class="landing-footer-link" href="/delete-account">Delete Account</a>
      <span class="landing-footer-sep" aria-hidden="true">·</span>
      <a class="landing-footer-link" href="/assets/feature-graphic.png" download="CircuiTry3D-feature-graphic.png">Feature Graphic ↓</a>
    </nav>
    <span class="landing-footer-sep" aria-hidden="true">·</span>
    <span class="fuse-badge">Powered by <abbr title="Failure Understanding Simulation Engine">FUSE™</abbr></span>
  </footer>
  <script>
    (function(){
      const normalisePath = (href) => {
        if (!href || typeof href !== "string") {
          return "/";
        }

        try {
          const url = new URL(href, window.location.origin);
          return `${url.pathname}${url.search}${url.hash}` || "/";
        } catch (error) {
          return href.charAt(0) === "/" ? href : `/${href}`;
        }
      };

      const sendNavigationMessage = (pathTarget) => {
        if (!pathTarget) {
          return false;
        }

        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: "landing:navigate", path: pathTarget }, "*");
            return true;
          }
        } catch (error) {
          // Ignore bridge failures and fall back to default navigation
        }

        return false;
      };

      const launchButton = document.getElementById('launch-btn');
      if (launchButton) {
        launchButton.addEventListener('click', (event) => {
          const href = launchButton.getAttribute('href');
          if (!href) {
            return;
          }

          const pathTarget = normalisePath(href);
          const handled = sendNavigationMessage(pathTarget);
          if (handled) {
            event.preventDefault();
          }
        });
      }

      document.querySelectorAll('.landing-footer-link').forEach((link) => {
        link.addEventListener('click', (event) => {
          // Let download links work as native browser downloads — don't intercept them.
          if (link.hasAttribute('download')) {
            return;
          }

          const href = link.getAttribute('href');
          if (!href) {
            return;
          }

          const pathTarget = normalisePath(href);
          const handled = sendNavigationMessage(pathTarget);
          if (handled) {
            event.preventDefault();
          }
        });
      });
  })();
</script>
<script>
  (function () {
    var phases = [
      { target: 16, msg: 'Firing up the time circuits\u2026' },
      { target: 34, msg: 'Circumventing circuits\u2026' },
      { target: 54, msg: 'Reining in photons\u2026' },
      { target: 72, msg: 'Fighting the resistance\u2026' },
      { target: 88, msg: 'Bending the space-time continuum\u2026' },
      { target: 100, msg: 'Almost there\u2026' },
    ];

    var statusText = document.getElementById('status-text');
    var statusFill = document.getElementById('status-fill');
    var statusBar  = document.getElementById('status-bar');

    if (!statusText || !statusFill || !statusBar) return;

    var current = 0;
    var lastPhaseIdx = -1;
    var startTime = null;
    var DURATION = 9000;

    function easeInOut(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function getPhaseIndex(pct) {
      for (var i = 0; i < phases.length; i++) {
        if (pct < phases[i].target) return i;
      }
      return phases.length - 1;
    }

    function tick(ts) {
      if (startTime === null) startTime = ts;
      var elapsed = ts - startTime;
      var t = Math.min(elapsed / DURATION, 1);
      current = easeInOut(t) * 100;

      statusFill.style.width = current + '%';
      statusBar.style.setProperty('--photon-pos', current + '%');

      var pi = getPhaseIndex(current);
      if (pi !== lastPhaseIdx) {
        lastPhaseIdx = pi;
        var msg = phases[pi].msg;
        statusText.style.opacity = '0';
        setTimeout(function () {
          statusText.textContent = msg;
          statusText.style.opacity = '1';
        }, 180);
      }

      if (t < 1) {
        requestAnimationFrame(tick);
      } else {
        statusFill.style.width = '100%';
        statusBar.style.setProperty('--photon-pos', '100%');
        setTimeout(function () {
          statusBar.style.setProperty('--photon-opacity', '0');
          statusText.style.opacity = '0';
          setTimeout(function () {
            statusText.textContent = '3D Circuit Environment Ready';
            statusText.style.opacity = '1';
            statusText.classList.add('status-ready');
          }, 300);
        }, 350);
      }
    }

    statusText.textContent = phases[0].msg;
    statusBar.style.setProperty('--photon-opacity', '1');
    requestAnimationFrame(tick);
  })();
</script>
</body>
</html>
