<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CircuiTry3D</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(16px, env(safe-area-inset-top, 0px))
        max(12px, env(safe-area-inset-right, 0px))
        max(16px, env(safe-area-inset-bottom, 0px))
        max(12px, env(safe-area-inset-left, 0px));
      background: radial-gradient(125% 125% at 50% 10%, rgba(47,84,235,0.25) 0%, rgba(9,17,43,0.85) 45%, #050b1f 100%);
      color: #f9fafc;
      font-family: "Inter", "Poppins", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      text-align: center;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(80% 80% at 50% 20%, rgba(15,54,120,0.35) 0%, rgba(4,9,26,0.8) 60%, rgba(4,9,26,0.95) 100%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.9;
    }
    .landing-page {
      position: relative;
      z-index: 1;
      width: min(960px, 100%);
      max-width: calc(100vw - 24px);
      padding: clamp(32px, 6vw, 56px) 12px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(18px, 5vw, 44px);
      text-align: center;
    }
    .wordmark {
      font-size: clamp(38px, 9.4vw, 92px);
      font-weight: 900;
      letter-spacing: -0.015em;
      display: inline-flex;
      gap: 6px;
      margin-inline: auto;
      filter: drop-shadow(0 0 22px rgba(40,255,190,0.4));
    }
    .wordmark span { display: inline-block; }
    .wordmark .brand-blue {
      color: #88ccff;
      text-shadow: 0 0 18px rgba(136, 204, 255, 0.7), 0 0 34px rgba(136, 204, 255, 0.55);
    }
    .wordmark .brand-orange {
      color: #ff8844;
      text-shadow: 0 0 16px rgba(255, 136, 68, 0.65), 0 0 30px rgba(255, 136, 68, 0.55);
    }
    .wordmark .brand-green {
      color: #00ff88;
      text-shadow: 0 0 18px rgba(0, 255, 136, 0.7), 0 0 34px rgba(0, 255, 136, 0.55);
    }
    .logo-mark {
      width: clamp(220px, 55vw, 380px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-inline: auto;
      filter: drop-shadow(0 0 18px rgba(45, 212, 191, 0.45));
    }
    .logo-mark img {
      width: 100%;
      height: auto;
      display: block;
    }
    .subtitle {
      color: #9db8ff;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.42em;
      font-size: clamp(0.72rem, 2.4vw, 0.95rem);
      margin-top: -6px;
      text-align: center;
      opacity: 0.92;
    }
    .status-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      width: min(420px, 100%);
      margin-inline: auto;
    }
    .status-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(136, 204, 255, 0.12);
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      border: 1px solid rgba(136, 204, 255, 0.18);
    }
    .status-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(136, 204, 255, 0.3) 0%, rgba(136, 204, 255, 1) 50%, rgba(136, 204, 255, 0.3) 100%);
      transform: translateX(-100%);
      animation: sweep-once 2.4s ease-out forwards;
    }
    .status-text {
      font-size: 0.88rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(136, 204, 255, 0.92);
      font-weight: 600;
    }
    .launch-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 48px;
      border-radius: 999px;
      border: 2px solid rgba(136, 204, 255, 0.42);
      background: rgba(136, 204, 255, 0.15);
      color: #f8fafc;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(136, 204, 255, 0.2), 0 0 40px rgba(136, 204, 255, 0.1);
      margin-top: 8px;
    }
    .launch-button:hover {
      border-color: rgba(136, 204, 255, 0.75);
      background: rgba(136, 204, 255, 0.25);
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(136, 204, 255, 0.3), 0 0 60px rgba(136, 204, 255, 0.2);
    }
    @keyframes sweep-once {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @media (max-height: 640px) {
      body {
        justify-content: flex-start;
        align-items: flex-start;
        padding-top: max(48px, env(safe-area-inset-top, 0px));
      }
      .landing-page { gap: 22px; }
    }
    .landing-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 16px;
      padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.25rem 0.5rem;
      font-size: 0.72rem;
      z-index: 10;
    }
    .landing-footer-link {
      color: rgba(147, 197, 253, 0.55);
      text-decoration: none;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s ease;
    }
    .landing-footer-link:hover {
      color: rgba(147, 197, 253, 0.9);
    }
    .landing-footer-sep {
      color: rgba(147, 197, 253, 0.25);
    }

    /* ── First-launch onboarding overlay ─────────────────────────────── */
    .onboarding-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 9, 26, 0.88);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .onboarding-backdrop.is-hidden {
      display: none;
    }
    .onboarding-card {
      position: relative;
      width: min(540px, 100%);
      background: rgba(10, 22, 50, 0.96);
      border: 1px solid rgba(136, 204, 255, 0.32);
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(136,204,255,0.08);
      padding: clamp(20px, 5vw, 36px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .onboarding-kicker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(136, 204, 255, 0.85);
    }
    .onboarding-step-icon {
      font-size: clamp(32px, 8vw, 48px);
      line-height: 1;
      text-align: center;
    }
    .onboarding-title {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f0f8ff;
    }
    .onboarding-body {
      font-size: clamp(0.85rem, 2.5vw, 0.97rem);
      line-height: 1.65;
      color: rgba(210, 230, 255, 0.85);
      margin: 0;
      white-space: pre-line;
    }
    .onboarding-formula {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 18px;
      border-radius: 10px;
      background: rgba(136, 204, 255, 0.1);
      border: 1px solid rgba(136, 204, 255, 0.3);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: clamp(0.95rem, 3vw, 1.15rem);
      font-weight: 700;
      color: #88ccff;
      letter-spacing: 0.06em;
    }
    .onboarding-analogy {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(0, 255, 136, 0.06);
      border-left: 3px solid rgba(0, 255, 136, 0.45);
      font-size: clamp(0.8rem, 2.3vw, 0.88rem);
      color: rgba(180, 240, 210, 0.9);
      line-height: 1.55;
      white-space: pre-line;
    }
    .onboarding-progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .onboarding-progress-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(136, 204, 255, 0.1);
      border: 1px solid rgba(136, 204, 255, 0.15);
      overflow: hidden;
    }
    .onboarding-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #88ccff, #00ff88);
      transition: width 0.35s ease;
    }
    .onboarding-progress-text {
      font-size: 11px;
      color: rgba(200, 220, 255, 0.7);
      white-space: nowrap;
    }
    .onboarding-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .onboarding-btn {
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.04em;
    }
    .onboarding-btn-primary {
      border: 1.5px solid rgba(0, 255, 136, 0.5);
      background: rgba(0, 255, 136, 0.12);
      color: #e0fff0;
    }
    .onboarding-btn-primary:hover {
      border-color: rgba(0, 255, 136, 0.8);
      background: rgba(0, 255, 136, 0.2);
    }
    .onboarding-btn-secondary {
      border: 1.5px solid rgba(136, 204, 255, 0.25);
      background: rgba(136, 204, 255, 0.06);
      color: rgba(200, 220, 255, 0.8);
    }
    .onboarding-btn-secondary:hover {
      border-color: rgba(136, 204, 255, 0.45);
      background: rgba(136, 204, 255, 0.1);
    }
    .onboarding-btn-skip {
      margin-left: auto;
      border: none;
      background: transparent;
      color: rgba(150, 170, 210, 0.55);
      font-size: 0.78rem;
      cursor: pointer;
      padding: 4px 8px;
    }
    .onboarding-btn-skip:hover {
      color: rgba(150, 170, 210, 0.85);
    }
    .onboarding-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: 1px solid rgba(136, 204, 255, 0.2);
      background: rgba(136, 204, 255, 0.05);
      color: rgba(200, 220, 255, 0.75);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }
    .onboarding-close:hover {
      border-color: rgba(136, 204, 255, 0.4);
      background: rgba(136, 204, 255, 0.1);
      color: #fff;
    }
    .onboarding-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .onboarding-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(136, 204, 255, 0.2);
      transition: background 0.25s ease, transform 0.25s ease;
    }
    .onboarding-dot.is-active {
      background: #88ccff;
      transform: scale(1.3);
    }
  </style>
</head>
<body>
  <!-- ── First-launch onboarding overlay ──────────────────────────── -->
  <div class="onboarding-backdrop is-hidden" id="onboarding-backdrop" role="dialog" aria-modal="true" aria-labelledby="onboarding-title">
    <div class="onboarding-card">
      <button class="onboarding-close" id="onboarding-close" aria-label="Close introduction">×</button>

      <div class="onboarding-kicker" id="onboarding-kicker">CircuiTry3D · Introduction</div>

      <div class="onboarding-step-icon" id="onboarding-icon" aria-hidden="true"></div>
      <h2 class="onboarding-title" id="onboarding-title"></h2>
      <p class="onboarding-body" id="onboarding-body"></p>
      <div id="onboarding-extras"></div>

      <div class="onboarding-dots" id="onboarding-dots" aria-hidden="true"></div>

      <div class="onboarding-progress">
        <div class="onboarding-progress-bar">
          <div class="onboarding-progress-fill" id="onboarding-progress-fill"></div>
        </div>
        <div class="onboarding-progress-text" id="onboarding-progress-text"></div>
      </div>

      <div class="onboarding-actions">
        <button class="onboarding-btn onboarding-btn-secondary" id="onboarding-back">Back</button>
        <button class="onboarding-btn onboarding-btn-primary" id="onboarding-next">Next</button>
        <button class="onboarding-btn-skip" id="onboarding-skip">Skip intro</button>
      </div>
    </div>
  </div>

  <div class="landing-page">
      <div class="wordmark">
        <span class="brand-blue">Circui</span>
        <span class="brand-orange">Try</span>
        <span class="brand-green">3D</span>
      </div>
      <div class="logo-mark" aria-hidden="true">
        <img src="/circuit-logo.svg" alt="" />
      </div>
      <div class="subtitle">Professional Circuit Design</div>
    <div class="status-wrapper">
      <div class="status-text">3D Circuit Environment Ready</div>
      <div class="status-bar"></div>
      <a class="launch-button" href="/app" id="launch-btn">Launch</a>
    </div>
  </div>
  <footer class="landing-footer">
    <nav aria-label="Legal information">
      <a class="landing-footer-link" href="/privacy">Privacy Policy</a>
      <span class="landing-footer-sep" aria-hidden="true">·</span>
      <a class="landing-footer-link" href="/data-safety">Data Safety</a>
      <span class="landing-footer-sep" aria-hidden="true">·</span>
      <a class="landing-footer-link" href="/delete-account">Delete Account</a>
    </nav>
  </footer>
  <script>
    (function(){
      const normalisePath = (href) => {
        if (!href || typeof href !== "string") {
          return "/";
        }

        try {
          const url = new URL(href, window.location.origin);
          return `${url.pathname}${url.search}${url.hash}` || "/";
        } catch (error) {
          return href.charAt(0) === "/" ? href : `/${href}`;
        }
      };

      const sendNavigationMessage = (pathTarget) => {
        if (!pathTarget) {
          return false;
        }

        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: "landing:navigate", path: pathTarget }, "*");
            return true;
          }
        } catch (error) {
          // Ignore bridge failures and fall back to default navigation
        }

        return false;
      };

      const launchButton = document.getElementById('launch-btn');
      if (launchButton) {
        launchButton.addEventListener('click', (event) => {
          const href = launchButton.getAttribute('href');
          if (!href) {
            return;
          }

          const pathTarget = normalisePath(href);
          const handled = sendNavigationMessage(pathTarget);
          if (handled) {
            event.preventDefault();
          }
        });
      }

      document.querySelectorAll('.landing-footer-link').forEach((link) => {
        link.addEventListener('click', (event) => {
          const href = link.getAttribute('href');
          if (!href) {
            return;
          }

          const pathTarget = normalisePath(href);
          const handled = sendNavigationMessage(pathTarget);
          if (handled) {
            event.preventDefault();
          }
        });
      });
  })();
</script>
<script>
  (function () {
    var ONBOARDING_KEY = 'circuitry3d:onboarding:v1';

    var steps = [
      {
        icon: '⚡',
        title: 'What is an Electric Circuit?',
        body: 'An electric circuit is a closed path through which electric charge (electrons) can flow continuously. Every working circuit needs three things: a voltage source (like a battery), at least one load (like a resistor or bulb), and conductors (wires) forming a complete, unbroken loop.',
        analogy: '🔄 Think of it like a water loop: a pump pushes water around a closed pipe system. If the pipe is broken anywhere, the flow stops — the same happens with electricity in an open circuit.',
      },
      {
        icon: '🔋',
        title: 'Voltage (E) — The Electrical Push',
        body: 'Voltage, also called Electromotive Force (EMF) or potential difference, is the energy per unit charge that drives electrons through the circuit. It is measured in Volts (V).',
        formula: 'E  (Volts, V)',
        analogy: '💧 Imagine water pressure in a pipe. Higher pressure pushes more water through — higher voltage pushes more electrons through a conductor.',
      },
      {
        icon: '➡️',
        title: 'Current (I) — The Flow of Electrons',
        body: 'Electric current is the rate at which electric charge flows past a point in a circuit. It is measured in Amperes (Amps, A). In a series circuit, the same current flows through every component.',
        formula: 'I  (Amperes, A)',
        analogy: '💧 Current is like the volume of water flowing through a pipe per second. A wider pipe (less resistance) allows more water (more current) to flow for the same pressure (voltage).',
      },
      {
        icon: '🌀',
        title: 'Resistance (R) — Opposition to Flow',
        body: 'Resistance is the property of a material that opposes the flow of electric current. It converts electrical energy into heat or light. Resistance is measured in Ohms (Ω). Every real conductor and component has some resistance.',
        formula: 'R  (Ohms, Ω)',
        analogy: '💧 Resistance is like the narrowness of a pipe. A very narrow pipe (high resistance) restricts water flow even under high pressure. Resistors are deliberately added to control current.',
      },
      {
        icon: '📐',
        title: "Ohm's Law — The Fundamental Relationship",
        body: 'Ohm\'s Law states that the voltage across a conductor is directly proportional to the current flowing through it, with resistance as the constant of proportionality. This single equation lets you calculate any one of the three values if you know the other two.',
        formula: 'E = I × R',
        analogy: '🔧 Rearranged:\n  I = E ÷ R  →  more voltage or less resistance = more current\n  R = E ÷ I  →  knowing voltage and current reveals resistance',
      },
      {
        icon: '🚀',
        title: "You're Ready to Build!",
        body: 'CircuiTry3D lets you design interactive 3D circuits and instantly see how Ohm\'s Law plays out in real time. Add a battery, connect resistors, draw wires, and watch current flow — all the way down to the atomic level.\n\nUse the W.I.R.E. table (Watts · Current · Resistance · Voltage) to read every metric in your circuit.',
      },
    ];

    var currentStep = 0;
    var backdrop = document.getElementById('onboarding-backdrop');
    var iconEl = document.getElementById('onboarding-icon');
    var titleEl = document.getElementById('onboarding-title');
    var bodyEl = document.getElementById('onboarding-body');
    var extrasEl = document.getElementById('onboarding-extras');
    var dotsEl = document.getElementById('onboarding-dots');
    var fillEl = document.getElementById('onboarding-progress-fill');
    var progressTextEl = document.getElementById('onboarding-progress-text');
    var backBtn = document.getElementById('onboarding-back');
    var nextBtn = document.getElementById('onboarding-next');
    var skipBtn = document.getElementById('onboarding-skip');
    var closeBtn = document.getElementById('onboarding-close');

    function renderStep(index) {
      var step = steps[index];
      var total = steps.length;

      iconEl.textContent = step.icon;
      titleEl.textContent = step.title;
      bodyEl.textContent = step.body;

      extrasEl.innerHTML = '';
      if (step.formula) {
        var formulaEl = document.createElement('div');
        formulaEl.className = 'onboarding-formula';
        formulaEl.textContent = step.formula;
        extrasEl.appendChild(formulaEl);
      }
      if (step.analogy) {
        var analogyEl = document.createElement('div');
        analogyEl.className = 'onboarding-analogy';
        analogyEl.textContent = step.analogy;
        extrasEl.appendChild(analogyEl);
      }

      // Dots
      dotsEl.innerHTML = '';
      for (var i = 0; i < total; i++) {
        var dot = document.createElement('span');
        dot.className = 'onboarding-dot' + (i === index ? ' is-active' : '');
        dotsEl.appendChild(dot);
      }

      // Progress bar & text
      var pct = Math.round(((index + 1) / total) * 100);
      fillEl.style.width = pct + '%';
      progressTextEl.textContent = (index + 1) + ' / ' + total;

      // Back button visibility
      backBtn.style.visibility = index === 0 ? 'hidden' : 'visible';

      // Next / Finish label
      if (index === total - 1) {
        nextBtn.textContent = 'Start Building →';
      } else {
        nextBtn.textContent = 'Next';
      }
    }

    function dismissOnboarding() {
      backdrop.classList.add('is-hidden');
      try { localStorage.setItem(ONBOARDING_KEY, '1'); } catch (e) { /* ignore */ }
    }

    function shouldShowOnboarding() {
      try {
        return !localStorage.getItem(ONBOARDING_KEY);
      } catch (e) {
        return false;
      }
    }

    if (shouldShowOnboarding()) {
      renderStep(0);
      backdrop.classList.remove('is-hidden');
    }

    nextBtn.addEventListener('click', function () {
      if (currentStep < steps.length - 1) {
        currentStep++;
        renderStep(currentStep);
      } else {
        dismissOnboarding();
      }
    });

    backBtn.addEventListener('click', function () {
      if (currentStep > 0) {
        currentStep--;
        renderStep(currentStep);
      }
    });

    skipBtn.addEventListener('click', dismissOnboarding);
    closeBtn.addEventListener('click', dismissOnboarding);
  })();
</script>
</body>
</html>
