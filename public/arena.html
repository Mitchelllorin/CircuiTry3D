    function animate() {
      requestAnimationFrame(animate);
      if (meshA) {
        meshA.rotation.y += 0.01;
      }
      if (meshB && meshB.visible) {
        meshB.rotation.y -= 0.01;
      }
      renderer.render(scene, camera);
    }

    function resetArena() {
      const stat = document.getElementById(STAT_ID);
      if (stat) {
        stat.textContent = 'Reset arena';
      }
      if (meshA) {
        meshA.rotation.set(0, 0, 0);
      }
      if (meshB) {
        meshB.rotation.set(0, 0, 0);
      }
      const benchCount = manufacturerRoster.length;
      reportStatus(`Arena reset to defaults. Bench holds ${benchCount} manufacturer component${benchCount === 1 ? '' : 's'}.`);
    }

    function runTest() {
      const modeEl = document.getElementById(MODE_ID);
      const typeAEl = document.getElementById(COMP_TYPE_A_ID);
      const valueAEl = document.getElementById(VALUE_A_ID);
      const typeBEl = document.getElementById(COMP_TYPE_B_ID);
      const valueBEl = document.getElementById(VALUE_B_ID);
      const voltageEl = document.getElementById(VOLTAGE_ID);
      const frequencyEl = document.getElementById(FREQUENCY_ID);

      const mode = modeEl ? modeEl.value : 'single';
      const typeA = typeAEl ? typeAEl.value : 'resistor';
      const valueA = parseFloat((valueAEl && valueAEl.value) || '0');
      const typeB = typeBEl ? typeBEl.value : typeA;
      const rawValueB = (valueBEl && valueBEl.value) || String(valueA);
      const valueB = parseFloat(rawValueB);
      const V = parseFloat((voltageEl && voltageEl.value) || '0');
      const f = parseFloat((frequencyEl && frequencyEl.value) || '0');

      const descriptorA = lookupComponent(activeComponentIds.a, typeA);
      const descriptorB = lookupComponent(activeComponentIds.b, typeB);
      const descriptorLabelA = formatDescriptor(descriptorA, typeA, manufacturerNames.a);
      const descriptorLabelB = formatDescriptor(descriptorB, typeB, manufacturerNames.b);

      function calc(type, value) {
        if (type === 'resistor') {
          const I = V / (value || 1);
          const P = V * I;
          return { I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0, P: Number.isFinite(P) ? Number(P.toFixed(3)) : 0 };
        }
        if (type === 'capacitor') {
          const X = 1 / (2 * Math.PI * f * (value || 1e-6));
          const I = V / X;
          return { X: Number.isFinite(X) ? Number(X.toFixed(3)) : 0, I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0 };
        }
        if (type === 'inductor') {
          const X = 2 * Math.PI * f * (value || 1e-3);
          const I = V / X;
          return { X: Number.isFinite(X) ? Number(X.toFixed(3)) : 0, I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0 };
        }
        if (type === 'led') {
          const Vf = 2.0;
          const I = Math.max(0, V - Vf) / (value || 100);
          return { Vf, I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0 };
        }
        const payload = parseArenaPayload(event.newValue);
        if (!payload) {
          return;
        }
        const applied = applyArenaPayload(payload, {
          source: payload.source || "builder",
          label: payload.label || payload.sessionName || "Builder Snapshot",
        });
        if (applied) {
          setStatus("Synced builder snapshot from storage.");
        }
      });

      // ── Public bridge API ──────────────────────────────────────────────────
      // Exposes a minimal surface to sibling scripts (the featured-catalog IIFE)
      // that need to manipulate arena state without closure access.
      window.ArenaAPI = {
        registerComponent: function (raw) {
          if (!raw || typeof raw !== "object") return null;
          const comp = normalizeComponent(raw, raw.metadata?.vendor || raw.source || "Reference Library");
          if (!comp) return null;
          if (!state.components.find((c) => c.id === comp.id)) {
            state.components.push(comp);
            populateComponentSelectors();
            renderImportSummary(null);
          }
          return comp;
        },
        loadComponent: function (componentId, target) {
          const comp = state.components.find((c) => c.id === componentId);
          if (!comp) return false;
          if (target === "B") {
            state.selectedB = comp;
            const sel = document.getElementById("component-b");
            if (sel) sel.value = componentId;
            if (state.mode !== "compare") {
              state.mode = "compare";
              const modeSelect = document.getElementById("mode");
              if (modeSelect) modeSelect.value = "compare";
              updateCompareVisibility();
            }
          } else {
            state.selectedA = comp;
            const sel = document.getElementById("component-a");
            if (sel) sel.value = componentId;
          }
          updateMeshesForSelection();
          const ctaBtn = document.getElementById("btn-goto-test");
          if (ctaBtn && state.selectedA) ctaBtn.style.display = "";
          if (state.selectedA) updateWorkflowStep(2, false);
          return true;
        },
      };

      // ── Run History helpers ────────────────────────────────────────────────
      function renderRunHistory() {
        const list = document.getElementById("run-history-list");
        if (!list) return;
        list.innerHTML = "";
        if (!state.runHistory || state.runHistory.length === 0) {
          const empty = document.createElement("div");
          empty.className = "history-empty";
          empty.textContent = "No test runs yet — results will appear here after each run.";
          list.appendChild(empty);
          return;
        }
        const SEV_LABELS = {
          safe: "🟢 Safe", stressed: "🟡 Stressed",
          warning: "🟠 Warning", critical: "🔴 Critical", failed: "💀 Destroyed",
        };
        state.runHistory.forEach((run) => {
          const item = document.createElement("div");
          item.className = "history-item";

          const header = document.createElement("div");
          header.className = "history-item-header";

          const name = document.createElement("div");
          name.className = "history-item-name";
          const displayName = run.componentBName
            ? `${run.componentAName} vs ${run.componentBName}`
            : run.componentAName;
          name.textContent = displayName;
          name.title = displayName;

          const time = document.createElement("div");
          time.className = "history-item-time";
          try {
            const d = new Date(run.timestamp);
            if (!isNaN(d.getTime())) {
              time.textContent = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
              time.title = d.toLocaleString();
            }
          } catch (e) { /* ignore */ }

          header.appendChild(name);
          header.appendChild(time);
          item.appendChild(header);

          const metricsRow = document.createElement("div");
          metricsRow.className = "history-item-metrics";

          const ma = run.metricsA;
          if (ma) {
            if (Number.isFinite(ma.powerDissipation)) {
              const s = document.createElement("span");
              s.className = "history-item-metric";
              s.textContent = `P: ${formatWithUnit(ma.powerDissipation, "W")}`;
              metricsRow.appendChild(s);
            }
            if (Number.isFinite(ma.currentRms)) {
              const s = document.createElement("span");
              s.className = "history-item-metric";
              s.textContent = `I: ${formatWithUnit(ma.currentRms, "A")}`;
              metricsRow.appendChild(s);
            }
            if (Number.isFinite(ma.thermalRise)) {
              const s = document.createElement("span");
              s.className = "history-item-metric";
              s.textContent = `ΔT: ${ma.thermalRise.toFixed(1)} °C`;
              metricsRow.appendChild(s);
            }
          }
          if (Number.isFinite(run.testVoltage)) {
            const s = document.createElement("span");
            s.className = "history-item-metric";
            s.textContent = `${run.testVoltage} V / ${run.testTemperatureC} °C`;
            metricsRow.appendChild(s);
          }

          const sevSpan = document.createElement("span");
          sevSpan.className = `history-item-severity his-sev-${run.severityA || "safe"}`;
          sevSpan.textContent = SEV_LABELS[run.severityA] || "🟢 Safe";
          metricsRow.appendChild(sevSpan);

          item.appendChild(metricsRow);
          list.appendChild(item);
        });
      }

      const stat = document.getElementById(STAT_ID);

      if (mode === 'compare') {
        const A = calc(typeA, valueA);
        const B = calc(typeB, Number.isFinite(valueB) ? valueB : valueA);
        if (stat) {
          stat.textContent = `A (${descriptorLabelA}): ${JSON.stringify(A)} | B (${descriptorLabelB}): ${JSON.stringify(B)}`;
        }
        reportStatus(`Compare test complete: ${descriptorLabelA} vs ${descriptorLabelB}.`);
      } else {
        const A = calc(typeA, valueA);
        if (stat) {
          stat.textContent = `A (${descriptorLabelA}): ${JSON.stringify(A)}`;
        }
        reportStatus(`Single test complete: ${descriptorLabelA} metrics refreshed.`);
      }

    function exportResults() {
      const statText = document.getElementById(STAT_ID)?.textContent || 'Arena export (no data)';
      const blob = new Blob([statText], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'arena-results.txt';
      a.click();
      reportStatus('Exported the latest arena snapshot.');
    }

    document.getElementById(MODE_ID).addEventListener('change', (event) => {
      const select = event.target;
      const compare = select.value === 'compare';
      document.querySelectorAll('.compare-only').forEach((element) => {
        element.style.display = compare ? '' : 'none';
      });
      syncMeshVisibility(select.value);
    });

    window.addEventListener('message', (event) => {
      const { data } = event;
      if (!data || typeof data !== 'object') {
        return;
      }

      const { type, payload } = data;

      switch (type) {
        case 'arena:configure':
          applyConfig(payload);
          break;
        case 'arena:reset':
          resetArena();
          break;
        case 'arena:run-test':
          runTest();
          break;
        case 'arena:export':
          exportResults();
          break;
        case 'arena:register-components': {
          const payloadObject = payload && typeof payload === 'object' ? payload : {};
          const components = Array.isArray(payloadObject.components) ? payloadObject.components : [];
          ingestManufacturerRoster(components);
          const count = manufacturerRoster.length;
          reportStatus(`Registered ${count} manufacturer component${count === 1 ? '' : 's'} for arena matchups.`);
          const stat = document.getElementById(STAT_ID);
          if (stat) {
            stat.textContent = `Arena bench updated (${count} components).`;
          }
          if (typeof window !== 'undefined' && window.parent && typeof window.parent.postMessage === 'function') {
            window.parent.postMessage({ type: 'arena:components-registered', payload: { count } }, '*');
          }
          break;
        }
        default:
          break;
      }
    });

    init();
    notifyReady();

        // 1. Register the component with the main arena state via the public bridge.

            id: fc.id,
            name: `${fc.mfr} ${fc.name}`,

              defaultProperties: Object.assign({}, fc.props),
            });

          if (!Array.from(selectA.options).some((o) => o.value === fc.id)) {
            const opt = document.createElement("option");
            opt.value = fc.id;
            opt.text = `${fc.mfr} ${fc.name}`;
            selectA.appendChild(opt);

        }

        // 2. Load into the correct slot (A or B) via the bridge.
        if (window.ArenaAPI && typeof window.ArenaAPI.loadComponent === "function") {
          window.ArenaAPI.loadComponent(fc.id, target);
        }

        // 3. Persist so the component survives a page reload.
        try {
          const saved = JSON.parse(localStorage.getItem("arena.v1.featured") || "[]");
          if (!saved.find((s) => s.id === fc.id)) {
            saved.push({ id: fc.id, mfr: fc.mfr, name: fc.name, spec: fc.spec, type: fc.type, props: fc.props });
            if (saved.length > 30) saved.shift();
            localStorage.setItem("arena.v1.featured", JSON.stringify(saved));
          }
        } catch (e) { /* storage unavailable */ }

        activeId = fc.id;
        renderPage();
      }

      // ── Type metadata for pills and icons ─────────────────────────────────
      const TYPE_META = {
        battery:           { label: "Batteries",    icon: "🔋" },
        resistor:          { label: "Resistors",    icon: "🟫" },
        capacitor:         { label: "Capacitors",   icon: "⚡" },
        led:               { label: "LEDs",          icon: "💡" },
        diode:             { label: "Diodes",        icon: "🔺" },
        zener_diode:       { label: "Zener",         icon: "⚡" },
        bjt:               { label: "BJTs",          icon: "🔌" },
        "bjt-npn":         { label: "BJTs",          icon: "🔌" },
        "bjt-pnp":         { label: "BJTs",          icon: "🔌" },
        mosfet:            { label: "MOSFETs",       icon: "🔋" },
        voltage_regulator: { label: "Regulators",   icon: "🔧" },
        opamp:             { label: "Op-Amps",       icon: "📡" },
        ic:                { label: "ICs",           icon: "💡" },
        inductor:          { label: "Inductors",     icon: "〰️" },
        crystal:           { label: "Crystals",      icon: "🔷" },
        thermistor:        { label: "Thermistors",   icon: "🌡️" },
        fuse:              { label: "Fuses",          icon: "🔗" },
      };

      // Derive ordered unique category labels from the component list.
      function resolveCategory(type) {
        // Merge bjt / bjt-npn / bjt-pnp into same bucket
        const t = (type === "bjt-pnp" || type === "bjt-npn") ? "bjt" : type;
        return TYPE_META[t] ? TYPE_META[t].label : type.replace(/_/g, " ");
      }

      const ALL_CATEGORIES = (() => {
        const seen = new Set();
        const ordered = [];
        FEATURED_COMPONENTS.forEach((fc) => {
          const cat = resolveCategory(fc.type);
          if (!seen.has(cat)) { seen.add(cat); ordered.push(cat); }
        });
        return ordered;
      })();

      let activeTypeFilter = null; // null = All
      let searchQuery = "";

      function filteredComponents() {
        const q = searchQuery.trim().toLowerCase();
        return FEATURED_COMPONENTS.filter((fc) => {
          const matchesType = !activeTypeFilter || resolveCategory(fc.type) === activeTypeFilter;
          const matchesSearch = !q ||
            fc.mfr.toLowerCase().includes(q) ||
            fc.name.toLowerCase().includes(q) ||
            fc.spec.toLowerCase().includes(q) ||
            fc.type.toLowerCase().includes(q);
          return matchesType && matchesSearch;
        });
      }

      // ── Render the scrollable component list ──────────────────────────────
      function renderPage() {
        grid.innerHTML = "";
        const items = filteredComponents();

        if (!items.length) {
          const empty = document.createElement("div");
          empty.style.cssText = "padding:12px;text-align:center;color:rgba(148,163,184,0.5);font-size:11px;";
          empty.textContent = "No components match your search.";
          grid.appendChild(empty);
          return;
        }

        // Group by category for section headers
        const grouped = new Map();
        items.forEach((fc) => {
          const cat = resolveCategory(fc.type);
          if (!grouped.has(cat)) grouped.set(cat, []);
          grouped.get(cat).push(fc);
        });

        grouped.forEach((fcs, cat) => {
          // Only show category header when not filtered to one type
          if (!activeTypeFilter) {
            const catHeader = document.createElement("div");
            catHeader.className = "catalog-category-label";
            catHeader.textContent = cat;
            grid.appendChild(catHeader);
          }

          fcs.forEach((fc) => {
            const meta = TYPE_META[fc.type] || { icon: "🔩" };
            const row = document.createElement("div");
            row.className = "featured-component-row" + (fc.id === activeId ? " selected" : "");
            row.setAttribute("role", "listitem");
            row.setAttribute("tabindex", "0");

            const badge = document.createElement("div");
            badge.className = "fcrw-type-badge";
            badge.textContent = meta.icon;
            badge.setAttribute("aria-hidden", "true");

            const info = document.createElement("div");
            info.className = "fcrw-info";

            const nameEl = document.createElement("div");
            nameEl.className = "fcrw-name";
            nameEl.textContent = fc.name;

            const mfrEl = document.createElement("div");
            mfrEl.className = "fcrw-mfr";
            mfrEl.textContent = fc.mfr;

            const specEl = document.createElement("div");
            specEl.className = "fcrw-spec";
            specEl.textContent = fc.spec;

            info.appendChild(nameEl);
            info.appendChild(mfrEl);
            info.appendChild(specEl);

            // Slot A / B quick-load buttons
            const btnWrap = document.createElement("div");
            btnWrap.className = "fcrw-load-btns";

            const btnA = document.createElement("button");
            btnA.className = "fcrw-slot-btn";
            btnA.textContent = "A";
            btnA.title = `Load ${fc.mfr} ${fc.name} into Component A`;
            btnA.addEventListener("click", (e) => { e.stopPropagation(); loadFeaturedComponent(fc, "A"); });

            const btnB = document.createElement("button");
            btnB.className = "fcrw-slot-btn slot-b";
            btnB.textContent = "B";
            btnB.title = `Load ${fc.mfr} ${fc.name} into Component B`;
            btnB.addEventListener("click", (e) => { e.stopPropagation(); loadFeaturedComponent(fc, "B"); });

            btnWrap.appendChild(btnA);
            btnWrap.appendChild(btnB);

            row.appendChild(badge);
            row.appendChild(info);
            row.appendChild(btnWrap);

            // Clicking the row itself loads into the current default slot
            row.addEventListener("click", () => loadFeaturedComponent(fc, catalogTarget));
            row.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); loadFeaturedComponent(fc, catalogTarget); } });
            grid.appendChild(row);
          });
        });
      }

      // ── Build type-filter pills ────────────────────────────────────────────
      const filtersContainer = document.getElementById("catalog-type-filters");
      function renderTypePills() {
        if (!filtersContainer) return;
        filtersContainer.innerHTML = "";

        const allPill = document.createElement("button");
        allPill.className = "catalog-type-pill" + (!activeTypeFilter ? " active" : "");
        allPill.textContent = "All";
        allPill.addEventListener("click", () => { activeTypeFilter = null; renderTypePills(); renderPage(); });
        filtersContainer.appendChild(allPill);

        ALL_CATEGORIES.forEach((cat) => {
          const pill = document.createElement("button");
          pill.className = "catalog-type-pill" + (activeTypeFilter === cat ? " active" : "");
          pill.textContent = cat;
          pill.addEventListener("click", () => { activeTypeFilter = activeTypeFilter === cat ? null : cat; renderTypePills(); renderPage(); });
          filtersContainer.appendChild(pill);
        });
      }

      // ── Wire up search ─────────────────────────────────────────────────────
      const searchInput = document.getElementById("catalog-search");
      if (searchInput) {
        searchInput.addEventListener("input", () => {
          searchQuery = searchInput.value;
          renderPage();
        });
      }

      renderTypePills();
      renderPage();

      // ── Restore featured components saved in previous sessions ─────────────
      // Re-register them with FailureEngine and ArenaAPI so they appear in the
      // component selectors without the user needing to click them again.
      try {
        const saved = JSON.parse(localStorage.getItem("arena.v1.featured") || "[]");
        saved.forEach((fc) => {
          if (typeof FailureEngine !== "undefined" && FailureEngine.registerComponentType) {
            FailureEngine.registerComponentType(fc.id, {
              family: fc.type,
              defaultProperties: Object.assign({}, fc.props),
            });
          }
          if (window.ArenaAPI && typeof window.ArenaAPI.registerComponent === "function") {
            window.ArenaAPI.registerComponent({
              id: fc.id,
              name: `${fc.mfr} ${fc.name}`,
              type: fc.type,
              properties: fc.props,
              metadata: { displayName: fc.name, partNumber: fc.name, vendor: fc.mfr, source: "Reference Library" },
            });
          }
        });
      } catch (e) { /* storage unavailable */ }
    })();
  </script>
  <!-- Stress Timeline Strip -->
  <div class="stress-timeline" id="stress-timeline" role="region" aria-label="Stress timeline" style="display:none;">
    <div class="stress-timeline-header">
      <span class="stress-timeline-label">Stress Timeline</span>
      <div class="stress-timeline-controls">
        <button class="stress-ctrl-btn" id="tl-play" aria-label="Play timeline">▶ Play</button>
        <button class="stress-ctrl-btn" id="tl-step" aria-label="Step forward">Step ▸</button>
        <button class="stress-ctrl-btn" id="tl-close" aria-label="Close timeline">✕</button>
      </div>
    </div>
    <canvas class="stress-timeline-canvas" id="stress-timeline-canvas" aria-label="Stress timeline graph" role="img"></canvas>
  </div>
</body>
</html>
