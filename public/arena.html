      // ---------- Runtime Profile Registration API ----------
      /**
       * Register or override a component type profile at runtime.
       * Used when importing branded/third-party components that provide their own specs.
       *
       * @param {string} type - Component type string (e.g. "my-custom-sensor")
       * @param {Object} spec - { defaultProperties, failureModes, palette, family }
       *   - defaultProperties: {Object} default electrical/thermal properties
       *   - failureModes: {Object} map of mode name → { name, visual, physicalDescription, trigger, severity }
       *   - palette: {Object} { base, glow, orbit } hex colors (optional)
       *   - family: {string} canonical family to fall back to for 3D model (optional)
       */
      function registerComponentType(type, spec) {
        if (!type || typeof type !== "string" || !spec || typeof spec !== "object") {
          console.warn("registerComponentType: invalid arguments", type, spec);
          return;
        }
        const key = type.toLowerCase().trim();

        if (spec.defaultProperties && typeof spec.defaultProperties === "object") {
          COMPONENT_PROFILES[key] = { defaultProperties: Object.assign({}, spec.defaultProperties) };
        } else if (!COMPONENT_PROFILES[key]) {
          COMPONENT_PROFILES[key] = { defaultProperties: {} };
        }

        if (spec.failureModes && typeof spec.failureModes === "object") {
          COMPONENT_FAILURE_PROFILES[key] = { modes: Object.assign({}, spec.failureModes) };
        }

        if (spec.palette && typeof spec.palette === "object") {
          COMPONENT_PALETTES[key] = Object.assign({}, COMPONENT_PALETTES.default, spec.palette);
        }

        if (spec.family && typeof spec.family === "string") {
          COMPONENT_FAMILY_MAP[key] = spec.family;
        }
      }

      /**
       * Register additional failure modes for an existing or new component type.
       * Merges with any existing modes rather than replacing them.
       *
       * @param {string} type - Component type string
       * @param {Object} modes - Map of mode name → failure mode descriptor
       */
      function registerFailureProfile(type, modes) {
        if (!type || typeof type !== "string" || !modes || typeof modes !== "object") {
          console.warn("registerFailureProfile: invalid arguments", type, modes);
          return;
        }
        const key = type.toLowerCase().trim();
        if (!COMPONENT_FAILURE_PROFILES[key]) {
          COMPONENT_FAILURE_PROFILES[key] = { modes: {} };
        }
        Object.assign(COMPONENT_FAILURE_PROFILES[key].modes, modes);
      }
        if (!component || !metrics) {
          return { failed: false, severity: 0, mode: null, description: null, name: null, visual: null };
        }
        const profile = COMPONENT_FAILURE_PROFILES[component.type];
        if (!profile) {
          return { failed: false, severity: 0, mode: null, description: null, name: null, visual: null };
        }
        const props = component.properties || {};
        let worstSeverity = 0;
        let worstMode = null;
        for (const [_modeName, modeData] of Object.entries(profile.modes)) {
          if (modeData.trigger(metrics, props)) {
            const sev = modeData.severity ? Math.max(0, modeData.severity(metrics, props)) : 1;
            if (sev > worstSeverity) {
              worstSeverity = sev;
              worstMode = modeData;
            }
          }
        }
        if (worstSeverity <= 0) {
          return { failed: false, severity: 0, mode: null, description: null, name: null, visual: null };
        }
        return {
          failed: worstSeverity >= 2,
          severity: worstSeverity,
          mode: worstMode,
          description: worstMode ? worstMode.physicalDescription : null,
          name: worstMode ? worstMode.name : null,
          visual: worstMode ? worstMode.visual : null,
        };
      }

      // ---------- Failure Particles ----------
      function createFailureParticles(group, mode) {
        if (!scene || !group) {
          return null;
        }
        const isSpark = mode === "arc" || mode === "burst";
        const count = isSpark ? 42 : 26;
        const positions = new Float32Array(count * 3);
        const velocities = [];
        const lifetimes = new Float32Array(count);

        const pos = new THREE.Vector3();
        group.getWorldPosition(pos);

        for (let i = 0; i < count; i++) {
          positions[i * 3] = pos.x + (Math.random() - 0.5) * 0.5;
          positions[i * 3 + 1] = pos.y + Math.random() * 0.4;
          positions[i * 3 + 2] = pos.z + (Math.random() - 0.5) * 0.5;
          if (isSpark) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.8 + Math.random() * 2.2;
            velocities.push({
              x: Math.cos(angle) * speed,
              y: (0.5 + Math.random() * 2) * speed,
              z: Math.sin(angle) * speed,
            });
            lifetimes[i] = 0.25 + Math.random() * 0.5;
          } else {
            velocities.push({
              x: (Math.random() - 0.5) * 0.18,
              y: 0.35 + Math.random() * 0.55,
              z: (Math.random() - 0.5) * 0.18,
            });
            lifetimes[i] = 0.9 + Math.random() * 1.6;
          }
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

        const color =
          mode === "arc" ? 0xffff66 :
          mode === "burst" ? 0xff8822 :
          mode === "glow" ? 0xff6600 : 0x999999;

        const mat = new THREE.PointsMaterial({
          color,
          size: isSpark ? 0.1 : 0.065,
          transparent: true,
          opacity: isSpark ? 0.95 : 0.75,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });

        const points = new THREE.Points(geo, mat);
        points.frustumCulled = false;
        scene.add(points);

        const maxAge = isSpark ? 1.8 : Infinity;
        const system = { group, points, velocities, lifetimes, mode, age: 0, maxAge };
        failureParticleSystems.push(system);
        if (!group.userData.failureParticleSystem) {
          group.userData.failureParticleSystem = system;
        }
        return system;
      }

      function clearFailureParticles(group) {
        for (let s = failureParticleSystems.length - 1; s >= 0; s--) {
          if (failureParticleSystems[s].group === group) {
            const sys = failureParticleSystems[s];
            if (scene) {
              scene.remove(sys.points);
            }
            sys.points.geometry.dispose();
            sys.points.material.dispose();
            failureParticleSystems.splice(s, 1);
          }
        }
        group.userData.failureParticleSystem = null;
        group.userData.smokeActive = false;
      }

      function updateFailureParticles(delta) {
        const tempPos = new THREE.Vector3();
        for (let s = failureParticleSystems.length - 1; s >= 0; s--) {
          const sys = failureParticleSystems[s];
          sys.age += delta;
          if (sys.maxAge !== Infinity && sys.age > sys.maxAge) {
            if (scene) {
              scene.remove(sys.points);
            }
            sys.points.geometry.dispose();
            sys.points.material.dispose();
            failureParticleSystems.splice(s, 1);
            if (sys.group && sys.group.userData.failureParticleSystem === sys) {
              sys.group.userData.failureParticleSystem = null;
            }
            continue;
          }

          const posAttr = sys.points.geometry.getAttribute("position");
          sys.group.getWorldPosition(tempPos);
          const isSpark = sys.mode === "arc" || sys.mode === "burst";

          for (let i = 0; i < sys.velocities.length; i++) {
            sys.lifetimes[i] -= delta;
            if (sys.lifetimes[i] <= 0) {
              if (!isSpark) {
                // Respawn smoke at component origin
                posAttr.array[i * 3] = tempPos.x + (Math.random() - 0.5) * 0.4;
                posAttr.array[i * 3 + 1] = tempPos.y + Math.random() * 0.3;
                posAttr.array[i * 3 + 2] = tempPos.z + (Math.random() - 0.5) * 0.4;
                sys.velocities[i] = {
                  x: (Math.random() - 0.5) * 0.18,
                  y: 0.35 + Math.random() * 0.55,
                  z: (Math.random() - 0.5) * 0.18,
                };
                sys.lifetimes[i] = 0.9 + Math.random() * 1.6;
              } else {
                posAttr.array[i * 3 + 1] = -200;
              }
              continue;
            }
            posAttr.array[i * 3] += sys.velocities[i].x * delta;
            posAttr.array[i * 3 + 1] += sys.velocities[i].y * delta;
            posAttr.array[i * 3 + 2] += sys.velocities[i].z * delta;
          }
          posAttr.needsUpdate = true;
        }
      }

      // ---------- Failure Visual Effects ----------
      function applyFailureVisuals(group, failure) {
        if (!group || !failure || failure.severity <= 0) {
          return;
        }
        const { visual, severity } = failure;
        const intensity = Math.min(severity / 3, 1);

        if (group.userData.failureMode !== visual) {
          clearFailureParticles(group);
          group.userData.failureMode = visual;
        }

        const core = group.userData.core;
        const halo = group.userData.halo;

        switch (visual) {
          case "char":
          case "smoke":
            if (core && core.material) {
              core.material.color.setRGB(
                0.2 + (1 - intensity) * 0.4,
                0.13 + (1 - intensity) * 0.15,
                0.08
              );
              core.material.emissive.setRGB(0.1 + intensity * 0.04, 0.03, 0);
              core.material.emissiveIntensity = 0.08;
              core.material.roughness = 0.95;
              core.material.metalness = 0;
            }
            if (halo) {
              halo.material.color.setHex(0x331100);
              halo.material.opacity = 0.08;
            }
            if (severity >= 1.2 && !group.userData.smokeActive) {
              createFailureParticles(group, "smoke");
              group.userData.smokeActive = true;
            }
            break;

          case "blowout":
            // LED specifically: all light out, lens darkens
            group.traverse((child) => {
              if (child.material) {
                const m = child.material;
                m.emissiveIntensity = 0;
                m.color.setHex(0x150800);
                m.roughness = 0.98;
                m.metalness = 0;
              }
            });
            if (severity >= 1.0 && !group.userData.smokeActive) {
              createFailureParticles(group, "smoke");
              group.userData.smokeActive = true;
            }
            break;

          case "melt":
            if (core && core.material) {
              core.material.color.setRGB(0.75 - intensity * 0.25, 0.2 - intensity * 0.1, 0.02);
              core.material.emissive.setRGB(0.55 - intensity * 0.1, 0.08, 0);
              core.material.emissiveIntensity = 0.35 + intensity * 0.7;
              core.material.roughness = 0.55;
              core.material.metalness = 0.15;
            }
            // Sagging geometry: widen, compress vertically
            {
              const bS = group.userData.baseScale || 1;
              group.scale.set(bS * (1 + intensity * 0.32), bS * (1 - intensity * 0.22), bS * (1 + intensity * 0.32));
            }
            if (halo) {
              halo.material.color.setHex(0xff4400);
              halo.material.opacity = 0.28 + intensity * 0.42;
            }
            if (severity >= 1.0 && !group.userData.smokeActive) {
              createFailureParticles(group, "smoke");
              group.userData.smokeActive = true;
            }
            break;

          case "arc":
            if (core && core.material) {
              core.material.color.setRGB(0.18, 0.1, 0.06);
              core.material.emissive.setRGB(0.2, 0.03, 0);
              core.material.emissiveIntensity = 0.1;
              core.material.roughness = 0.92;
            }
            if (!group.userData.smokeActive) {
              createFailureParticles(group, "arc");
              group.userData.smokeActive = true;
            }
            if (halo) {
              halo.material.color.setHex(0xffee44);
              halo.material.opacity = 0.4 + Math.sin(Date.now() * 0.025) * 0.35;
            }
            break;

          case "burst":
            if (core && core.material) {
              core.material.color.setRGB(0.28, 0.12, 0.04);
              core.material.emissive.setRGB(0.35, 0.08, 0);
              core.material.emissiveIntensity = 0.18;
              core.material.roughness = 0.92;
            }
            {
              const bS = group.userData.baseScale || 1;
              group.scale.set(bS * (1 + intensity * 0.42), bS * (1 + intensity * 0.28), bS * (1 + intensity * 0.42));
            }
            if (!group.userData.smokeActive) {
              createFailureParticles(group, "burst");
              group.userData.smokeActive = true;
            }
            break;

          case "vent":
            if (core && core.material) {
              core.material.color.setRGB(0.45, 0.16, 0.04);
              core.material.emissive.setRGB(0.25, 0.08, 0);
              core.material.emissiveIntensity = 0.28 + intensity * 0.28;
            }
            {
              const bS = group.userData.baseScale || 1;
              group.scale.set(bS * (1 + intensity * 0.18), bS * (1 + intensity * 0.22), bS * (1 + intensity * 0.18));
            }
            if (severity >= 0.8 && !group.userData.smokeActive) {
              createFailureParticles(group, "smoke");
              group.userData.smokeActive = true;
            }
            break;

          case "glow":
            if (core && core.material) {
              const r = 0.45 + intensity * 0.45;
              const g = 0.1 + (1 - intensity) * 0.28;
              core.material.color.setRGB(r, g, 0.02);
              core.material.emissive.setRGB(r * 0.65, g * 0.1, 0);
              core.material.emissiveIntensity = 0.28 + intensity * 0.75;
            }
            if (halo) {
              halo.material.color.setHex(0xff6600);
              halo.material.opacity = 0.25 + intensity * 0.45;
            }
            if (severity >= 1.5 && !group.userData.smokeActive) {
              createFailureParticles(group, "glow");
              group.userData.smokeActive = true;
            }
            break;

          default:
            break;
        }
      }

      function clearFailureVisuals(group) {
        if (!group) {
          return;
        }
        clearFailureParticles(group);
        group.userData.failureMode = null;
        group.userData.smokeActive = false;
        group.scale.setScalar(group.userData.baseScale || 1);

        const palette = group.userData.palette || COMPONENT_PALETTES.default;
        const core = group.userData.core;
        if (core && core.material) {
          core.material.color.setHex(palette.base);
          core.material.emissive.setHex(palette.glow);
          core.material.emissiveIntensity = 0.35;
          core.material.roughness = 0.28;
          core.material.metalness = 0.35;
        }
        if (group.userData.halo) {
          group.userData.halo.material.color.setHex(palette.glow);
          group.userData.halo.material.opacity = 0.3;
        }
        // Restore other children that may have been overridden (e.g., LED bulb)
        group.traverse((child) => {
          if (child === core || !child.material) {
            return;
          }
          const m = child.material;
          if (m.color && m.emissiveIntensity !== undefined && m.emissiveIntensity < 0.1) {
            m.emissiveIntensity = 0.35;
          }
        });
      }

      // ---------- Failure Analysis UI ----------
      function renderFailureAnalysis(failureA, failureB) {
        const containerA = document.getElementById("failure-a");
        const containerB = document.getElementById("failure-b");
        renderFailureCard(containerA, failureA);
        renderFailureCard(containerB, failureB);
      }

      function renderFailureCard(container, failure) {
        if (!container) {
          return;
        }
        container.innerHTML = "";

        if (!failure || failure.severity <= 0) {
          const ok = document.createElement("div");
          ok.className = "failure-ok";
          ok.textContent = "Operating within ratings.";
          container.appendChild(ok);
          return;
        }

        const severityLabel =
          failure.severity >= 2.5 ? "FAILED" :
          failure.severity >= 1.5 ? "CRITICAL" :
          failure.severity >= 0.8 ? "WARNING" : "STRESSED";

        const severityClass =
          failure.severity >= 2.5 ? "failure-failed" :
          failure.severity >= 1.5 ? "failure-critical" :
          failure.severity >= 0.8 ? "failure-warning" : "failure-stressed";

        const badge = document.createElement("div");
        badge.className = `failure-badge ${severityClass}`;
        badge.textContent = severityLabel;

        const name = document.createElement("div");
        name.className = "failure-name";
        name.textContent = failure.name || "Failure";

        const desc = document.createElement("div");
        desc.className = "failure-desc";
        desc.textContent = failure.description || "";

        container.appendChild(badge);
        container.appendChild(name);
        container.appendChild(desc);
      }

      function triggerFailureAnimation(group, failure) {
        if (!group) {
          return;
        }
        if (!failure || failure.severity <= 0) {
          clearFailureVisuals(group);
          return;
        }
        applyFailureVisuals(group, failure);
        if (failure.severity >= 2) {
          triggerPulse(Math.min(failure.severity / 3, 1));
        }
      }

      function energizeComponent(group, energy) {
        if (!group) {
          return;
        }
        group.userData.energy = energy;
        const core = group.userData.core;
        if (core && core.material) {
          core.material.emissiveIntensity = 0.3 + energy * 1.2;
        }
        group.scale.setScalar(group.userData.baseScale * (0.9 + energy * 0.45));
        if (group.userData.halo) {
          group.userData.halo.material.opacity = 0.22 + energy * 0.5;
          group.userData.halo.scale.setScalar(1 + energy * 0.8);
        }
      }

      function computeVisualEnergy(component, metrics) {
        if (!component) {
          return 0.24;
        }
        const fallback = Math.abs(extractNominalValue(component)) || 0.1;
        if (!metrics) {
          return THREE.MathUtils.clamp(Math.log10(fallback + 1.5) / 2.5, 0.18, 1);
        }
        const values = [
          metrics.powerDissipation,
          metrics.currentRms,
          metrics.impedance,
          metrics.storedEnergy,
          metrics.energyDelivered,
          metrics.thermalRise,
        ];
        let magnitude = Math.abs(fallback);
        values.forEach((value) => {
          if (Number.isFinite(value)) {
            magnitude = Math.max(magnitude, Math.abs(value));
          }
        });
        const normalized = Math.log10(magnitude + 1.5) / 2.5;
        return THREE.MathUtils.clamp(normalized, 0.18, 1);
      }

      function extractNominalValue(component) {
        if (!component) {
          return 1;
        }
        const props = component.properties || {};
        const candidates = [
          props.resistance,
          props.capacitance,
          props.inductance,
          props.forwardVoltage,
          props.voltage,
          props.internalResistance,
          props.onResistance,
          props.seriesResistance,
          props.capacityMah,
        ];
        for (const value of candidates) {
          if (typeof value === "number" && Number.isFinite(value) && value !== 0) {
            return Math.abs(value);
          }
        }
        return 1;
      }

      function normalizeComponent(raw, sourceLabel) {
        if (!raw || typeof raw !== "object") {
          return null;
        }
        const type = typeof raw.type === "string" ? raw.type.toLowerCase() : "generic";
        const properties = Object.assign({}, COMPONENT_PROFILES[type]?.defaultProperties || {}, raw.properties || {});
        const metadata = Object.assign({}, raw.metadata || {});
        const id = typeof raw.id === "string" && raw.id.length > 0 ? raw.id : `${type}-${Math.random().toString(36).slice(2, 9)}`;
        const name = raw.name || metadata.displayName || raw.identifier || id;
        return {
          id,
          name,
          type,
          properties,
          metadata,
          source: sourceLabel || metadata.source || "library",
        };
      }

      function initializeCatalog() {
        state.components = DEFAULT_COMPONENT_CATALOG.map((entry) => normalizeComponent(entry, "reference"))
          .filter(Boolean);
        state.selectedA = state.components[0] || null;
        state.selectedB = state.components.length > 1 ? state.components[1] : state.components[0] || null;
        renderImportSummary(buildSummaryFromComponents(state.components));
      }

      function registerEvents() {
        const resetBtn = document.getElementById("btn-reset");
        if (resetBtn) {
          resetBtn.addEventListener("click", resetArena);
        }

        const runBtn = document.getElementById("btn-run");
        if (runBtn) {
          runBtn.addEventListener("click", runTest);
        }

        const exportBtn = document.getElementById("btn-export");
        if (exportBtn) {
          exportBtn.addEventListener("click", exportResults);
        }

        const importBuilderBtn = document.getElementById("btn-import-builder");
        if (importBuilderBtn) {
          importBuilderBtn.addEventListener("click", () => {
            const loaded = loadLatestBuilderExport();
            if (!loaded) {
              setStatus("No builder export found. Sync from the builder to populate real components.");
            }
          });
        }

        const jsonInput = document.getElementById("input-import-json");
        if (jsonInput) {
          jsonInput.addEventListener("change", handleFileImport, false);
        }

        const modeSelect = document.getElementById("mode");
        if (modeSelect) {
          modeSelect.value = state.mode;
          modeSelect.addEventListener("change", (event) => {
            state.mode = event.target.value === "compare" ? "compare" : "single";
            updateCompareVisibility();
          });
        }

        const selectA = document.getElementById("component-a");
        if (selectA) {
          selectA.addEventListener("change", (event) => {
            state.selectedA = state.components.find((component) => component.id === event.target.value) || null;
            updateMeshesForSelection();
          });
        }

        const selectB = document.getElementById("component-b");
        if (selectB) {
          selectB.addEventListener("change", (event) => {
            state.selectedB = state.components.find((component) => component.id === event.target.value) || null;
            updateMeshesForSelection();
          });
        }

        [
          "input-voltage",
          "input-frequency",
          "input-temperature",
          "input-humidity",
          "input-duty",
          "input-duration",
          "input-load",
        ].forEach((id) => {
          const input = document.getElementById(id);
          if (input) {
            input.addEventListener("change", readTestVariables);
            input.addEventListener("blur", readTestVariables);
          }
        });

        const reloadBtn = document.getElementById("reload-import");
        if (reloadBtn) {
          reloadBtn.addEventListener("click", () => {
            const payload = loadArenaPayloadFromStorage({ announce: true });
            if (!payload) {
              setStatus("No builder snapshot found. Sync from the builder to populate real components.");
            }
          });
        }

        document.querySelectorAll("[data-command]").forEach((button) => {
          button.addEventListener("click", () => {
            const command = button.getAttribute("data-command");
            if (command) {
              handleCommand(command);
            }
          });
        });
      }

      function populateComponentSelectors() {
        const selectA = document.getElementById("component-a");
        const selectB = document.getElementById("component-b");
        if (!selectA || !selectB) {
          return;
        }

        const options = state.components.map((component) => ({
          value: component.id,
          label: `${component.name} (${component.type})`,
        }));

        const populateSelect = (select, selectedId, placeholder) => {
          select.innerHTML = "";
          const placeholderOption = document.createElement("option");
          placeholderOption.value = "";
          placeholderOption.textContent = placeholder;
          select.appendChild(placeholderOption);
          options.forEach((option) => {
            const opt = document.createElement("option");
            opt.value = option.value;
            opt.textContent = option.label;
            select.appendChild(opt);
          });

          if (selectedId && options.some((option) => option.value === selectedId)) {
            select.value = selectedId;
          } else if (options.length > 0) {
            select.value = options[0].value;
          } else {
            select.value = "";
          }
        };

        populateSelect(selectA, state.selectedA?.id || "", "Select component A");
        populateSelect(selectB, state.selectedB?.id || "", "Select component B");

        state.selectedA = state.components.find((component) => component.id === selectA.value) || null;
        state.selectedB = state.components.find((component) => component.id === selectB.value) || null;
        const modeSelect = document.getElementById("mode");
        const hasOpponents = state.components.length > 1 && Boolean(state.selectedA) && Boolean(state.selectedB);
        state.mode = hasOpponents ? "compare" : "single";
        if (modeSelect) {
          modeSelect.value = state.mode;
        }
        updateMeshesForSelection();
      }

      function updateCompareVisibility() {
        const compare = state.mode === "compare";
        document.querySelectorAll(".compare-only").forEach((element) => {
          // "flex" is used explicitly: setting "" would clear the inline style, restoring
          // the CSS rule `.compare-only { display: none }` which would hide the element again.
          element.style.display = compare ? "flex" : "none";
        });
        if (componentGroupB) {
          componentGroupB.visible = compare && Boolean(state.selectedB);
        }
      }

      function updateMeshesForSelection() {
        const groupA = ensureComponentGroup("A", state.selectedA);
        if (groupA) {
          energizeComponent(groupA, 0.24);
        }
        const groupB = ensureComponentGroup("B", state.selectedB);
        if (groupB) {
          energizeComponent(groupB, 0.24);
        }
        updateCompareVisibility();
      }

      function readTestVariables() {
        const readNumber = (id, fallback) => {
          const input = document.getElementById(id);
          if (!input) {
            return fallback;
          }
          const value = Number.parseFloat(input.value);
          if (Number.isFinite(value)) {
            return value;
          }
          return fallback;
        };

        state.testVariables = {
          voltage: readNumber("input-voltage", state.testVariables.voltage),
          frequencyHz: readNumber("input-frequency", state.testVariables.frequencyHz),
          temperatureC: readNumber("input-temperature", state.testVariables.temperatureC),
          ambientHumidityPercent: readNumber("input-humidity", state.testVariables.ambientHumidityPercent),
          dutyCyclePercent: readNumber("input-duty", state.testVariables.dutyCyclePercent),
          durationSeconds: readNumber("input-duration", state.testVariables.durationSeconds),
          loadImpedanceOhms: readNumber("input-load", state.testVariables.loadImpedanceOhms),
        };

        return state.testVariables;
      }

      function setImportStatus(message) {
        const element = document.getElementById("import-status");
        if (!element) {
          return;
        }
        element.textContent = message;
      }

      function buildSummaryFromComponents(components) {
        if (!Array.isArray(components) || !components.length) {
          return null;
        }
        const byType = components.reduce((acc, component) => {
          const key = component.type || "unknown";
          acc[key] = (acc[key] || 0) + 1;
          return acc;
        }, {});
        return {
          totalComponents: components.length,
          totalWires: 0,
          totalJunctions: 0,
          byType,
        };
      }

      function renderImportSummary(summary) {
        if (importTagsElement) {
          importTagsElement.innerHTML = "";
        }
        if (componentSummaryElement) {
          componentSummaryElement.innerHTML = "";
        }

        const resolved = summary || buildSummaryFromComponents(state.components);
        if (!resolved) {
          return;
        }

        const chips = [
          ["Components", resolved.totalComponents ?? resolved.componentCount],
          ["Wires", resolved.totalWires ?? resolved.wireCount],
          ["Junctions", resolved.totalJunctions ?? resolved.junctionCount],
        ];

        if (importTagsElement) {
          chips.forEach(([label, value]) => {
            if (typeof value === "number" && Number.isFinite(value)) {
              const tag = document.createElement("span");
              tag.className = "import-tag";
              tag.textContent = `${label}: ${value}`;
              importTagsElement.appendChild(tag);
            }
          });
        }

        const byType = resolved.byType || resolved.componentsByType;
        if (componentSummaryElement && byType && typeof byType === "object") {
          Object.entries(byType)
            .filter((entry) => typeof entry[1] === "number" && Number.isFinite(entry[1]))
            .sort((a, b) => (b[1] ?? 0) - (a[1] ?? 0))
            .forEach(([type, count]) => {
              const li = document.createElement("li");
              const label = document.createElement("span");
              label.textContent = String(type);
              const value = document.createElement("span");
              value.textContent = String(count);
              li.appendChild(label);
              li.appendChild(value);
              componentSummaryElement.appendChild(li);
            });
        }
      }

      function updateImportStatus() {
        if (state.importManifest) {
          const manifest = state.importManifest;
          const exportedTime = manifest.exportedAt ? new Date(manifest.exportedAt) : null;
          const exportedLabel = exportedTime && !Number.isNaN(exportedTime.getTime())
            ? exportedTime.toLocaleString()
            : "unknown time";
          setImportStatus(
            `${manifest.label} - ${manifest.componentCount} component${manifest.componentCount === 1 ? "" : "s"} - ${manifest.sourceName || "unknown source"} - ${exportedLabel}`
          );
          renderImportSummary(manifest.summary || null);
        } else {
          setImportStatus("Using reference component library.");
          renderImportSummary(null);
        }
      }

      function readPersistedSession(sessionId) {
        if (!sessionId) {
          return null;
        }
        const key = `${STORAGE_KEYS.prefix}${sessionId}`;
        const stores = [window.localStorage, window.sessionStorage];
        for (const store of stores) {
          try {
            if (!store) {
              continue;
            }
            const raw = store.getItem(key);
            if (raw) {
              return JSON.parse(raw);
            }
          } catch (error) {
            console.warn("Arena storage read failed", error);
          }
        }
        return null;
      }

      function loadLatestBuilderExport() {
        let sessionId = null;
        try {
          sessionId = window.localStorage?.getItem(STORAGE_KEYS.last) || window.sessionStorage?.getItem(STORAGE_KEYS.last) || null;
        } catch (error) {
          console.warn("Unable to access storage for builder export", error);
        }

        if (!sessionId) {
          return false;
        }

        const envelope = readPersistedSession(sessionId);
        if (!envelope) {
          return false;
        }

        return applyImportEnvelope(envelope, {
          sessionId,
          label: envelope.payload?.sessionName || "Builder Export",
          source: "builder",
        });
      }

      function loadArenaPayloadFromStorage({ announce = false } = {}) {
        if (typeof window === "undefined" || typeof window.localStorage === "undefined") {
          return null;
        }
        let payload = null;
        try {
          payload = parseArenaPayload(window.localStorage.getItem(ARENA_STORAGE_KEY));
        } catch (error) {
          console.warn("Arena: unable to read quick import payload", error);
          payload = null;
        }

        if (!payload) {
          return null;
        }

        const applied = applyArenaPayload(payload, { source: payload.source || "builder", label: payload.label || "Builder Snapshot" });
        if (applied && announce) {
          setStatus("Reloaded builder snapshot.");
        } else if (!applied && announce) {
          setStatus("Unable to load builder snapshot.");
        }
        return applied ? payload : null;
      }

      function loadSessionFromUrl() {
        const url = new URL(window.location.href);
        const sessionId = url.searchParams.get("session");
        if (!sessionId) {
          return false;
        }
        const envelope = readPersistedSession(sessionId);
        if (!envelope) {
          setStatus("Unable to load requested session. Using current library instead.");
          return false;
        }
        return applyImportEnvelope(envelope, { sessionId, label: envelope.payload?.sessionName || "Builder Export", source: "builder" });
      }

      function parseArenaPayload(value) {
        if (!value) {
          return null;
        }
        try {
          const payload = JSON.parse(value);
          if (payload && typeof payload === "object") {
            return payload;
          }
        } catch (error) {
          console.warn("Arena: failed to parse import payload", error);
        }
        return null;
      }

      function applyImportEnvelope(envelope, options) {
        if (!envelope) {
          return false;
        }
        const payload = envelope.payload || envelope;
        const componentsRaw = Array.isArray(payload.components) ? payload.components : [];
        const normalized = componentsRaw
          .map((item) => normalizeComponent(item, payload.source?.name || options?.source || "import"))
          .filter(Boolean);

        if (!normalized.length) {
          setStatus("Import did not include any components. Retaining current library.");
          return false;
        }

        state.components = normalized;
        state.selectedA = normalized[0] || null;
        state.selectedB = normalized.length > 1 ? normalized[1] : normalized[0] || null;

        state.importManifest = {
          sessionId: envelope.sessionId || options?.sessionId || null,
          label: payload.sessionName || options?.label || "Imported Components",
          exportedAt: envelope.exportedAt || payload.exportedAt || new Date().toISOString(),
          sourceName: (payload.source && (payload.source.name || payload.source.type)) || options?.source || "import",
          componentCount: normalized.length,
          wireCount: Array.isArray(payload.wires) ? payload.wires.length : 0,
          metrics: payload.analysis || payload.metrics || null,
          summary: payload.summary || null,
        };

        populateComponentSelectors();
        updateCompareVisibility();
        updateImportStatus();
        setStatus("Loaded component set from import.");
        return true;
      }

      function applyArenaPayload(payload, options = {}) {
        if (!payload || typeof payload !== "object") {
          return false;
        }

        const fromPayload = (candidate, fallback) => {
          if (Array.isArray(candidate)) {
            return candidate;
          }
          if (fallback && Array.isArray(fallback)) {
            return fallback;
          }
          return [];
        };

        const components = fromPayload(payload.components, payload.state?.components);
        const wires = fromPayload(payload.wires, payload.state?.wires);
        const junctions = fromPayload(payload.junctions, payload.state?.junctions);

        const envelope = {
          sessionId: options.sessionId || payload.sessionId || null,
          exportedAt: payload.generatedAt ? new Date(payload.generatedAt).toISOString() : payload.exportedAt || null,
          payload: {
            components,
            wires,
            junctions,
            analysis: payload.metrics || payload.analysis || null,
            metrics: payload.metrics || null,
            summary: payload.summary || null,
            sessionName: payload.label || payload.sessionName || options.label || "Builder Snapshot",
            source: typeof payload.source === "object" && payload.source !== null
              ? payload.source
              : { name: String(payload.source || options.source || "builder") },
            testVariables: payload.testVariables || null,
            state: payload.state || { components },
          },
        };

        const applied = applyImportEnvelope(envelope, options);
        if (applied && payload.metrics && state.importManifest) {
          state.importManifest.metrics = payload.metrics;
        }
        if (applied && payload.summary && state.importManifest) {
          state.importManifest.summary = payload.summary;
        }
        if (applied && payload.generatedAt && state.importManifest) {
          state.importManifest.exportedAt = new Date(payload.generatedAt).toISOString();
        }
        return applied;
      }

      function handleFileImport(event) {
        const input = event.target;
        const file = input.files?.[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            const applied = applyImportEnvelope(data, {
              sessionId: data.sessionId || null,
              label: data.sessionName || "Uploaded Dataset",
              source: "upload",
            });
            if (applied) {
              setStatus("Imported components from JSON file.");
            } else {
              setStatus("Unable to import data from JSON file. Check format.");
            }
          } catch (error) {
            console.error("JSON import error", error);
            setStatus("Invalid JSON file. Unable to import components.");
          }
        };

        reader.readAsText(file);
        input.value = "";
      }

      function runTest() {
        if (!state.components.length) {
          setStatus("No components available. Import a component library first.");
          return;
        }

        readTestVariables();

        if (!state.selectedA) {
          state.selectedA = state.components[0];
        }

        const componentA = state.selectedA;
        const metricsA = computeComponentMetrics(componentA, state.testVariables);
        let componentB = null;
        let metricsB = null;

        if (state.mode === "compare") {
          componentB = state.selectedB || state.components[1] || componentA;
          state.selectedB = componentB;
          metricsB = componentB ? computeComponentMetrics(componentB, state.testVariables) : null;
        }

        renderMetricGrid("metrics-a", metricsA, { accent: "A" });
        renderMetricGrid("metrics-b", metricsB, { accent: "B" });

        const deltaMetrics = metricsB ? computeDeltaMetrics(metricsA, metricsB) : null;
        renderMetricGrid("metrics-delta", deltaMetrics, { accent: "delta", isDelta: true });

        updateMeshesForMetrics(metricsA, metricsB);

        // Failure detection and visual simulation
        const failureA = detectFailure(componentA, metricsA);
        const failureB = componentB ? detectFailure(componentB, metricsB) : null;

        const groupA = ensureComponentGroup("A", state.selectedA);
        if (groupA) {
          triggerFailureAnimation(groupA, failureA);
        }
        if (state.mode === "compare" && componentB) {
          const groupB = ensureComponentGroup("B", state.selectedB);
          if (groupB) {
            triggerFailureAnimation(groupB, failureB);
          }
        }

        renderFailureAnalysis(failureA, failureB);

        state.lastRun = {
          timestamp: new Date().toISOString(),
          mode: state.mode,
          components: {
            A: summarizeComponent(componentA),
            B: metricsB ? summarizeComponent(componentB) : null,
          },
          testVariables: Object.assign({}, state.testVariables),
          metrics: {
            A: metricsA,
            B: metricsB,
            delta: deltaMetrics,
          },
          importManifest: state.importManifest,
        };

        const summaryParts = [`A: ${formatWithUnit(metricsA.currentRms, "A")} - ${formatWithUnit(metricsA.powerDissipation, "W")}`];
        if (metricsB) {
          summaryParts.push(`B: ${formatWithUnit(metricsB.currentRms, "A")} - ${formatWithUnit(metricsB.powerDissipation, "W")}`);
        }
        setStatus(`Test complete. ${summaryParts.join(" | ")}`);
      }

      function summarizeComponent(component) {
        if (!component) {
          return null;
        }
        return {
          id: component.id,
          name: component.name,
          type: component.type,
          properties: component.properties,
          metadata: component.metadata,
          source: component.source,
        };
      }

      function computeComponentMetrics(component, variables) {
        const profile = COMPONENT_PROFILES[component.type] || { defaultProperties: {} };
        const props = Object.assign({}, profile.defaultProperties || {}, component.properties || {});

        const voltage = Number.isFinite(variables.voltage) ? variables.voltage : 0;
        const frequency = Math.max(Number.isFinite(variables.frequencyHz) ? variables.frequencyHz : 0, 0);
        const omega = 2 * Math.PI * frequency;
        const temperatureOffset = (variables.temperatureC ?? 25) - 25;

        let resistance = props.resistance;
        if (typeof props.tempCoeff === "number" && Number.isFinite(resistance)) {
          resistance = resistance * (1 + props.tempCoeff * temperatureOffset);
        }

        if (typeof props.seriesResistance === "number" && Number.isFinite(props.seriesResistance)) {
          resistance = Number.isFinite(resistance)
            ? resistance + props.seriesResistance
            : props.seriesResistance;
        }

        if (component.type === "switch") {
          const onResistance = props.onResistance ?? resistance ?? 0.05;
          const offResistance = props.offResistance ?? 1000000;
          resistance = props.isOn === false ? offResistance : onResistance;
        }

        if (component.type === "battery") {
          resistance = Math.max(variables.loadImpedanceOhms || resistance || props.internalResistance || 1, 0.0001);
        }

        if (component.type === "mosfet") {
          const vth = props.vth ?? 4;
          const rdsOn = Math.max(props.rds_on ?? 0.1, 0.0001);
          resistance = voltage >= vth ? rdsOn : 1e8;
        }

        if (component.type === "heatsink") {
          resistance = 1e8;
        }

        let reactanceC = 0;
        if (typeof props.capacitance === "number" && props.capacitance > 0 && omega > 0) {
          reactanceC = -1 / (omega * props.capacitance);
        }

        let reactanceL = 0;
        if (typeof props.inductance === "number" && props.inductance > 0 && omega > 0) {
          reactanceL = omega * props.inductance;
        }

        const netReactance = reactanceL + reactanceC;

        let effectiveResistance = Number.isFinite(resistance) ? resistance : 0;
        if (!Number.isFinite(effectiveResistance) || effectiveResistance < 0.0001) {
          effectiveResistance = 0.0001;
        }

        let impedance = Math.sqrt(Math.pow(effectiveResistance, 2) + Math.pow(netReactance, 2));
        if (!Number.isFinite(impedance) || impedance < 0.0001) {
          impedance = effectiveResistance;
        }

        let current = impedance > 0 ? voltage / impedance : 0;
        let voltageAcross = voltage;

        if (component.type === "led") {
          const forward = props.forwardVoltage ?? 2;
          const seriesR = Math.max(props.seriesResistance ?? effectiveResistance ?? 100, 0.1);
          voltageAcross = Math.max(voltage - forward, 0);
          current = voltageAcross / seriesR;
          impedance = seriesR;
          effectiveResistance = seriesR;
        }

        if (component.type === "battery") {
          const internalR = Math.max(props.internalResistance ?? 0.2, 0.0001);
          const loadR = Math.max(variables.loadImpedanceOhms || 0, 0.0001);
          const totalR = internalR + loadR;
          current = voltage / totalR;
          impedance = totalR;
          effectiveResistance = loadR;
        }

        if (component.type === "mosfet") {
          const vth = props.vth ?? 4;
          const rdsOn = Math.max(props.rds_on ?? 0.1, 0.0001);
          const vdsMax = props.vds_max ?? 60;
          const idMax = props.id_max ?? 10;
          if (voltage >= vth) {
            const vds = Math.min(voltage, vdsMax);
            current = Math.min(vds / rdsOn, idMax);
            voltageAcross = current * rdsOn;
            impedance = rdsOn;
            effectiveResistance = rdsOn;
          } else {
            current = 0;
            voltageAcross = 0;
            impedance = 1e8;
            effectiveResistance = 1e8;
          }
        }

        if (component.type === "heatsink") {
          current = 0;
          voltageAcross = 0;
          impedance = 1e8;
          effectiveResistance = 1e8;
        }

        const dutyCycle = Math.max(Math.min(variables.dutyCyclePercent ?? 100, 100), 0) / 100;
        const rmsCurrent = current * Math.sqrt(dutyCycle || 1);
        const power = voltageAcross * current * dutyCycle;
        const energyDelivered = power * (variables.durationSeconds ?? 0);
        const storedEnergyCap = typeof props.capacitance === "number" ? 0.5 * props.capacitance * voltage * voltage : 0;
        const storedEnergyInd = typeof props.inductance === "number" ? 0.5 * props.inductance * current * current : 0;
        const storedEnergy = storedEnergyCap + storedEnergyInd;
        const phaseAngle = Math.atan2(netReactance, effectiveResistance);
        const thermalResistance = props.thermalResistance ?? profile.defaultProperties?.thermalResistance ?? 60;
        const thermalRise = thermalResistance ? (power * thermalResistance) / 1000 : 0;

        let efficiency = props.efficiency;
        if (!Number.isFinite(efficiency)) {
          if (component.type === "battery" && impedance > 0) {
            efficiency = effectiveResistance / impedance;
          } else if (component.type === "led") {
            efficiency = props.efficiency ?? 0.35;
          } else if (component.type === "resistor") {
            efficiency = 0;
          } else {
            efficiency = null;
          }
        }

        return {
          componentId: component.id,
          name: component.name,
          type: component.type,
          operatingVoltage: voltage,
          currentRms: rmsCurrent,
          currentPeak: current * Math.sqrt(2),
          powerDissipation: power,
          impedance,
          reactance: netReactance,
          resistance: effectiveResistance,
          phaseAngleDegrees: phaseAngle * (180 / Math.PI),
          storedEnergy,
          energyDelivered,
          thermalRise,
          efficiency,
          ambientTemperature: variables.temperatureC,
          humidity: variables.ambientHumidityPercent,
          dutyCyclePercent: variables.dutyCyclePercent,
        };
      }

      function computeDeltaMetrics(metricsA, metricsB) {
        if (!metricsA || !metricsB) {
          return null;
        }
        const percentDifference = (a, b) => {
          if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) {
            return null;
          }
          return ((a - b) / b) * 100;
        };

        return {
          powerDeltaPercent: percentDifference(metricsA.powerDissipation, metricsB.powerDissipation),
          currentDeltaPercent: percentDifference(metricsA.currentRms, metricsB.currentRms),
          impedanceDeltaPercent: percentDifference(metricsA.impedance, metricsB.impedance),
          thermalDelta: Number.isFinite(metricsA.thermalRise) && Number.isFinite(metricsB.thermalRise)
            ? metricsA.thermalRise - metricsB.thermalRise
            : null,
          efficiencyDelta: Number.isFinite(metricsA.efficiency) && Number.isFinite(metricsB.efficiency)
            ? metricsA.efficiency - metricsB.efficiency
            : null,
          energyDelta: Number.isFinite(metricsA.energyDelivered) && Number.isFinite(metricsB.energyDelivered)
            ? metricsA.energyDelivered - metricsB.energyDelivered
            : null,
        };
      }

      function renderMetricGrid(elementId, metrics, options) {
        const container = document.getElementById(elementId);
        if (!container) {
          return;
        }
        container.innerHTML = "";

        if (!metrics) {
          const empty = document.createElement("div");
          empty.className = "metric-empty";
          empty.textContent = "Run a test to populate metrics.";
          container.appendChild(empty);
          return;
        }

        const entries = [];
        if (options?.isDelta) {
          entries.push({ label: "Power Delta", value: formatPercent(metrics.powerDeltaPercent) });
          entries.push({ label: "Current Delta", value: formatPercent(metrics.currentDeltaPercent) });
          entries.push({ label: "Impedance Delta", value: formatPercent(metrics.impedanceDeltaPercent) });
          entries.push({ label: "Thermal Delta", value: formatWithUnit(metrics.thermalDelta, "C") });
          entries.push({ label: "Efficiency Delta", value: formatPercent(metrics.efficiencyDelta) });
          entries.push({ label: "Energy Delta", value: formatWithUnit(metrics.energyDelta, "J") });
        } else {
          entries.push({ label: "Voltage", value: formatWithUnit(metrics.operatingVoltage, "V") });
          entries.push({ label: "Current", value: formatWithUnit(metrics.currentRms, "A"), detail: `Peak ${formatWithUnit(metrics.currentPeak, "A")}` });
          entries.push({ label: "Power", value: formatWithUnit(metrics.powerDissipation, "W") });
          entries.push({ label: "Impedance", value: formatWithUnit(metrics.impedance, "Ohm"), detail: `Reactance ${formatWithUnit(metrics.reactance, "Ohm")}` });
          entries.push({ label: "Phase", value: formatAngle(metrics.phaseAngleDegrees) });
          entries.push({ label: "Stored Energy", value: formatWithUnit(metrics.storedEnergy, "J") });
          entries.push({ label: "Delivered Energy", value: formatWithUnit(metrics.energyDelivered, "J") });
          entries.push({ label: "Thermal Rise", value: formatWithUnit(metrics.thermalRise, "C") });
          entries.push({ label: "Efficiency", value: formatPercent(metrics.efficiency) });
        }

        entries
          .filter((entry) => entry.value !== null && entry.value !== undefined)
          .forEach((entry) => {
            const card = document.createElement("div");
            card.className = "metric-card";
            if (options?.accent === "A") {
              card.classList.add("metric-accent-a");
            } else if (options?.accent === "B") {
              card.classList.add("metric-accent-b");
            } else if (options?.accent === "delta") {
              card.classList.add("metric-accent-delta");
            }

            const label = document.createElement("div");
            label.className = "metric-label";
            label.textContent = entry.label;

            const value = document.createElement("div");
            value.className = "metric-value";
            value.textContent = entry.value;

            card.appendChild(label);
            card.appendChild(value);

            if (entry.detail) {
              const detail = document.createElement("div");
              detail.className = "metric-detail";
              detail.textContent = entry.detail;
              card.appendChild(detail);
            }

            container.appendChild(card);
          });
      }

      function updateMeshesForMetrics(metricsA, metricsB) {
        const groupA = ensureComponentGroup("A", state.selectedA);
        const groupB = ensureComponentGroup("B", state.selectedB);

        let energyA = 0.24;
        let energyB = 0.24;

        if (groupA) {
          energyA = computeVisualEnergy(state.selectedA, metricsA);
          energizeComponent(groupA, energyA);
        }

        if (groupB) {
          if (state.mode === "compare" && state.selectedB && metricsB) {
            energyB = computeVisualEnergy(state.selectedB, metricsB);
            energizeComponent(groupB, energyB);
            groupB.visible = true;
          } else {
            energizeComponent(groupB, 0.2);
            groupB.visible = false;
          }
        }

        triggerPulse(Math.max(energyA, energyB));
        updateCompareVisibility();
      }

      function handleCommand(command) {
        switch (command) {
          case "reset":
            resetArena();
            break;
          case "run-test":
            runTest();
            break;
          case "export":
            exportResults();
            break;
          default:
            break;
        }
      }

      function resetArena() {
        const groupA = ensureComponentGroup("A", state.selectedA);
        if (groupA) {
          clearFailureVisuals(groupA);
          groupA.rotation.set(0, 0, 0);
          energizeComponent(groupA, 0.24);
        }
        const groupB = ensureComponentGroup("B", state.selectedB);
        if (groupB) {
          clearFailureVisuals(groupB);
          groupB.rotation.set(0, 0, 0);
          energizeComponent(groupB, 0.24);
        }
        updateCompareVisibility();
        resetCameraView();
        triggerPulse(0.3);

        state.lastRun = null;
        renderMetricGrid("metrics-a", null);
        renderMetricGrid("metrics-b", null);
        renderMetricGrid("metrics-delta", null);
        renderFailureAnalysis(null, null);
        setStatus("Arena reset. Metrics cleared.");
      }

      function exportResults() {
        if (!state.lastRun) {
          setStatus("Run a test before exporting results.");
          return;
        }

        const blob = new Blob([JSON.stringify(state.lastRun, null, 2)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "component-arena-results.json";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setStatus("Exported latest results as JSON.");
      }

      function formatWithUnit(value, unit) {
        if (!Number.isFinite(value)) {
          return "?";
        }
        const abs = Math.abs(value);
        let scaled = value;
        let prefix = "";
        if (abs >= 1e6) {
          scaled = value / 1e6;
          prefix = "M";
        } else if (abs >= 1e3) {
          scaled = value / 1e3;
          prefix = "k";
        } else if (abs > 0 && abs < 1e-3) {
          scaled = value * 1e6;
          prefix = "u";
        } else if (abs > 0 && abs < 1) {
          scaled = value * 1e3;
          prefix = "m";
        }

        const decimals = Math.abs(scaled) < 10 ? 2 : 1;
        return `${scaled.toFixed(decimals)} ${prefix}${unit}`;
      }

      function formatPercent(value) {
        if (!Number.isFinite(value)) {
          return "?";
        }
        const rounded = value.toFixed(1);
        const sign = value > 0 ? "+" : "";
        return `${sign}${rounded} %`;
      }

      function formatAngle(value) {
        if (!Number.isFinite(value)) {
          return "?";
        }
        return `${value.toFixed(1)} deg`;
      }

      function setStatus(message) {
        const element = document.getElementById("stat-out");
        if (element) {
          element.textContent = message;
        }
      }

      function renderInitialMetrics() {
        renderMetricGrid("metrics-a", null);
        renderMetricGrid("metrics-b", null);
        renderMetricGrid("metrics-delta", null);
        renderFailureAnalysis(null, null);
      }

      function bootstrap() {
        initThree();
        registerEvents();
        initializeCatalog();
        populateComponentSelectors();
        readTestVariables();
        updateCompareVisibility();
        updateImportStatus();
        renderInitialMetrics();

        const loadedFromUrl = loadSessionFromUrl();
        if (!loadedFromUrl) {
          const loadedBuilder = loadLatestBuilderExport();
          if (!loadedBuilder) {
            const quickPayload = loadArenaPayloadFromStorage();
            if (!quickPayload) {
              updateImportStatus();
            }
          }
        }

        updateMeshesForSelection();
      }

      window.addEventListener("message", (event) => {
        const { data } = event;
        if (!data || typeof data !== "object") {
          return;
        }
        if (data.type === "arena:import") {
          applyArenaPayload(data.payload, {
            source: data.payload?.source || "bridge",
            label: data.payload?.label || data.payload?.sessionName || "Builder Snapshot",
          });
        } else if (data.type === "arena:command" && data.payload && data.payload.command) {
          handleCommand(data.payload.command);
        }
      });

      window.addEventListener("storage", (event) => {
        if (event.key !== ARENA_STORAGE_KEY) {
          return;
        }
        const payload = parseArenaPayload(event.newValue);
        if (!payload) {
          return;
        }
        const applied = applyArenaPayload(payload, {
          source: payload.source || "builder",
          label: payload.label || payload.sessionName || "Builder Snapshot",
        });
        if (applied) {
          setStatus("Synced builder snapshot from storage.");
        }
      });

      bootstrap();
    })();
  </script>
</body>
</html>
