<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CircuiTry3D - Component Arena</title>
  <style>
    .arena-header {
      position: fixed;
      top: calc(8px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .arena-brand {
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 900;
      letter-spacing: -0.015em;
      display: inline-flex;
      gap: 2px;
      filter: drop-shadow(0 0 8px rgba(40,255,190,0.35));
      pointer-events: auto;
    }

    .arena-brand span {
      display: inline-block;
    }

    .arena-brand-green {
      color: #39ffb7;
      text-shadow: 0 0 8px rgba(57,255,183,0.6), 0 0 14px rgba(5,214,172,0.4);
    }

    .arena-brand-orange {
      color: #ff8b2b;
      text-shadow: 0 0 6px rgba(255,167,65,0.55), 0 0 12px rgba(255,120,28,0.4);
    }

    .arena-for-everyone {
      font-size: clamp(0.58rem, 1.2vw, 0.68rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(110, 230, 130, 0.9);
      text-shadow: 0 0 10px rgba(80, 200, 100, 0.5);
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid rgba(100, 220, 120, 0.3);
      background: rgba(100, 220, 120, 0.07);
      white-space: nowrap;
      pointer-events: auto;
    }

    .arena-nav {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      justify-content: center;
      pointer-events: auto;
    }

    .arena-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(57,255,183,0.28);
      background: rgba(8,26,36,0.55);
      color: #dbeafe;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.6rem;
      font-weight: 700;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 12px rgba(1, 19, 30, 0.4);
      cursor: pointer;
    }

    .arena-nav-btn:hover {
      border-color: rgba(57,255,183,0.65);
      background: rgba(14,48,60,0.68);
      color: #f8fafc;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --panel-bg: rgba(0, 0, 0, 0.68);
      --panel-border: rgba(136, 204, 255, 0.28);
      --panel-border-strong: rgba(0, 255, 136, 0.45);
      --metric-bg: rgba(12, 22, 42, 0.8);
      --metric-border: rgba(136, 204, 255, 0.22);
      --metric-accent-a: rgba(0, 255, 136, 0.45);
      --metric-accent-b: rgba(136, 204, 255, 0.45);
      --metric-accent-delta: rgba(255, 160, 0, 0.5);
      --text-muted: #94a3b8;
      --text-strong: #e2e8f0;
      --accent-green: #39ffb7;
      --accent-orange: #ff8b2b;
      --accent-cyan: #38bdf8;
      --accent-purple: rgba(168, 85, 247, 0.7);
      --panel-radius: 18px;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --shadow-panel: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(136,204,255,0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: radial-gradient(ellipse at 50% -5%, #1a1040 0%, #0a0e27 40%, #030615 80%);
      color: var(--text-strong);
      font-family: "DM Sans", "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      box-sizing: border-box;
      overflow: hidden;
      overscroll-behavior: none; /* prevent iOS bounce-scroll visual glitches */
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% -10%, rgba(14, 165, 233, 0.28), transparent 55%),
        radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.25), transparent 52%),
        radial-gradient(circle at 20% 80%, rgba(57, 255, 183, 0.08), transparent 60%);
      z-index: 0;
      pointer-events: none;
      opacity: 1.0;
    }

    #arena {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      will-change: transform; /* promote to own GPU compositing layer */
    }

    /* ── Embedded-in-React-shell mode ────────────────────────────────── */
    /* The is-embedded class is applied immediately by the <head> script   */
    /* so there is no flash of the native header over the GlobalModeBar.   */
    html.is-embedded .arena-header {
      display: none !important;
    }
    /* Pull the HUD and panel up to sit just below the React GlobalModeBar.
       --parent-clearance is set via arena:init once the shell measures its bar.
       Default 70px covers the typical GlobalModeBar height (~44px) + 12px top offset.
       68px ≈ HUD button height (44px) + 16px gap below HUD before panel top.
       98px = 68px (HUD block) + 30px bottom padding for the panel max-height calc. */
    html.is-embedded .hud {
      top: calc(var(--parent-clearance, 70px) + var(--safe-top));
    }
    html.is-embedded .panel {
      top: calc(var(--parent-clearance, 70px) + 68px + var(--safe-top));
      max-height: calc(100vh - var(--parent-clearance, 70px) - 98px - var(--safe-top) - var(--safe-bottom));
    }

    .hud {
      position: fixed;
      top: calc(100px + var(--safe-top));
      left: calc(16px + var(--safe-left));
      right: calc(16px + var(--safe-right));
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      z-index: 3;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid rgba(94, 234, 212, 0.45);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      letter-spacing: 0.01em;
      font-size: 13px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 0 0 rgba(34, 211, 238, 0);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(34, 211, 238, 0.25);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #btn-run {
      border-color: rgba(57, 255, 183, 0.65);
      color: #39ffb7;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 0 16px rgba(57, 255, 183, 0.18), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    #btn-run:hover {
      box-shadow: 0 0 28px rgba(57, 255, 183, 0.38), 0 8px 24px rgba(0,0,0,0.4);
      background: rgba(4, 40, 30, 0.95);
    }
    #btn-run:active {
      transform: scale(0.97) translateY(0);
    }

    .file-btn {
      position: relative;
      overflow: hidden;
    }

    .file-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .panel {
      position: fixed;
      top: calc(164px + var(--safe-top));
      left: calc(16px + var(--safe-left));
      width: 340px;
      max-width: calc(100vw - 32px - var(--safe-left) - var(--safe-right));
      max-height: calc(100vh - 194px - var(--safe-top) - var(--safe-bottom));
      background: rgba(10, 12, 28, 0.82);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border: 1px solid var(--panel-border);
      border-radius: var(--panel-radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      z-index: 4;
      box-shadow: var(--shadow-panel), 0 0 60px rgba(0,180,255,0.04) inset;
    }

    /* Reduce heavy blur on mobile/touch devices — prevents GPU frame-rate drops
       and compositing glitches on Android WebView and iOS WKWebView. */
    @media (pointer: coarse) {
      .panel {
        backdrop-filter: blur(8px) saturate(140%);
        -webkit-backdrop-filter: blur(8px) saturate(140%);
        background: rgba(10, 12, 28, 0.92);
      }
    }

    .panel-scroll {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 4px;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      background: rgba(136, 204, 255, 0.3);
      border-radius: 999px;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 0 14px;
      border-bottom: 1px solid rgba(136,204,255,0.07);
      margin-bottom: 2px;
    }

    .section-heading {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(200, 220, 255, 0.9);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-heading::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 2px;
      background: linear-gradient(180deg, #38bdf8, #39ffb7);
      flex-shrink: 0;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row label {
      width: 130px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .row input,
    .row select {
      flex: 1;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(51, 65, 85, 0.9);
      background: rgba(8, 15, 28, 0.92);
      color: var(--text-strong);
      font-size: 13px;
    }

    .import-status {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.85);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(136, 204, 255, 0.18);
      background: rgba(12, 22, 42, 0.65);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .panel-header .section-heading {
      margin: 0;
    }

    .panel-subtext {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(148, 163, 184, 0.85);
    }

    .chip-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(136, 204, 255, 0.35);
      background: rgba(12, 22, 42, 0.4);
      color: var(--text-strong);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .chip-btn:hover {
      background: rgba(24, 32, 48, 0.6);
      border-color: rgba(136, 204, 255, 0.5);
    }

    .chip-btn:active {
      transform: scale(0.95);
    }

    .import-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .import-tag {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(12, 22, 42, 0.65);
      border: 1px solid rgba(136, 204, 255, 0.18);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.85);
    }

    .summary-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 180px;
      overflow-y: auto;
    }

    .summary-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(148, 163, 184, 0.85);
      border-bottom: 1px solid rgba(136, 204, 255, 0.12);
      padding-bottom: 4px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }

    .metric-card {
      position: relative;
      background: rgba(8, 14, 34, 0.82);
      border: 1px solid var(--metric-border);
      border-radius: 14px;
      padding: 12px 11px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.2s var(--spring);
      cursor: default;
    }

    .metric-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.06) 0%, transparent 60%);
    }

    .metric-card:hover {
      transform: translateY(-1px);
      border-color: rgba(136, 204, 255, 0.36);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .metric-card:hover::before {
      opacity: 1;
    }

    .metric-card.metric-accent-a {
      border-color: rgba(57, 255, 183, 0.28);
    }
    .metric-card.metric-accent-a:hover {
      border-color: rgba(57, 255, 183, 0.50);
      box-shadow: 0 4px 20px rgba(57, 255, 183, 0.08);
    }

    .metric-card.metric-accent-b {
      border-color: rgba(56, 189, 248, 0.28);
    }
    .metric-card.metric-accent-b:hover {
      border-color: rgba(56, 189, 248, 0.50);
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.08);
    }

    .metric-card.metric-accent-delta {
      border-color: rgba(251, 146, 60, 0.28);
    }
    .metric-card.metric-accent-delta:hover {
      border-color: rgba(251, 146, 60, 0.50);
      box-shadow: 0 4px 20px rgba(251, 146, 60, 0.08);
    }

    .metric-card.health-warn {
      border-color: rgba(251, 191, 36, 0.45) !important;
      background: rgba(20, 15, 4, 0.88);
    }
    .metric-card.health-critical {
      border-color: rgba(239, 68, 68, 0.55) !important;
      background: rgba(22, 6, 6, 0.9);
      animation: metric-critical-pulse 2.5s ease-in-out infinite;
    }

    @keyframes metric-critical-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(239,68,68,0); }
      50%       { box-shadow: 0 0 16px rgba(239,68,68,0.22); }
    }


    .metric-icon {
      font-size: 14px;
      line-height: 1;
      margin-bottom: 1px;
      opacity: 0.7;
    }

    .metric-label {
      font-size: 10px;
      color: rgba(148, 163, 184, 0.75);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
      line-height: 1.2;
    }

    .metric-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: -0.02em;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .metric-value.health-safe   { color: #34d399; }
    .metric-value.health-warn   { color: #fbbf24; }
    .metric-value.health-critical { color: #f87171; }

    .metric-detail {
      font-size: 10.5px;
      color: rgba(148, 163, 184, 0.7);
      line-height: 1.3;
    }

    .metric-util-bar {
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      margin-top: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .metric-util-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(56, 189, 248, 0.7);
    }
    .metric-util-fill.util-safe     { background: linear-gradient(90deg, #10b981, #34d399); }
    .metric-util-fill.util-warn     { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .metric-util-fill.util-critical { background: linear-gradient(90deg, #dc2626, #f87171); box-shadow: 0 0 6px rgba(239,68,68,0.6); }

    .metric-empty {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.6);
      padding: 16px 6px;
      text-align: center;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    .stat {
      font-size: 12px;
      color: rgba(129, 140, 248, 0.95);
      background: rgba(30, 64, 175, 0.25);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.25);
      letter-spacing: 0.02em;
      min-height: 44px;
    }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        cursor: grab;
      }

    .compare-only {
      display: none;
    }

    .failure-analysis {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .failure-ok {
      font-size: 12px;
      color: rgba(52, 211, 153, 0.9);
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(52, 211, 153, 0.25);
      background: rgba(6, 78, 59, 0.25);
    }

    .failure-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .failure-stressed {
      background: rgba(250, 204, 21, 0.2);
      border: 1px solid rgba(250, 204, 21, 0.5);
      color: #fde68a;
    }

    .failure-warning {
      background: rgba(251, 146, 60, 0.2);
      border: 1px solid rgba(251, 146, 60, 0.5);
      color: #fed7aa;
    }

    .failure-critical {
      background: rgba(239, 68, 68, 0.22);
      border: 1px solid rgba(239, 68, 68, 0.55);
      color: #fca5a5;
      animation: pulse-critical 2s ease-in-out infinite;
    }

    .failure-failed {
      background: rgba(220, 38, 38, 0.38);
      border: 1px solid rgba(220, 38, 38, 0.75);
      color: #fef2f2;
      animation: pulse-failed 1.4s ease-in-out infinite;
    }

    @keyframes pulse-critical {
      0%, 100% { box-shadow: 0 0 6px rgba(239, 68, 68, 0.3); }
      50%       { box-shadow: 0 0 18px rgba(239, 68, 68, 0.7), 0 0 36px rgba(239, 68, 68, 0.25); }
    }

    @keyframes pulse-failed {
      0%, 100% { box-shadow: 0 0 8px rgba(220, 38, 38, 0.45), 0 0 20px rgba(220, 38, 38, 0.2); }
      50%       { box-shadow: 0 0 22px rgba(220, 38, 38, 0.9), 0 0 44px rgba(220, 38, 38, 0.4), 0 0 70px rgba(220, 38, 38, 0.12); }
    }

    .failure-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: failure-card-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .failure-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .failure-risk-meter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(5, 8, 20, 0.6);
      border: 1px solid rgba(136, 204, 255, 0.10);
      margin-bottom: 4px;
    }

    .failure-risk-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.7);
      white-space: nowrap;
    }

    .failure-risk-score {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 38px;
    }
    .failure-risk-score.risk-safe     { color: #34d399; }
    .failure-risk-score.risk-stressed { color: #fde68a; }
    .failure-risk-score.risk-warning  { color: #fb923c; }
    .failure-risk-score.risk-critical { color: #f87171; }
    .failure-risk-score.risk-failed   { color: #fef2f2; text-shadow: 0 0 12px rgba(239,68,68,0.8); }

    .failure-risk-arc {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .failure-risk-arc-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .failure-risk-arc-fill.risk-safe     { background: linear-gradient(90deg, #059669, #34d399); }
    .failure-risk-arc-fill.risk-stressed { background: linear-gradient(90deg, #b45309, #fbbf24); }
    .failure-risk-arc-fill.risk-warning  { background: linear-gradient(90deg, #c2410c, #fb923c); box-shadow: 0 0 6px rgba(251,146,60,0.5); }
    .failure-risk-arc-fill.risk-critical { background: linear-gradient(90deg, #991b1b, #f87171); box-shadow: 0 0 8px rgba(248,113,113,0.6); animation: bar-pulse-critical 2s ease-in-out infinite; }
    .failure-risk-arc-fill.risk-failed   { background: linear-gradient(90deg, #7f1d1d, #ef4444, #fca5a5); box-shadow: 0 0 12px rgba(239,68,68,0.7); animation: bar-pulse-failed 1.4s ease-in-out infinite; }

    @keyframes failure-card-in {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .failure-severity-bar-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.8);
      overflow: hidden;
      margin-bottom: 2px;
    }

    .failure-severity-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .failure-severity-bar-fill.sev-stressed {
      background: linear-gradient(90deg, #d97706, #fbbf24);
      box-shadow: 0 0 6px rgba(251, 191, 36, 0.6);
    }

    .failure-severity-bar-fill.sev-warning {
      background: linear-gradient(90deg, #ea580c, #fb923c);
      box-shadow: 0 0 6px rgba(251, 146, 60, 0.6);
    }

    .failure-severity-bar-fill.sev-critical {
      background: linear-gradient(90deg, #dc2626, #f87171);
      box-shadow: 0 0 8px rgba(248, 113, 113, 0.7);
      animation: bar-pulse-critical 2s ease-in-out infinite;
    }

    .failure-severity-bar-fill.sev-failed {
      background: linear-gradient(90deg, #991b1b, #ef4444, #fca5a5);
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
      animation: bar-pulse-failed 1.4s ease-in-out infinite;
    }

    @keyframes bar-pulse-critical {
      0%, 100% { opacity: 0.8; }
      50%       { opacity: 1;   box-shadow: 0 0 14px rgba(248, 113, 113, 0.9); }
    }

    @keyframes bar-pulse-failed {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 1;    box-shadow: 0 0 18px rgba(239, 68, 68, 1.0); }
    }

    .fuse-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      padding: 2px 5px;
      background: rgba(255, 80, 0, 0.18);
      border: 1px solid rgba(255, 100, 20, 0.45);
      border-radius: 4px;
      color: #ff9944;
      text-shadow: 0 0 6px rgba(255, 120, 20, 0.5);
      vertical-align: middle;
      margin-left: 4px;
      pointer-events: auto;
      cursor: default;
    }

    .fuse-acronym {
      font-size: 0.58rem;
      color: #64748b;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
      font-style: italic;
    }

    /* ── Live metrics badge ──────────────────────────────────────────────── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #34d399;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid rgba(52, 211, 153, 0.45);
      background: rgba(6, 78, 59, 0.35);
      vertical-align: middle;
      margin-left: 6px;
    }
    .live-badge::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      animation: live-pulse 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.7); }
    }

    .live-badge.hidden-badge { display: none; }

    /* ── Metric card live-update flash ───────────────────────────────────── */
    @keyframes metric-live-flash {
      0%   { background: rgba(52, 211, 153, 0.16); box-shadow: 0 0 10px rgba(52, 211, 153, 0.25); }
      100% { background: transparent; box-shadow: none; }
    }
    .metric-card.live-updated {
      animation: metric-live-flash 0.5s ease-out forwards;
    }

    /* ── Push to Failure (FUSE™ sim) ─────────────────────────────────────── */
    .push-fail-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .push-fail-desc {
      font-size: 11.5px;
      color: rgba(148, 163, 184, 0.85);
      line-height: 1.55;
    }
    .push-fail-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .push-fail-btn {
      flex: 1;
      min-width: 140px;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(239, 68, 68, 0.55);
      background: rgba(22, 6, 6, 0.88);
      color: #fca5a5;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.12);
    }
    .push-fail-btn:hover {
      background: rgba(40, 8, 8, 0.95);
      border-color: rgba(239, 68, 68, 0.85);
      box-shadow: 0 0 22px rgba(239, 68, 68, 0.35), 0 6px 18px rgba(0,0,0,0.4);
    }
    .push-fail-btn:active { transform: scale(0.97); }
    .push-fail-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .push-fail-result {
      padding: 10px 12px;
      border-radius: 11px;
      border: 1px solid rgba(136, 204, 255, 0.15);
      background: rgba(5, 8, 20, 0.6);
      font-size: 11.5px;
      line-height: 1.55;
      color: rgba(148, 163, 184, 0.85);
      display: none;
    }
    .push-fail-result.visible { display: block; }
    .push-fail-result.result-safe    { border-color: rgba(52, 211, 153, 0.3); color: #6ee7b7; }
    .push-fail-result.result-warn    { border-color: rgba(251, 191, 36, 0.35); color: #fde68a; }
    .push-fail-result.result-fail    { border-color: rgba(239, 68, 68, 0.5); color: #fca5a5; background: rgba(22, 6, 6, 0.7); }
    .push-fail-result.result-destroyed { border-color: rgba(220, 38, 38, 0.7); color: #fef2f2; background: rgba(35, 4, 4, 0.88); animation: pulse-failed 1.4s ease-in-out infinite; }

    .push-fail-btn.push-fail-btn-b {
      border-color: rgba(168, 85, 247, 0.55);
      color: #d8b4fe;
      background: rgba(10, 6, 20, 0.88);
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.12);
    }

    /* ── Composition Panel ─────────────────────────────────────────────── */
    .composition-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 6px;
    }
    .composition-note {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.85);
      line-height: 1.5;
      padding: 6px 8px;
      border-radius: 7px;
      background: rgba(8, 15, 28, 0.45);
      border: 1px solid rgba(136, 204, 255, 0.10);
      margin-bottom: 8px;
    }
    .composition-sub-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .composition-sub-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      line-height: 1.4;
    }
    .composition-sub-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.18);
    }
    .composition-sub-name {
      flex: 1;
      min-width: 0;
      color: var(--text-strong);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .composition-sub-role {
      font-size: 10px;
      color: #64748b;
      white-space: nowrap;
    }
    .composition-critical-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(239, 68, 68, 0.20);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #fca5a5;
      flex-shrink: 0;
    }
    .composition-mass-bar-wrap {
      width: 36px;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      flex-shrink: 0;
    }
    .composition-mass-bar {
      height: 5px;
      border-radius: 3px;
      background: rgba(100, 200, 255, 0.55);
    }
    .composition-mat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-bottom: 8px;
    }
    .composition-mat-cell {
      background: rgba(8, 15, 28, 0.50);
      border: 1px solid rgba(136, 204, 255, 0.10);
      border-radius: 7px;
      padding: 5px 7px;
    }
    .composition-mat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 2px;
    }
    .composition-mat-value {
      font-size: 12px;
      font-weight: 600;
      color: #7dd3fc;
    }
    .composition-mat-unit {
      font-size: 9px;
      color: #64748b;
    }
    .composition-limit-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 7px;
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
    }
    .composition-cutaway-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(100, 200, 255, 0.10);
      border: 1px solid rgba(100, 200, 255, 0.30);
      color: #7dd3fc;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.18s, border-color 0.18s;
    }
    .composition-cutaway-btn:hover {
      background: rgba(100, 200, 255, 0.20);
      border-color: rgba(100, 200, 255, 0.55);
    }
    .composition-cutaway-btn.active {
      background: rgba(100, 200, 255, 0.25);
      border-color: rgba(100, 200, 255, 0.70);
      color: #bae6fd;
    }
    .composition-empty {
      font-size: 11px;
      color: #64748b;
      font-style: italic;
    }
    /* ── end Composition Panel ─────────────────────────────────────────── */

    #explosion-dom-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,230,80,0.9) 0%, rgba(255,100,10,0.55) 30%, transparent 68%);
    }

    .failure-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-strong);
      margin-bottom: 2px;
    }

    .failure-desc {
      font-size: 11px;
      line-height: 1.55;
      color: rgba(148, 163, 184, 0.9);
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(8, 15, 28, 0.55);
      border: 1px solid rgba(136, 204, 255, 0.12);
    }

    @media (pointer: coarse) {
      .btn {
        min-height: 52px;
        padding: 14px 22px;
        font-size: 16px;
      }

      .row label {
        font-size: 13px;
      }

      .row input,
      .row select {
        min-height: 46px;
      }

      .panel {
        width: calc(100vw - 32px - var(--safe-left) - var(--safe-right));
        max-width: none;
      }
    }
    /* ── Featured Components (Manufacturer Placement Framework) ── */
    .featured-component-card {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(8, 15, 28, 0.7);
      border: 1px solid rgba(136, 204, 255, 0.16);
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s var(--spring), box-shadow 0.2s ease;
    }

    .featured-component-card:hover {
      border-color: rgba(136, 204, 255, 0.38);
      background: rgba(12, 22, 42, 0.85);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .featured-component-card.selected {
      border-color: rgba(57, 255, 183, 0.55);
      background: rgba(5, 30, 22, 0.7);
    }

    .featured-component-name {
      font-size: 12px;
      font-weight: 700;
      color: rgba(224, 242, 254, 0.92);
      letter-spacing: 0.02em;
    }

    .featured-component-mfr {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.65);
    }

    .featured-component-spec {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.8);
      line-height: 1.5;
    }

    .featured-component-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .partner-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 10px;
      background: rgba(15, 25, 50, 0.6);
      border: 1px dashed rgba(136, 204, 255, 0.22);
    }

    .partner-cta-text {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.75);
      line-height: 1.5;
    }

    .partner-cta-link {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #39ffb7;
      text-decoration: none;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(57, 255, 183, 0.4);
      transition: color 0.15s ease;
    }

    .partner-cta-link:hover {
      color: #7fffd4;
    }

    /* ── FUSE™ Tier Gating UI ──────────────────────────────────────────────── */
    .fuse-tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: auto;
      cursor: pointer;
      border: 1px solid;
      transition: opacity 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      background: none;
      font-family: inherit;
      line-height: 1.6;
    }

    .fuse-tier-badge:hover {
      box-shadow: 0 0 10px currentColor;
      opacity: 0.9;
    }

    .fuse-tier-free         { border-color: rgba(148,163,184,0.4); color: #94a3b8; background: rgba(148,163,184,0.08); }
    .fuse-tier-student      { border-color: rgba(57,255,183,0.5);  color: #39ffb7; background: rgba(57,255,183,0.10); }
    .fuse-tier-educator     { border-color: rgba(96,165,250,0.55); color: #93c5fd; background: rgba(96,165,250,0.10); }
    .fuse-tier-institutional{ border-color: rgba(168,85,247,0.6);  color: #c4b5fd; background: rgba(168,85,247,0.10); }

    .fuse-locked {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: rgba(148, 163, 184, 0.6);
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px dashed rgba(136, 204, 255, 0.2);
      background: rgba(8, 15, 28, 0.4);
    }

    .fuse-locked-icon {
      opacity: 0.55;
    }

    .fuse-upgrade-btn {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 150, 50, 0.6);
      color: #fb923c;
      background: rgba(255, 150, 50, 0.1);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      pointer-events: auto;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .fuse-upgrade-btn:hover {
      background: rgba(255, 150, 50, 0.2);
    }

    /* Plan Preview selector inside the panel */
    .plan-preview-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .plan-chip {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(136, 204, 255, 0.25);
      color: rgba(148, 163, 184, 0.7);
      background: rgba(12, 22, 42, 0.4);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .plan-chip:hover {
      border-color: rgba(136, 204, 255, 0.5);
      color: #e2e8f0;
    }

    .plan-chip.active {
      background: rgba(57, 255, 183, 0.12);
      border-color: rgba(57, 255, 183, 0.5);
      color: #39ffb7;
    }

    .plan-preview-note {
      font-size: 10px;
      color: rgba(100, 116, 139, 0.75);
      line-height: 1.5;
      margin-top: 2px;
    }

    /* "Powered by FUSE™" footer */
    .fuse-footer {
      text-align: center;
      font-size: 10px;
      color: rgba(100, 116, 139, 0.72);
      letter-spacing: 0.06em;
      padding: 10px 8px 4px;
      border-top: 1px solid rgba(136, 204, 255, 0.1);
    }

    .fuse-footer-brand {
      color: #ff9944;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .fuse-footer a {
      color: #39ffb7;
      text-decoration: none;
    }

    .fuse-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="arena-header" id="arena-header">
    <div class="arena-brand" aria-label="CircuiTry3D">
      <span class="arena-brand-green">Circui</span>
      <span class="arena-brand-orange">Try</span>
      <span class="arena-brand-green">3D</span>
      <span class="fuse-tag" title="Failure Understanding Simulation Engine — FUSE™">FUSE™</span>
      <button class="fuse-tier-badge fuse-tier-free" id="tier-badge" title="FUSE™ access tier — click to preview other tiers">Free</button>
    </div>
    <div class="arena-for-everyone" aria-label="For Everyone">👥 For Everyone — to facilitate and enhance the learning</div>
    <nav class="arena-nav" aria-label="Main navigation">
      <a class="arena-nav-btn" href="/" target="_top">Home</a>
      <a class="arena-nav-btn" href="/app" target="_top">Builder</a>
      <a class="arena-nav-btn" href="/app" target="_top">Workspace</a>
      <a class="arena-nav-btn" href="/pricing" target="_top">Pricing</a>
      <a class="arena-nav-btn" href="/community" target="_top">Community</a>
      <a class="arena-nav-btn" href="/account" target="_top">Account</a>
    </nav>
  </header>
  <!-- Component library panel toggle button -->
  <button class="lib-toggle panel-closed" id="lib-toggle"
          aria-label="Open component library" aria-expanded="false" aria-controls="arena-panel">
    <span id="lib-toggle-icon" aria-hidden="true">☰</span>
    <span class="lib-toggle-tip">Components</span>
  </button>
  <button class="battle-fab" id="btn-battle-fab" aria-label="Run simulation test">▶ RUN TEST</button>
  <div class="hud" role="toolbar" aria-label="Arena controls">
  <button class="btn" id="btn-reset" aria-label="Reset arena (will ask for confirmation)">Reset</button>
  <button class="btn" id="btn-run" data-command="run-test" aria-label="Run simulation test">▶ Run Test</button>
  <button class="btn" id="btn-export" aria-label="Save results as JSON" title="Run a test first to enable" disabled>⬇ Save Results</button>
  <button class="btn" id="btn-import-builder" aria-label="Load latest builder export" title="Loads your latest circuit from the Builder">↓ Load from Builder</button>
  <button class="btn" id="btn-show-timeline" aria-label="Show stress timeline" title="Stress timeline — run a test first" style="display:none">Timeline</button>
  </div>
  <div class="panel" id="arena-panel">
    <div class="panel-drag-handle" id="panel-drag-handle" role="button" aria-label="Resize panel" tabindex="0"></div>
    <div class="panel-resize-handle" id="panel-resize-handle" aria-hidden="true"></div>
    <!-- CircuiTry3D Branded library header -->
    <div class="ct3d-lib-brand" aria-label="CircuiTry3D Component Library">
      <div class="ct3d-lib-brand-logo" aria-hidden="true">
        <span class="ct3d-g">Circui</span><span class="ct3d-o">Try</span><span class="ct3d-g">3D</span>
      </div>
      <span class="ct3d-lib-brand-badge">Component Library</span>
    </div>

      <div class="workflow-step" id="wf-step-1" data-tip="Select a component in the Parts tab">
        <div class="workflow-step-num"><span>1</span></div>

      </div>
      <div class="workflow-step-arrow">→</div>
      <div class="workflow-step" id="wf-step-2" data-tip="Set test variables in the Test tab">

      </div>
      <div class="workflow-step-arrow">→</div>

        <span>Run</span>

    </div>
    <!-- Tab bar -->
    <div class="panel-tabs" role="tablist" aria-label="Arena panel tabs">
      <button class="panel-tab-btn active" data-tab="components" role="tab" aria-selected="true" aria-controls="tab-components">📦 Parts</button>
      <button class="panel-tab-btn" data-tab="test" role="tab" aria-selected="false" aria-controls="tab-test">⚙️ Test</button>

      <button class="panel-tab-btn" data-tab="fuse" role="tab" aria-selected="false" aria-controls="tab-fuse">🔥 FUSE<span class="tab-badge" id="badge-fuse"></span></button>
      <button class="panel-tab-btn" data-tab="composition" role="tab" aria-selected="false" aria-controls="tab-composition">⚛️ Matter</button>
    </div>
    <div class="row compare-only" style="display:none"><label>Value B</label><input id="comp-value-b" type="number" value="200" /></div>
    <hr style="border:none;border-top:1px solid #334155;margin:8px 0" />
    <div class="row"><label>Voltage (V)</label><input id="test-voltage" type="number" value="5" /></div>
    <div class="row"><label>Frequency (Hz)</label><input id="test-frequency" type="number" value="1000" /></div>
    <div class="stat" id="stat-out">Ready.</div>

  <canvas id="arena"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const MODE_ID = 'mode';
    const COMP_TYPE_A_ID = 'comp-type-a';
    const COMP_TYPE_B_ID = 'comp-type-b';
    const VALUE_A_ID = 'comp-value-a';
    const VALUE_B_ID = 'comp-value-b';
    const VOLTAGE_ID = 'test-voltage';
    const FREQUENCY_ID = 'test-frequency';
    const STAT_ID = 'stat-out';

    let scene, camera, renderer, meshA, meshB;
    const canvas = document.getElementById('arena');
    let manufacturerRoster = [];
    const activeComponentIds = { a: null, b: null };
    const manufacturerNames = { a: null, b: null };

    const ALLOWED_TYPES = ['resistor', 'capacitor', 'inductor', 'led'];

    function ingestManufacturerRoster(components) {
      if (!Array.isArray(components) || !components.length) {
        manufacturerRoster = [];
        return;
      }

      manufacturerRoster = components
        .map((component) => {
          if (!component || typeof component !== 'object') {
            return null;
          }

          const id = typeof component.id === 'string' ? component.id : String(component.id ?? '');
          const type = typeof component.type === 'string' && ALLOWED_TYPES.includes(component.type) ? component.type : undefined;

          if (!id || !type) {
            return null;
          }

          const manufacturer = typeof component.manufacturer === 'string' ? component.manufacturer : 'Manufacturer';
          const name = typeof component.name === 'string' ? component.name : 'Component';
          const family = typeof component.family === 'string' ? component.family : '';
          const highlight = typeof component.highlight === 'string' ? component.highlight : '';
          const rating = typeof component.rating === 'number' ? component.rating : null;

          const metrics = Array.isArray(component.metrics)
            ? component.metrics.slice(0, 3).map((metric) => {
                if (!metric || typeof metric !== 'object') {
                  return null;
                }
                const label = typeof metric.label === 'string' ? metric.label : 'Metric';
                const value = typeof metric.value === 'string' ? metric.value : String(metric.value ?? '');
                const unit = typeof metric.unit === 'string' ? metric.unit : undefined;
                return { label, value, unit };
              }).filter(Boolean)
            : [];

          return { id, type, manufacturer, name, family, highlight, rating, metrics };
        })
        .filter(Boolean);
    }

    function lookupComponent(componentId, fallbackType) {
      if (!manufacturerRoster.length) {
        return undefined;
      }

      if (componentId) {
        const matchById = manufacturerRoster.find((component) => component.id === componentId);
        if (matchById) {
          return matchById;
        }
      }

      if (fallbackType) {
        return manufacturerRoster.find((component) => component.type === fallbackType);
      }

      return undefined;
    }

    function formatDescriptor(component, fallbackType, fallbackManufacturer) {
      if (component) {
        return `${component.manufacturer} - ${component.name}`;
      }
      if (fallbackManufacturer && fallbackType) {
        return `${fallbackManufacturer} - ${fallbackType}`;
      }
      if (fallbackType) {
        return fallbackType;
      }
      return 'Component';
    }

    function reportStatus(message) {
      if (typeof window !== 'undefined' && window.parent && typeof window.parent.postMessage === 'function') {
        window.parent.postMessage({ type: 'arena:status', payload: { message } }, '*');
      }
    }

    function notifyReady() {
      if (typeof window !== 'undefined' && window.parent && typeof window.parent.postMessage === 'function') {
        window.parent.postMessage({ type: 'arena:ready' }, '*');
      }
      reportStatus('Arena ready. Select a preset or tweak values to begin.');
    }

    function syncMeshVisibility(modeValue) {
      if (meshB) {
        meshB.visible = modeValue === 'compare';
      }
    }

    function applyConfig(config) {
      if (!config || typeof config !== 'object') {
        return;
      }

      const modeSelect = document.getElementById(MODE_ID);
      const compASelect = document.getElementById(COMP_TYPE_A_ID);
      const compBSelect = document.getElementById(COMP_TYPE_B_ID);
      const valueAInput = document.getElementById(VALUE_A_ID);
      const valueBInput = document.getElementById(VALUE_B_ID);
      const voltageInput = document.getElementById(VOLTAGE_ID);
      const frequencyInput = document.getElementById(FREQUENCY_ID);

      activeComponentIds.a = typeof config.componentIdA === 'string' ? config.componentIdA : null;
      activeComponentIds.b = typeof config.componentIdB === 'string' ? config.componentIdB : null;
      manufacturerNames.a = typeof config.manufacturerNameA === 'string' ? config.manufacturerNameA : null;
      manufacturerNames.b = typeof config.manufacturerNameB === 'string' ? config.manufacturerNameB : null;

      if (modeSelect && config.mode) {
        modeSelect.value = config.mode;
        modeSelect.dispatchEvent(new Event('change', { bubbles: true }));
      }

      if (compASelect && config.compA) {
        compASelect.value = config.compA;
      }

      if (compBSelect && config.compB) {
        compBSelect.value = config.compB;
      }

      if (valueAInput && typeof config.valueA === 'number' && !Number.isNaN(config.valueA)) {
        valueAInput.value = String(config.valueA);
      }

      if (valueBInput && typeof config.valueB === 'number' && !Number.isNaN(config.valueB)) {
        valueBInput.value = String(config.valueB);
      }

      if (voltageInput && typeof config.voltage === 'number' && !Number.isNaN(config.voltage)) {
        voltageInput.value = String(config.voltage);
      }

      if (frequencyInput && typeof config.frequency === 'number' && !Number.isNaN(config.frequency)) {
        frequencyInput.value = String(config.frequency);
      }

      const currentMode = (modeSelect && modeSelect.value) || 'single';
      syncMeshVisibility(currentMode);

      const stat = document.getElementById(STAT_ID);
      const descriptorA = lookupComponent(activeComponentIds.a, compASelect ? compASelect.value : config.compA);
      const descriptorB = currentMode === 'compare'
        ? lookupComponent(activeComponentIds.b, compBSelect ? compBSelect.value : config.compB)
        : undefined;
      const descriptorLabelA = formatDescriptor(descriptorA, config.compA, manufacturerNames.a);
      const descriptorLabelB = currentMode === 'compare'
        ? formatDescriptor(descriptorB, config.compB, manufacturerNames.b)
        : null;

      if (stat) {
        if (currentMode === 'compare' && descriptorLabelB) {
          stat.textContent = `Preset staged: ${descriptorLabelA} vs ${descriptorLabelB}`;
        } else {
          stat.textContent = `Preset staged: ${descriptorLabelA}`;
        }
      }
      if (currentMode === 'compare' && descriptorLabelB) {
        reportStatus(`Preset staged inside the arena: ${descriptorLabelA} vs ${descriptorLabelB}.`);
      } else {
        reportStatus(`Preset staged inside the arena: ${descriptorLabelA}.`);
      }
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a1a);
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 2, 6);
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

          <!-- Import collapsible -->
          <button class="import-toggle-btn" id="btn-toggle-import" aria-expanded="false" aria-controls="import-methods-container">
            ➕ Import component
          </button>
          <div class="import-methods" id="import-methods-container">
            <!-- Drop zone -->
            <div class="import-dropzone" id="import-dropzone" role="button" aria-label="Drop JSON file here or click to browse">
              <input type="file" id="input-import-json" accept="application/json" aria-label="Import JSON file" />
              <div class="import-dropzone-label">
                <strong>Drop JSON</strong> here or click to browse<br>
                <span style="font-size:10px;opacity:0.7">ManufacturerCatalog or Builder export</span>
              </div>
            </div>

      const geo = new THREE.BoxGeometry(1, 1, 1);
      meshA = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x88ccff }));
      meshB = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xffa500 }));
      meshA.position.set(-1.2, 0, 0);
      meshB.position.set(1.2, 0, 0);
      scene.add(meshA);
      scene.add(meshB);

      const modeSelect = document.getElementById(MODE_ID);
      syncMeshVisibility((modeSelect && modeSelect.value) || 'single');

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      if (meshA) {
        meshA.rotation.y += 0.01;
      }
      if (meshB && meshB.visible) {
        meshB.rotation.y -= 0.01;
      }
      renderer.render(scene, camera);
    }

    function resetArena() {
      const stat = document.getElementById(STAT_ID);
      if (stat) {
        stat.textContent = 'Reset arena';
      }
      if (meshA) {
        meshA.rotation.set(0, 0, 0);
      }
      if (meshB) {
        meshB.rotation.set(0, 0, 0);
      }
      const benchCount = manufacturerRoster.length;
      reportStatus(`Arena reset to defaults. Bench holds ${benchCount} manufacturer component${benchCount === 1 ? '' : 's'}.`);
    }

    function runTest() {
      const modeEl = document.getElementById(MODE_ID);
      const typeAEl = document.getElementById(COMP_TYPE_A_ID);
      const valueAEl = document.getElementById(VALUE_A_ID);
      const typeBEl = document.getElementById(COMP_TYPE_B_ID);
      const valueBEl = document.getElementById(VALUE_B_ID);
      const voltageEl = document.getElementById(VOLTAGE_ID);
      const frequencyEl = document.getElementById(FREQUENCY_ID);

      const mode = modeEl ? modeEl.value : 'single';
      const typeA = typeAEl ? typeAEl.value : 'resistor';
      const valueA = parseFloat((valueAEl && valueAEl.value) || '0');
      const typeB = typeBEl ? typeBEl.value : typeA;
      const rawValueB = (valueBEl && valueBEl.value) || String(valueA);
      const valueB = parseFloat(rawValueB);
      const V = parseFloat((voltageEl && voltageEl.value) || '0');
      const f = parseFloat((frequencyEl && frequencyEl.value) || '0');

      const descriptorA = lookupComponent(activeComponentIds.a, typeA);
      const descriptorB = lookupComponent(activeComponentIds.b, typeB);
      const descriptorLabelA = formatDescriptor(descriptorA, typeA, manufacturerNames.a);
      const descriptorLabelB = formatDescriptor(descriptorB, typeB, manufacturerNames.b);

      function calc(type, value) {
        if (type === 'resistor') {
          const I = V / (value || 1);
          const P = V * I;
          return { I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0, P: Number.isFinite(P) ? Number(P.toFixed(3)) : 0 };
        }
        if (type === 'capacitor') {
          const X = 1 / (2 * Math.PI * f * (value || 1e-6));
          const I = V / X;
          return { X: Number.isFinite(X) ? Number(X.toFixed(3)) : 0, I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0 };
        }
        if (type === 'inductor') {
          const X = 2 * Math.PI * f * (value || 1e-3);
          const I = V / X;
          return { X: Number.isFinite(X) ? Number(X.toFixed(3)) : 0, I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0 };
        }
        if (type === 'led') {
          const Vf = 2.0;
          const I = Math.max(0, V - Vf) / (value || 100);
          return { Vf, I: Number.isFinite(I) ? Number(I.toFixed(3)) : 0 };
        }
        const payload = parseArenaPayload(event.newValue);
        if (!payload) {
          return;
        }
        const applied = applyArenaPayload(payload, {
          source: payload.source || "builder",
          label: payload.label || payload.sessionName || "Builder Snapshot",
        });
        if (applied) {
          setStatus("Synced builder snapshot from storage.");
        }
      });

      // ── Public bridge API ──────────────────────────────────────────────────
      // Exposes a minimal surface to sibling scripts (the featured-catalog IIFE)
      // that need to manipulate arena state without closure access.
      window.ArenaAPI = {
        registerComponent: function (raw) {
          if (!raw || typeof raw !== "object") return null;
          const comp = normalizeComponent(raw, raw.metadata?.vendor || raw.source || "Reference Library");
          if (!comp) return null;
          if (!state.components.find((c) => c.id === comp.id)) {
            state.components.push(comp);
            populateComponentSelectors();
            renderImportSummary(null);
          }
          return comp;
        },
        loadComponent: function (componentId, target) {
          const comp = state.components.find((c) => c.id === componentId);
          if (!comp) return false;
          if (target === "B") {
            state.selectedB = comp;
            const sel = document.getElementById("component-b");
            if (sel) sel.value = componentId;
            if (state.mode !== "compare") {
              state.mode = "compare";
              const modeSelect = document.getElementById("mode");
              if (modeSelect) modeSelect.value = "compare";
              updateCompareVisibility();
            }
          } else {
            state.selectedA = comp;
            const sel = document.getElementById("component-a");
            if (sel) sel.value = componentId;
          }
          updateMeshesForSelection();
          const ctaBtn = document.getElementById("btn-goto-test");
          if (ctaBtn && state.selectedA) ctaBtn.style.display = "";
          if (state.selectedA) updateWorkflowStep(2, false);
          return true;
        },
      };

      // ── Run History helpers ────────────────────────────────────────────────
      function renderRunHistory() {
        const list = document.getElementById("run-history-list");
        if (!list) return;
        list.innerHTML = "";
        if (!state.runHistory || state.runHistory.length === 0) {
          const empty = document.createElement("div");
          empty.className = "history-empty";
          empty.textContent = "No test runs yet — results will appear here after each run.";
          list.appendChild(empty);
          return;
        }
        const SEV_LABELS = {
          safe: "🟢 Safe", stressed: "🟡 Stressed",
          warning: "🟠 Warning", critical: "🔴 Critical", failed: "💀 Destroyed",
        };
        state.runHistory.forEach((run) => {
          const item = document.createElement("div");
          item.className = "history-item";

          const header = document.createElement("div");
          header.className = "history-item-header";

          const name = document.createElement("div");
          name.className = "history-item-name";
          const displayName = run.componentBName
            ? `${run.componentAName} vs ${run.componentBName}`
            : run.componentAName;
          name.textContent = displayName;
          name.title = displayName;

          const time = document.createElement("div");
          time.className = "history-item-time";
          try {
            const d = new Date(run.timestamp);
            if (!isNaN(d.getTime())) {
              time.textContent = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
              time.title = d.toLocaleString();
            }
          } catch (e) { /* ignore */ }

          header.appendChild(name);
          header.appendChild(time);
          item.appendChild(header);

          const metricsRow = document.createElement("div");
          metricsRow.className = "history-item-metrics";

          const ma = run.metricsA;
          if (ma) {
            if (Number.isFinite(ma.powerDissipation)) {
              const s = document.createElement("span");
              s.className = "history-item-metric";
              s.textContent = `P: ${formatWithUnit(ma.powerDissipation, "W")}`;
              metricsRow.appendChild(s);
            }
            if (Number.isFinite(ma.currentRms)) {
              const s = document.createElement("span");
              s.className = "history-item-metric";
              s.textContent = `I: ${formatWithUnit(ma.currentRms, "A")}`;
              metricsRow.appendChild(s);
            }
            if (Number.isFinite(ma.thermalRise)) {
              const s = document.createElement("span");
              s.className = "history-item-metric";
              s.textContent = `ΔT: ${ma.thermalRise.toFixed(1)} °C`;
              metricsRow.appendChild(s);
            }
          }
          if (Number.isFinite(run.testVoltage)) {
            const s = document.createElement("span");
            s.className = "history-item-metric";
            s.textContent = `${run.testVoltage} V / ${run.testTemperatureC} °C`;
            metricsRow.appendChild(s);
          }

          const sevSpan = document.createElement("span");
          sevSpan.className = `history-item-severity his-sev-${run.severityA || "safe"}`;
          sevSpan.textContent = SEV_LABELS[run.severityA] || "🟢 Safe";
          metricsRow.appendChild(sevSpan);

          item.appendChild(metricsRow);
          list.appendChild(item);
        });
      }

      const stat = document.getElementById(STAT_ID);

      if (mode === 'compare') {
        const A = calc(typeA, valueA);
        const B = calc(typeB, Number.isFinite(valueB) ? valueB : valueA);
        if (stat) {
          stat.textContent = `A (${descriptorLabelA}): ${JSON.stringify(A)} | B (${descriptorLabelB}): ${JSON.stringify(B)}`;
        }
        reportStatus(`Compare test complete: ${descriptorLabelA} vs ${descriptorLabelB}.`);
      } else {
        const A = calc(typeA, valueA);
        if (stat) {
          stat.textContent = `A (${descriptorLabelA}): ${JSON.stringify(A)}`;
        }
        reportStatus(`Single test complete: ${descriptorLabelA} metrics refreshed.`);
      }

    function exportResults() {
      const statText = document.getElementById(STAT_ID)?.textContent || 'Arena export (no data)';
      const blob = new Blob([statText], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'arena-results.txt';
      a.click();
      reportStatus('Exported the latest arena snapshot.');
    }

    document.getElementById(MODE_ID).addEventListener('change', (event) => {
      const select = event.target;
      const compare = select.value === 'compare';
      document.querySelectorAll('.compare-only').forEach((element) => {
        element.style.display = compare ? '' : 'none';
      });
      syncMeshVisibility(select.value);
    });

    window.addEventListener('message', (event) => {
      const { data } = event;
      if (!data || typeof data !== 'object') {
        return;
      }

      const { type, payload } = data;

      switch (type) {
        case 'arena:configure':
          applyConfig(payload);
          break;
        case 'arena:reset':
          resetArena();
          break;
        case 'arena:run-test':
          runTest();
          break;
        case 'arena:export':
          exportResults();
          break;
        case 'arena:register-components': {
          const payloadObject = payload && typeof payload === 'object' ? payload : {};
          const components = Array.isArray(payloadObject.components) ? payloadObject.components : [];
          ingestManufacturerRoster(components);
          const count = manufacturerRoster.length;
          reportStatus(`Registered ${count} manufacturer component${count === 1 ? '' : 's'} for arena matchups.`);
          const stat = document.getElementById(STAT_ID);
          if (stat) {
            stat.textContent = `Arena bench updated (${count} components).`;
          }
          if (typeof window !== 'undefined' && window.parent && typeof window.parent.postMessage === 'function') {
            window.parent.postMessage({ type: 'arena:components-registered', payload: { count } }, '*');
          }
          break;
        }
        default:
          break;
      }
    });

    init();
    notifyReady();
  </script>

      const grid = document.getElementById("featured-component-grid");
      const selectA = document.getElementById("component-a");
      if (!grid || !selectA) {
        return;
      }

      let activeId = null;
      let catalogTarget = "A"; // which slot (A or B) catalog cards load into

      function loadFeaturedComponent(fc, slotTarget) {
        // Use the explicitly-passed slot or fall back to the current default.
        const target = slotTarget || catalogTarget;

        // 1. Register the component with the main arena state via the public bridge.
        //    This fixes the bug where components added to the DOM <select> were never
        //    added to state.components, causing state.selectedA to end up null.
        if (window.ArenaAPI && typeof window.ArenaAPI.registerComponent === "function") {
          window.ArenaAPI.registerComponent({
            id: fc.id,
            name: `${fc.mfr} ${fc.name}`,
            type: fc.type,
            properties: fc.props,
            metadata: {
              displayName: fc.name,
              partNumber: fc.name,
              vendor: fc.mfr,
              source: "Reference Library",
            },
          });
        } else {
          // Fallback for environments where ArenaAPI isn't yet available
          if (typeof FailureEngine !== "undefined" && FailureEngine.registerComponentType) {
            FailureEngine.registerComponentType(fc.id, {
              family: fc.type,
              defaultProperties: Object.assign({}, fc.props),
            });
          }
          if (!Array.from(selectA.options).some((o) => o.value === fc.id)) {
            const opt = document.createElement("option");
            opt.value = fc.id;
            opt.text = `${fc.mfr} ${fc.name}`;
            selectA.appendChild(opt);
          }
          selectA.value = fc.id;
          selectA.dispatchEvent(new Event("change", { bubbles: true }));
        }

        // 2. Load into the correct slot (A or B) via the bridge.
        if (window.ArenaAPI && typeof window.ArenaAPI.loadComponent === "function") {
          window.ArenaAPI.loadComponent(fc.id, target);
        }

        // 3. Persist so the component survives a page reload.
        try {
          const saved = JSON.parse(localStorage.getItem("arena.v1.featured") || "[]");
          if (!saved.find((s) => s.id === fc.id)) {
            saved.push({ id: fc.id, mfr: fc.mfr, name: fc.name, spec: fc.spec, type: fc.type, props: fc.props });
            if (saved.length > 30) saved.shift();
            localStorage.setItem("arena.v1.featured", JSON.stringify(saved));
          }
        } catch (e) { /* storage unavailable */ }

        activeId = fc.id;
        renderPage();
      }

      // ── Type metadata for pills and icons ─────────────────────────────────
      const TYPE_META = {
        battery:           { label: "Batteries",    icon: "🔋" },
        resistor:          { label: "Resistors",    icon: "🟫" },
        capacitor:         { label: "Capacitors",   icon: "⚡" },
        led:               { label: "LEDs",          icon: "💡" },
        diode:             { label: "Diodes",        icon: "🔺" },
        zener_diode:       { label: "Zener",         icon: "⚡" },
        bjt:               { label: "BJTs",          icon: "🔌" },
        "bjt-npn":         { label: "BJTs",          icon: "🔌" },
        "bjt-pnp":         { label: "BJTs",          icon: "🔌" },
        mosfet:            { label: "MOSFETs",       icon: "🔋" },
        voltage_regulator: { label: "Regulators",   icon: "🔧" },
        opamp:             { label: "Op-Amps",       icon: "📡" },
        ic:                { label: "ICs",           icon: "💡" },
        inductor:          { label: "Inductors",     icon: "〰️" },
        crystal:           { label: "Crystals",      icon: "🔷" },
        thermistor:        { label: "Thermistors",   icon: "🌡️" },
        fuse:              { label: "Fuses",          icon: "🔗" },
      };

      // Derive ordered unique category labels from the component list.
      function resolveCategory(type) {
        // Merge bjt / bjt-npn / bjt-pnp into same bucket
        const t = (type === "bjt-pnp" || type === "bjt-npn") ? "bjt" : type;
        return TYPE_META[t] ? TYPE_META[t].label : type.replace(/_/g, " ");
      }

      const ALL_CATEGORIES = (() => {
        const seen = new Set();
        const ordered = [];
        FEATURED_COMPONENTS.forEach((fc) => {
          const cat = resolveCategory(fc.type);
          if (!seen.has(cat)) { seen.add(cat); ordered.push(cat); }
        });
        return ordered;
      })();

      let activeTypeFilter = null; // null = All
      let searchQuery = "";

      function filteredComponents() {
        const q = searchQuery.trim().toLowerCase();
        return FEATURED_COMPONENTS.filter((fc) => {
          const matchesType = !activeTypeFilter || resolveCategory(fc.type) === activeTypeFilter;
          const matchesSearch = !q ||
            fc.mfr.toLowerCase().includes(q) ||
            fc.name.toLowerCase().includes(q) ||
            fc.spec.toLowerCase().includes(q) ||
            fc.type.toLowerCase().includes(q);
          return matchesType && matchesSearch;
        });
      }

      // ── Render the scrollable component list ──────────────────────────────
      function renderPage() {
        grid.innerHTML = "";
        const items = filteredComponents();

        if (!items.length) {
          const empty = document.createElement("div");
          empty.style.cssText = "padding:12px;text-align:center;color:rgba(148,163,184,0.5);font-size:11px;";
          empty.textContent = "No components match your search.";
          grid.appendChild(empty);
          return;
        }

        // Group by category for section headers
        const grouped = new Map();
        items.forEach((fc) => {
          const cat = resolveCategory(fc.type);
          if (!grouped.has(cat)) grouped.set(cat, []);
          grouped.get(cat).push(fc);
        });

        grouped.forEach((fcs, cat) => {
          // Only show category header when not filtered to one type
          if (!activeTypeFilter) {
            const catHeader = document.createElement("div");
            catHeader.className = "catalog-category-label";
            catHeader.textContent = cat;
            grid.appendChild(catHeader);
          }

          fcs.forEach((fc) => {
            const meta = TYPE_META[fc.type] || { icon: "🔩" };
            const row = document.createElement("div");
            row.className = "featured-component-row" + (fc.id === activeId ? " selected" : "");
            row.setAttribute("role", "listitem");
            row.setAttribute("tabindex", "0");

            const badge = document.createElement("div");
            badge.className = "fcrw-type-badge";
            badge.textContent = meta.icon;
            badge.setAttribute("aria-hidden", "true");

            const info = document.createElement("div");
            info.className = "fcrw-info";

            const nameEl = document.createElement("div");
            nameEl.className = "fcrw-name";
            nameEl.textContent = fc.name;

            const mfrEl = document.createElement("div");
            mfrEl.className = "fcrw-mfr";
            mfrEl.textContent = fc.mfr;

            const specEl = document.createElement("div");
            specEl.className = "fcrw-spec";
            specEl.textContent = fc.spec;

            info.appendChild(nameEl);
            info.appendChild(mfrEl);
            info.appendChild(specEl);

            // Slot A / B quick-load buttons
            const btnWrap = document.createElement("div");
            btnWrap.className = "fcrw-load-btns";

            const btnA = document.createElement("button");
            btnA.className = "fcrw-slot-btn";
            btnA.textContent = "A";
            btnA.title = `Load ${fc.mfr} ${fc.name} into Component A`;
            btnA.addEventListener("click", (e) => { e.stopPropagation(); loadFeaturedComponent(fc, "A"); });

            const btnB = document.createElement("button");
            btnB.className = "fcrw-slot-btn slot-b";
            btnB.textContent = "B";
            btnB.title = `Load ${fc.mfr} ${fc.name} into Component B`;
            btnB.addEventListener("click", (e) => { e.stopPropagation(); loadFeaturedComponent(fc, "B"); });

            btnWrap.appendChild(btnA);
            btnWrap.appendChild(btnB);

            row.appendChild(badge);
            row.appendChild(info);
            row.appendChild(btnWrap);

            // Clicking the row itself loads into the current default slot
            row.addEventListener("click", () => loadFeaturedComponent(fc, catalogTarget));
            row.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); loadFeaturedComponent(fc, catalogTarget); } });
            grid.appendChild(row);
          });
        });
      }

      // ── Build type-filter pills ────────────────────────────────────────────
      const filtersContainer = document.getElementById("catalog-type-filters");
      function renderTypePills() {
        if (!filtersContainer) return;
        filtersContainer.innerHTML = "";

        const allPill = document.createElement("button");
        allPill.className = "catalog-type-pill" + (!activeTypeFilter ? " active" : "");
        allPill.textContent = "All";
        allPill.addEventListener("click", () => { activeTypeFilter = null; renderTypePills(); renderPage(); });
        filtersContainer.appendChild(allPill);

        ALL_CATEGORIES.forEach((cat) => {
          const pill = document.createElement("button");
          pill.className = "catalog-type-pill" + (activeTypeFilter === cat ? " active" : "");
          pill.textContent = cat;
          pill.addEventListener("click", () => { activeTypeFilter = activeTypeFilter === cat ? null : cat; renderTypePills(); renderPage(); });
          filtersContainer.appendChild(pill);
        });
      }

      // ── Wire up search ─────────────────────────────────────────────────────
      const searchInput = document.getElementById("catalog-search");
      if (searchInput) {
        searchInput.addEventListener("input", () => {
          searchQuery = searchInput.value;
          renderPage();
        });
      }

      renderTypePills();
      renderPage();

      // ── Restore featured components saved in previous sessions ─────────────
      // Re-register them with FailureEngine and ArenaAPI so they appear in the
      // component selectors without the user needing to click them again.
      try {
        const saved = JSON.parse(localStorage.getItem("arena.v1.featured") || "[]");
        saved.forEach((fc) => {
          if (typeof FailureEngine !== "undefined" && FailureEngine.registerComponentType) {
            FailureEngine.registerComponentType(fc.id, {
              family: fc.type,
              defaultProperties: Object.assign({}, fc.props),
            });
          }
          if (window.ArenaAPI && typeof window.ArenaAPI.registerComponent === "function") {
            window.ArenaAPI.registerComponent({
              id: fc.id,
              name: `${fc.mfr} ${fc.name}`,
              type: fc.type,
              properties: fc.props,
              metadata: { displayName: fc.name, partNumber: fc.name, vendor: fc.mfr, source: "Reference Library" },
            });
          }
        });
      } catch (e) { /* storage unavailable */ }
    })();
  </script>
  <!-- Stress Timeline Strip -->
  <div class="stress-timeline" id="stress-timeline" role="region" aria-label="Stress timeline" style="display:none;">
    <div class="stress-timeline-header">
      <span class="stress-timeline-label">Stress Timeline</span>
      <div class="stress-timeline-controls">
        <button class="stress-ctrl-btn" id="tl-play" aria-label="Play timeline">▶ Play</button>
        <button class="stress-ctrl-btn" id="tl-step" aria-label="Step forward">Step ▸</button>
        <button class="stress-ctrl-btn" id="tl-close" aria-label="Close timeline">✕</button>
      </div>
    </div>
    <canvas class="stress-timeline-canvas" id="stress-timeline-canvas" aria-label="Stress timeline graph" role="img"></canvas>
  </div>
</body>
</html>
