<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CircuiTry3D - Component Arena</title>
  <style>
    .arena-header {
      position: fixed;
      top: calc(8px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .arena-brand {
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 900;
      letter-spacing: -0.015em;
      display: inline-flex;
      gap: 2px;
      filter: drop-shadow(0 0 8px rgba(40,255,190,0.35));
      pointer-events: auto;
    }

    .arena-brand span {
      display: inline-block;
    }

    .arena-brand-green {
      color: #39ffb7;
      text-shadow: 0 0 8px rgba(57,255,183,0.6), 0 0 14px rgba(5,214,172,0.4);
    }

    .arena-brand-orange {
      color: #ff8b2b;
      text-shadow: 0 0 6px rgba(255,167,65,0.55), 0 0 12px rgba(255,120,28,0.4);
    }

    .arena-for-everyone {
      font-size: clamp(0.58rem, 1.2vw, 0.68rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(110, 230, 130, 0.9);
      text-shadow: 0 0 10px rgba(80, 200, 100, 0.5);
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid rgba(100, 220, 120, 0.3);
      background: rgba(100, 220, 120, 0.07);
      white-space: nowrap;
      pointer-events: auto;
    }

    .arena-nav {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      justify-content: center;
      pointer-events: auto;
    }

    .arena-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(57,255,183,0.28);
      background: rgba(8,26,36,0.55);
      color: #dbeafe;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.6rem;
      font-weight: 700;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 12px rgba(1, 19, 30, 0.4);
      cursor: pointer;
    }

    .arena-nav-btn:hover {
      border-color: rgba(57,255,183,0.65);
      background: rgba(14,48,60,0.68);
      color: #f8fafc;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --panel-bg: rgba(0, 0, 0, 0.68);
      --panel-border: rgba(136, 204, 255, 0.28);
      --panel-border-strong: rgba(0, 255, 136, 0.45);
      --metric-bg: rgba(12, 22, 42, 0.8);
      --metric-border: rgba(136, 204, 255, 0.22);
      --metric-accent-a: rgba(0, 255, 136, 0.45);
      --metric-accent-b: rgba(136, 204, 255, 0.45);
      --metric-accent-delta: rgba(255, 160, 0, 0.5);
      --text-muted: #94a3b8;
      --text-strong: #e2e8f0;
      --accent-green: #39ffb7;
      --accent-orange: #ff8b2b;
      --accent-cyan: #38bdf8;
      --accent-purple: rgba(168, 85, 247, 0.7);
      --panel-radius: 18px;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --shadow-panel: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(136,204,255,0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: radial-gradient(ellipse at 50% -5%, #1a1040 0%, #0a0e27 40%, #030615 80%);
      color: var(--text-strong);
      font-family: "DM Sans", "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      box-sizing: border-box;
      overflow: hidden;
      overscroll-behavior: none; /* prevent iOS bounce-scroll visual glitches */
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% -10%, rgba(14, 165, 233, 0.28), transparent 55%),
        radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.25), transparent 52%),
        radial-gradient(circle at 20% 80%, rgba(57, 255, 183, 0.08), transparent 60%);
      z-index: 0;
      pointer-events: none;
      opacity: 1.0;
    }

    #arena {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      will-change: transform; /* promote to own GPU compositing layer */
    }

    /* ── Embedded-in-React-shell mode ────────────────────────────────── */
    /* The is-embedded class is applied immediately by the <head> script   */
    /* so there is no flash of the native header over the GlobalModeBar.   */
    html.is-embedded .arena-header {
      display: none !important;
    }
    /* Pull the HUD and panel up to sit just below the React GlobalModeBar.
       --parent-clearance is set via arena:init once the shell measures its bar.
       Default 70px covers the typical GlobalModeBar height (~44px) + 12px top offset.
       68px ≈ HUD button height (44px) + 16px gap below HUD before panel top.
       98px = 68px (HUD block) + 30px bottom padding for the panel max-height calc. */
    html.is-embedded .hud {
      top: calc(var(--parent-clearance, 70px) + var(--safe-top));
    }
    html.is-embedded .panel {
      top: calc(var(--parent-clearance, 70px) + 68px + var(--safe-top));
      max-height: calc(100vh - var(--parent-clearance, 70px) - 98px - var(--safe-top) - var(--safe-bottom));
    }

    .hud {
      position: fixed;
      top: calc(100px + var(--safe-top));
      left: calc(16px + var(--safe-left));
      right: calc(16px + var(--safe-right));
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      z-index: 3;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid rgba(94, 234, 212, 0.45);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      letter-spacing: 0.01em;
      font-size: 13px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 0 0 rgba(34, 211, 238, 0);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(34, 211, 238, 0.25);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #btn-run {
      border-color: rgba(57, 255, 183, 0.65);
      color: #39ffb7;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 0 16px rgba(57, 255, 183, 0.18), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    #btn-run:hover {
      box-shadow: 0 0 28px rgba(57, 255, 183, 0.38), 0 8px 24px rgba(0,0,0,0.4);
      background: rgba(4, 40, 30, 0.95);
    }
    #btn-run:active {
      transform: scale(0.97) translateY(0);
    }

    .file-btn {
      position: relative;
      overflow: hidden;
    }

    .file-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .panel {
      position: fixed;
      top: calc(164px + var(--safe-top));
      left: calc(16px + var(--safe-left));
      width: 340px;
      max-width: calc(100vw - 32px - var(--safe-left) - var(--safe-right));
      max-height: calc(100vh - 194px - var(--safe-top) - var(--safe-bottom));
      background: rgba(10, 12, 28, 0.82);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border: 1px solid var(--panel-border);
      border-radius: var(--panel-radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      z-index: 4;
      box-shadow: var(--shadow-panel), 0 0 60px rgba(0,180,255,0.04) inset;
    }

    /* Reduce heavy blur on mobile/touch devices — prevents GPU frame-rate drops
       and compositing glitches on Android WebView and iOS WKWebView. */
    @media (pointer: coarse) {
      .panel {
        backdrop-filter: blur(8px) saturate(140%);
        -webkit-backdrop-filter: blur(8px) saturate(140%);
        background: rgba(10, 12, 28, 0.92);
      }
    }

    .panel-scroll {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 4px;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      background: rgba(136, 204, 255, 0.3);
      border-radius: 999px;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 0 14px;
      border-bottom: 1px solid rgba(136,204,255,0.07);
      margin-bottom: 2px;
    }

    .section-heading {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(200, 220, 255, 0.9);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-heading::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 2px;
      background: linear-gradient(180deg, #38bdf8, #39ffb7);
      flex-shrink: 0;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row label {
      width: 130px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .row input,
    .row select {
      flex: 1;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(51, 65, 85, 0.9);
      background: rgba(8, 15, 28, 0.92);
      color: var(--text-strong);
      font-size: 13px;
    }

    .import-status {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.85);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(136, 204, 255, 0.18);
      background: rgba(12, 22, 42, 0.65);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .panel-header .section-heading {
      margin: 0;
    }

    .panel-subtext {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(148, 163, 184, 0.85);
    }

    .chip-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(136, 204, 255, 0.35);
      background: rgba(12, 22, 42, 0.4);
      color: var(--text-strong);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .chip-btn:hover {
      background: rgba(24, 32, 48, 0.6);
      border-color: rgba(136, 204, 255, 0.5);
    }

    .chip-btn:active {
      transform: scale(0.95);
    }

    .import-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .import-tag {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(12, 22, 42, 0.65);
      border: 1px solid rgba(136, 204, 255, 0.18);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.85);
    }

    .summary-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 180px;
      overflow-y: auto;
    }

    .summary-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(148, 163, 184, 0.85);
      border-bottom: 1px solid rgba(136, 204, 255, 0.12);
      padding-bottom: 4px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }

    .metric-card {
      position: relative;
      background: rgba(8, 14, 34, 0.82);
      border: 1px solid var(--metric-border);
      border-radius: 14px;
      padding: 12px 11px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.2s var(--spring);
      cursor: default;
    }

    .metric-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.06) 0%, transparent 60%);
    }

    .metric-card:hover {
      transform: translateY(-1px);
      border-color: rgba(136, 204, 255, 0.36);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .metric-card:hover::before {
      opacity: 1;
    }

    .metric-card.metric-accent-a {
      border-color: rgba(57, 255, 183, 0.28);
    }
    .metric-card.metric-accent-a:hover {
      border-color: rgba(57, 255, 183, 0.50);
      box-shadow: 0 4px 20px rgba(57, 255, 183, 0.08);
    }

    .metric-card.metric-accent-b {
      border-color: rgba(56, 189, 248, 0.28);
    }
    .metric-card.metric-accent-b:hover {
      border-color: rgba(56, 189, 248, 0.50);
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.08);
    }

    .metric-card.metric-accent-delta {
      border-color: rgba(251, 146, 60, 0.28);
    }
    .metric-card.metric-accent-delta:hover {
      border-color: rgba(251, 146, 60, 0.50);
      box-shadow: 0 4px 20px rgba(251, 146, 60, 0.08);
    }

    .metric-card.health-warn {
      border-color: rgba(251, 191, 36, 0.45) !important;
      background: rgba(20, 15, 4, 0.88);
    }
    .metric-card.health-critical {
      border-color: rgba(239, 68, 68, 0.55) !important;
      background: rgba(22, 6, 6, 0.9);
      animation: metric-critical-pulse 2.5s ease-in-out infinite;
    }

    @keyframes metric-critical-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(239,68,68,0); }
      50%       { box-shadow: 0 0 16px rgba(239,68,68,0.22); }
    }


    .metric-icon {
      font-size: 14px;
      line-height: 1;
      margin-bottom: 1px;
      opacity: 0.7;
    }

    .metric-label {
      font-size: 10px;
      color: rgba(148, 163, 184, 0.75);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
      line-height: 1.2;
    }

    .metric-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: -0.02em;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .metric-value.health-safe   { color: #34d399; }
    .metric-value.health-warn   { color: #fbbf24; }
    .metric-value.health-critical { color: #f87171; }

    .metric-detail {
      font-size: 10.5px;
      color: rgba(148, 163, 184, 0.7);
      line-height: 1.3;
    }

    .metric-util-bar {
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      margin-top: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .metric-util-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(56, 189, 248, 0.7);
    }
    .metric-util-fill.util-safe     { background: linear-gradient(90deg, #10b981, #34d399); }
    .metric-util-fill.util-warn     { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .metric-util-fill.util-critical { background: linear-gradient(90deg, #dc2626, #f87171); box-shadow: 0 0 6px rgba(239,68,68,0.6); }

    .metric-empty {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.6);
      padding: 16px 6px;
      text-align: center;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    .stat {
      font-size: 12px;
      color: rgba(129, 140, 248, 0.95);
      background: rgba(30, 64, 175, 0.25);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.25);
      letter-spacing: 0.02em;
      min-height: 44px;
    }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        cursor: grab;
      }

    .compare-only {
      display: none;
    }

    .failure-analysis {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .failure-ok {
      font-size: 12px;
      color: rgba(52, 211, 153, 0.9);
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(52, 211, 153, 0.25);
      background: rgba(6, 78, 59, 0.25);
    }

    .failure-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .failure-stressed {
      background: rgba(250, 204, 21, 0.2);
      border: 1px solid rgba(250, 204, 21, 0.5);
      color: #fde68a;
    }

    .failure-warning {
      background: rgba(251, 146, 60, 0.2);
      border: 1px solid rgba(251, 146, 60, 0.5);
      color: #fed7aa;
    }

    .failure-critical {
      background: rgba(239, 68, 68, 0.22);
      border: 1px solid rgba(239, 68, 68, 0.55);
      color: #fca5a5;
      animation: pulse-critical 2s ease-in-out infinite;
    }

    .failure-failed {
      background: rgba(220, 38, 38, 0.38);
      border: 1px solid rgba(220, 38, 38, 0.75);
      color: #fef2f2;
      animation: pulse-failed 1.4s ease-in-out infinite;
    }

    @keyframes pulse-critical {
      0%, 100% { box-shadow: 0 0 6px rgba(239, 68, 68, 0.3); }
      50%       { box-shadow: 0 0 18px rgba(239, 68, 68, 0.7), 0 0 36px rgba(239, 68, 68, 0.25); }
    }

    @keyframes pulse-failed {
      0%, 100% { box-shadow: 0 0 8px rgba(220, 38, 38, 0.45), 0 0 20px rgba(220, 38, 38, 0.2); }
      50%       { box-shadow: 0 0 22px rgba(220, 38, 38, 0.9), 0 0 44px rgba(220, 38, 38, 0.4), 0 0 70px rgba(220, 38, 38, 0.12); }
    }

    .failure-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: failure-card-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .failure-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .failure-risk-meter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(5, 8, 20, 0.6);
      border: 1px solid rgba(136, 204, 255, 0.10);
      margin-bottom: 4px;
    }

    .failure-risk-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.7);
      white-space: nowrap;
    }

    .failure-risk-score {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 38px;
    }
    .failure-risk-score.risk-safe     { color: #34d399; }
    .failure-risk-score.risk-stressed { color: #fde68a; }
    .failure-risk-score.risk-warning  { color: #fb923c; }
    .failure-risk-score.risk-critical { color: #f87171; }
    .failure-risk-score.risk-failed   { color: #fef2f2; text-shadow: 0 0 12px rgba(239,68,68,0.8); }

    .failure-risk-arc {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .failure-risk-arc-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .failure-risk-arc-fill.risk-safe     { background: linear-gradient(90deg, #059669, #34d399); }
    .failure-risk-arc-fill.risk-stressed { background: linear-gradient(90deg, #b45309, #fbbf24); }
    .failure-risk-arc-fill.risk-warning  { background: linear-gradient(90deg, #c2410c, #fb923c); box-shadow: 0 0 6px rgba(251,146,60,0.5); }
    .failure-risk-arc-fill.risk-critical { background: linear-gradient(90deg, #991b1b, #f87171); box-shadow: 0 0 8px rgba(248,113,113,0.6); animation: bar-pulse-critical 2s ease-in-out infinite; }
    .failure-risk-arc-fill.risk-failed   { background: linear-gradient(90deg, #7f1d1d, #ef4444, #fca5a5); box-shadow: 0 0 12px rgba(239,68,68,0.7); animation: bar-pulse-failed 1.4s ease-in-out infinite; }

    @keyframes failure-card-in {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .failure-severity-bar-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.8);
      overflow: hidden;
      margin-bottom: 2px;
    }

    .failure-severity-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);

      box-shadow: 0 0 8px rgba(248, 113, 113, 0.7);
      animation: bar-pulse-critical 2s ease-in-out infinite;

      animation: bar-pulse-failed 1.4s ease-in-out infinite;

      function setupInteractionControls(canvas) {
        if (!canvas || pointerControlsInitialised) {
          return;
        }
        pointerControlsInitialised = true;
        pointerState.activePointers.clear();
        pointerState.lastSinglePosition = null;
        pointerState.lastMultiMidpoint = null;
        pointerState.lastMultiDistance = null;
        canvas.style.touchAction = "none";
        canvas.style.userSelect = "none";
        canvas.style.webkitUserSelect = "none";
        canvas.style.cursor = "grab";
        canvas.addEventListener("pointerdown", handlePointerDown, { passive: false });
        canvas.addEventListener("pointermove", handlePointerMove, { passive: false });
        canvas.addEventListener("pointerup", handlePointerUp, { passive: false });
        canvas.addEventListener("pointercancel", handlePointerUp, { passive: false });
        canvas.addEventListener("pointerleave", handlePointerUp, { passive: false });
        canvas.addEventListener("wheel", handleWheel, { passive: false });
        canvas.addEventListener("contextmenu", preventContextMenu);
      }

      function preventContextMenu(event) {
        event.preventDefault();
      }

      function handlePointerDown(event) {
        event.preventDefault();
        if (!interactionCanvas) {
          interactionCanvas = event.currentTarget;
        }
        if (interactionCanvas) {
          try {
            interactionCanvas.setPointerCapture(event.pointerId);
          } catch (error) {
            // Ignore pointer capture failures (e.g., unsupported devices)
          }
          interactionCanvas.style.cursor = "grabbing";
        }

        pointerState.activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

        if (pointerState.activePointers.size === 1) {
          pointerState.lastSinglePosition = { x: event.clientX, y: event.clientY };
          pointerState.lastMultiMidpoint = null;
          pointerState.lastMultiDistance = null;
        } else if (pointerState.activePointers.size === 2) {
          const info = getMultiTouchInfo();
          pointerState.lastMultiMidpoint = info ? info.midpoint : null;
          pointerState.lastMultiDistance = info ? info.distance : null;
        }
      }

      function handlePointerMove(event) {
        const tracked = pointerState.activePointers.get(event.pointerId);
        if (!tracked) {
          return;
        }
        event.preventDefault();

        tracked.x = event.clientX;
        tracked.y = event.clientY;

        if (pointerState.activePointers.size === 1) {
          if (!pointerState.lastSinglePosition) {
            pointerState.lastSinglePosition = { x: tracked.x, y: tracked.y };
            return;
          }
          const deltaX = tracked.x - pointerState.lastSinglePosition.x;
          if (Math.abs(deltaX) > 0.2) {
            rotateCamera(deltaX);
          }
          pointerState.lastSinglePosition = { x: tracked.x, y: tracked.y };
        } else if (pointerState.activePointers.size >= 2) {
          const info = getMultiTouchInfo();
          if (!info) {
            return;
          }

          if (pointerState.lastMultiMidpoint) {
            const deltaMidX = info.midpoint.x - pointerState.lastMultiMidpoint.x;
            const deltaMidY = info.midpoint.y - pointerState.lastMultiMidpoint.y;
            if (Math.abs(deltaMidX) > 0.3 || Math.abs(deltaMidY) > 0.3) {
              panCamera(deltaMidX, deltaMidY);
            }
          }
          pointerState.lastMultiMidpoint = info.midpoint;

          if (typeof pointerState.lastMultiDistance === "number") {
            const distanceDelta = info.distance - pointerState.lastMultiDistance;
            if (Math.abs(distanceDelta) > 0.5) {
              zoomCamera(distanceDelta);
            }
          }
          pointerState.lastMultiDistance = info.distance;
        }
      }

      function handlePointerUp(event) {
        if (interactionCanvas && interactionCanvas.hasPointerCapture(event.pointerId)) {
          interactionCanvas.releasePointerCapture(event.pointerId);
        }
        pointerState.activePointers.delete(event.pointerId);

        const remainingCount = pointerState.activePointers.size;
        if (remainingCount === 0) {
          pointerState.lastSinglePosition = null;
          pointerState.lastMultiMidpoint = null;
          pointerState.lastMultiDistance = null;
          if (interactionCanvas) {
            interactionCanvas.style.cursor = "grab";
          }
        } else if (remainingCount === 1) {
          const remaining = getSinglePointer();
          pointerState.lastSinglePosition = remaining ? { x: remaining.x, y: remaining.y } : null;
          pointerState.lastMultiMidpoint = null;
          pointerState.lastMultiDistance = null;
          if (interactionCanvas) {
            interactionCanvas.style.cursor = "grabbing";
          }
        } else {
          const info = getMultiTouchInfo();
          pointerState.lastMultiMidpoint = info ? info.midpoint : null;
          pointerState.lastMultiDistance = info ? info.distance : null;
        }
      }

      function getSinglePointer() {
        const entries = Array.from(pointerState.activePointers.values());
        return entries.length === 1 ? entries[0] : null;
      }

      function getMultiTouchInfo() {
        const entries = Array.from(pointerState.activePointers.values());
        if (entries.length < 2) {
          return null;
        }
        const [first, second] = entries;
        const midpoint = {
          x: (first.x + second.x) / 2,
          y: (first.y + second.y) / 2
        };
        const distance = Math.hypot(second.x - first.x, second.y - first.y);
        return { midpoint, distance };
      }

      function handleWheel(event) {
        event.preventDefault();
        const normalized = Math.max(-1, Math.min(1, event.deltaY));
        const zoomStep = normalized * (cameraControls.radius * 0.08);
        cameraControls.radius = THREE.MathUtils.clamp(
          cameraControls.radius + zoomStep,
          cameraControls.minRadius,
          cameraControls.maxRadius
        );
        updateCameraPosition();
      }

      function rotateCamera(deltaX) {
        if (!cameraTarget) {
          return;
        }
        cameraControls.azimuth -= deltaX * cameraControls.rotateSpeed;
        const twoPi = Math.PI * 2;
        if (cameraControls.azimuth > twoPi || cameraControls.azimuth < -twoPi) {
          cameraControls.azimuth = ((cameraControls.azimuth % twoPi) + twoPi) % twoPi;
        }
        updateCameraPosition();
      }

      function panCamera(deltaX, deltaY) {
        if (!camera || !cameraTarget) {
          return;
        }
        const viewDir = tmpVecA.subVectors(cameraTarget, camera.position).normalize();
        const right = tmpVecB.crossVectors(viewDir, WORLD_UP).normalize();
        if (right.lengthSq() === 0) {
          right.set(1, 0, 0);
        }
        const forward = tmpVecC.crossVectors(WORLD_UP, right).normalize();

        const verticalFactor =
          (2 * cameraControls.radius * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5))) /
          Math.max(window.innerHeight, 1);
        const horizontalFactor = verticalFactor * camera.aspect;

        cameraTarget.addScaledVector(right, -deltaX * horizontalFactor * cameraControls.panScalar);
        cameraTarget.addScaledVector(forward, deltaY * verticalFactor * cameraControls.panScalar);

        cameraTarget.x = THREE.MathUtils.clamp(cameraTarget.x, -6, 6);
        cameraTarget.z = THREE.MathUtils.clamp(cameraTarget.z, -6, 6);

        updateCameraPosition();
      }

      function zoomCamera(distanceDelta) {
        if (!cameraTarget || Math.abs(distanceDelta) < 0.5) {
          return;
        }
        const zoomAmount = distanceDelta * cameraControls.radius * cameraControls.zoomSpeed;
        cameraControls.radius = THREE.MathUtils.clamp(
          cameraControls.radius - zoomAmount,
          cameraControls.minRadius,
          cameraControls.maxRadius
        );
        updateCameraPosition();
      }

      function updateCameraPosition() {
        if (!camera || !cameraTarget) {
          return;
        }
        cameraControls.radius = THREE.MathUtils.clamp(
          cameraControls.radius,
          cameraControls.minRadius,
          cameraControls.maxRadius
        );
        const x = cameraTarget.x + Math.sin(cameraControls.azimuth) * cameraControls.radius;
        const z = cameraTarget.z + Math.cos(cameraControls.azimuth) * cameraControls.radius;
        const y = cameraTarget.y + cameraControls.height;
        camera.position.set(x, y, z);
        camera.lookAt(cameraTarget);
      }

            const lever = new THREE.Mesh(
              new THREE.CylinderGeometry(0.08, 0.04, 0.9, 24),
              new THREE.MeshStandardMaterial({
                color: palette.glow,
                metalness: 0.9,
                roughness: 0.3,
              })
            );
            lever.position.set(0, 0.45, 0);
            lever.rotation.z = -Math.PI / 6;
            group.add(base, lever);
            break;
          }
          default: {
            core = new THREE.Mesh(new THREE.OctahedronGeometry(0.75, 0), material);
            break;
          }
        }

        group.add(core);
        group.userData.core = core;

        const halo = new THREE.Mesh(
          new THREE.SphereGeometry(0.95, 32, 32),
          new THREE.MeshBasicMaterial({
            color: palette.glow,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          })
        );
        group.add(halo);
        group.userData.halo = halo;

        const orbiters = [];
        for (let i = 0; i < 3; i++) {
          const orb = new THREE.Mesh(
            new THREE.SphereGeometry(0.12 + i * 0.03, 18, 18),
            new THREE.MeshBasicMaterial({
              color: palette.orbit,
              transparent: true,
              opacity: 0.78 - i * 0.2,
              depthWrite: false,
              blending: THREE.AdditiveBlending,
            })
          );
          orb.userData = {
            radius: 0.95 + i * 0.22,
            height: 0.28 + i * 0.16,
            speed: 0.7 + i * 0.42,
          };
          orbiters.push(orb);
          group.add(orb);
        }
        group.userData.orbiters = orbiters;

        group.scale.setScalar(group.userData.baseScale);
        group.position.y = 0.25;

        if (isPrimary) {
          const badge = new THREE.Mesh(
            new THREE.CircleGeometry(0.44, 32),
            new THREE.MeshBasicMaterial({
              color: 0x22d3ee,
              transparent: true,
              opacity: 0.4,
              depthWrite: false,
            })
          );
          badge.rotation.x = -Math.PI / 2;
          badge.position.set(0, -0.68, 0);
          group.add(badge);
        }

        return group;
      }

      function computeScale(value) {
        if (!Number.isFinite(value) || value <= 0) {
          return 1;
        }
        const scaled = Math.log10(value + 10) / 3;
        return THREE.MathUtils.clamp(0.75 + scaled, 0.7, 2.3);
      }

      function rebuildComponentGroup(slot, type, nominalValue) {
        const isPrimary = slot === "A";
        const current = isPrimary ? componentGroupA : componentGroupB;
        if (current) {
          scene.remove(current);
          disposeGroup(current);
        }

        const nextGroup = buildComponent(type, nominalValue, isPrimary);
        nextGroup.position.x = COMPONENT_POSITIONS[slot];
        nextGroup.visible = isPrimary || (state.mode === "compare" && Boolean(state.selectedB));
        scene.add(nextGroup);

        if (isPrimary) {
          componentGroupA = nextGroup;
        } else {
          componentGroupB = nextGroup;
        }

        return nextGroup;
      }

      function ensureComponentGroup(slot, component) {
        const isPrimary = slot === "A";
        const current = isPrimary ? componentGroupA : componentGroupB;

        if (!component) {
          if (current) {
            current.visible = false;
          }
          return current || null;
        }

        const paletteKey = component.type && COMPONENT_PALETTES[component.type]
          ? component.type
          : "default";
        const nominalValue = extractNominalValue(component);
        const baseScale = computeScale(nominalValue);

        let group = current;
        if (!group || group.userData.componentType !== paletteKey) {
          group = rebuildComponentGroup(slot, paletteKey, nominalValue);
        } else {
          group.visible = isPrimary || (state.mode === "compare" && Boolean(state.selectedB));
          group.userData.baseScale = baseScale;
          group.scale.setScalar(group.userData.baseScale);
        }

        group.userData.nominalValue = nominalValue;
        group.userData.componentType = paletteKey;
        group.userData.bobOffset = group.userData.bobOffset ?? Math.random() * Math.PI * 2;
        return group;
      }

      function disposeGroup(group) {
        group.traverse((child) => {
          if (child.geometry) {
            child.geometry.dispose();
          }
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach((mat) => mat.dispose());
            } else {
              child.material.dispose();
            }
          }
        });
      }

        function animate() {
          requestAnimationFrame(animate);

          if (!clock) {
            if (controls) {
              controls.update();
              if (clampControlsTarget()) {
                controls.update();
              }
            }
            if (renderer && camera) {
              renderer.render(scene, camera);
            }
            return;
          }

          const delta = clock.getDelta();
          const elapsed = clock.elapsedTime;

          updateComponentAnimation(componentGroupA, elapsed, delta);
          if (componentGroupB && componentGroupB.visible) {
            updateComponentAnimation(componentGroupB, elapsed + 0.6, delta);
          }

          if (energyRing) {
            energyRing.rotation.z += delta * 0.55;
            const energyLevel = Math.max(
              componentGroupA ? componentGroupA.userData.energy || 0 : 0,
              componentGroupB && componentGroupB.visible ? componentGroupB.userData.energy || 0 : 0,
            );
            energyRing.material.opacity = 0.35 + energyLevel * 0.35;
            const pulse = 1 + Math.sin(elapsed * 1.4) * 0.04 + energyLevel * 0.12;
            energyRing.scale.setScalar(pulse);
          }

          if (pulseRing && pulseRing.userData.life > 0) {
            pulseRing.userData.life -= delta * 0.9;
            const life = Math.max(pulseRing.userData.life, 0);
            pulseRing.material.opacity = life * pulseRing.userData.strength;
            const scale = 1 + (1 - life) * (1.4 + pulseRing.userData.strength * 1.2);
            pulseRing.scale.setScalar(scale);
          }

          animateParticles(delta);

          if (controls) {
            controls.update();
            if (clampControlsTarget()) {
              controls.update();
            }
          }

          if (renderer && camera) {
            renderer.render(scene, camera);
          }
        }

        const delta = clock.getDelta();
        const elapsed = clock.elapsedTime;

        updateComponentAnimation(componentGroupA, elapsed, delta);
        if (componentGroupB && componentGroupB.visible) {
          updateComponentAnimation(componentGroupB, elapsed + 0.6, delta);
        }

        if (energyRing) {
          energyRing.rotation.z += delta * 0.55;
          const energyLevel = Math.max(
            componentGroupA ? componentGroupA.userData.energy || 0 : 0,
            componentGroupB && componentGroupB.visible ? componentGroupB.userData.energy || 0 : 0,
          );
          energyRing.material.opacity = 0.35 + energyLevel * 0.35;
          const pulse = 1 + Math.sin(elapsed * 1.4) * 0.04 + energyLevel * 0.12;
          energyRing.scale.setScalar(pulse);
        }

        if (pulseRing && pulseRing.userData.life > 0) {
          pulseRing.userData.life -= delta * 0.9;
          const life = Math.max(pulseRing.userData.life, 0);
          pulseRing.material.opacity = life * pulseRing.userData.strength;
          const scale = 1 + (1 - life) * (1.4 + pulseRing.userData.strength * 1.2);
          pulseRing.scale.setScalar(scale);
        }

        animateParticles(delta);

        if (cameraTarget) {
          camera.lookAt(cameraTarget);
        }

        renderer.render(scene, camera);
      }

      function updateComponentAnimation(group, elapsed, delta) {
        if (!group) {
          return;
        }
        const energy = group.userData.energy || 0.25;
        group.rotation.y += delta * (0.8 + energy * 2.8);
        group.rotation.x = Math.sin(elapsed * 0.8 + group.userData.bobOffset) * 0.2;
        group.position.y = 0.25 + Math.sin(elapsed * 1.6 + group.userData.bobOffset) * (0.12 + energy * 0.12);
        (group.userData.orbiters || []).forEach((orb, idx) => {
          const data = orb.userData;
          const angle = elapsed * (data.speed + energy) + idx * Math.PI * 0.75;
          orb.position.set(
            Math.cos(angle) * data.radius,
            data.height + Math.sin(angle * 1.8) * 0.12,
            Math.sin(angle) * data.radius,
          );
        });
      }

      function animateParticles(delta) {
        if (!particles) {
          return;
        }
        const positions = particles.geometry.getAttribute("position");
        for (let i = 0; i < particleSpeeds.length; i++) {
          positions.array[i * 3 + 1] += particleSpeeds[i] * delta;
          if (positions.array[i * 3 + 1] > 7) {
            positions.array[i * 3] = (Math.random() - 0.5) * 16;
            positions.array[i * 3 + 1] = Math.random() * 2;
            positions.array[i * 3 + 2] = (Math.random() - 0.5) * 16;
          }
        }
        positions.needsUpdate = true;
      }

      function triggerPulse(intensity) {
        if (!pulseRing) {
          return;
        }
        pulseRing.userData.life = 1;
        pulseRing.userData.strength = THREE.MathUtils.clamp(intensity, 0.2, 1.1);
        pulseRing.scale.setScalar(1);
      }

      function energizeComponent(group, energy) {
        if (!group) {
          return;
        }
        group.userData.energy = energy;
        const core = group.userData.core;
        if (core && core.material) {
          core.material.emissiveIntensity = 0.3 + energy * 1.2;
        }
        group.scale.setScalar(group.userData.baseScale * (0.9 + energy * 0.45));
        if (group.userData.halo) {
          group.userData.halo.material.opacity = 0.22 + energy * 0.5;
          group.userData.halo.scale.setScalar(1 + energy * 0.8);
        }
      }

      function computeVisualEnergy(component, metrics) {
        if (!component) {
          return 0.24;
        }
        const fallback = Math.abs(extractNominalValue(component)) || 0.1;
        if (!metrics) {
          return THREE.MathUtils.clamp(Math.log10(fallback + 1.5) / 2.5, 0.18, 1);
        }
        const values = [
          metrics.powerDissipation,
          metrics.currentRms,
          metrics.impedance,
          metrics.storedEnergy,
          metrics.energyDelivered,
          metrics.thermalRise,
        ];
        let magnitude = Math.abs(fallback);
        values.forEach((value) => {
          if (Number.isFinite(value)) {
            magnitude = Math.max(magnitude, Math.abs(value));
          }
        });
        const normalized = Math.log10(magnitude + 1.5) / 2.5;
        return THREE.MathUtils.clamp(normalized, 0.18, 1);
      }

      function extractNominalValue(component) {
        if (!component) {
          return 1;
        }
        const props = component.properties || {};
        const candidates = [
          props.resistance,
          props.capacitance,
          props.inductance,
          props.forwardVoltage,
          props.voltage,
          props.internalResistance,
          props.onResistance,
          props.seriesResistance,
          props.capacityMah,
        ];
        for (const value of candidates) {
          if (typeof value === "number" && Number.isFinite(value) && value !== 0) {
            return Math.abs(value);
          }
        }
        return 1;
      }

      function normalizeComponent(raw, sourceLabel) {
        if (!raw || typeof raw !== "object") {
          return null;
        }
        const type = typeof raw.type === "string" ? raw.type.toLowerCase() : "generic";
        const properties = Object.assign({}, COMPONENT_PROFILES[type]?.defaultProperties || {}, raw.properties || {});
        const metadata = Object.assign({}, raw.metadata || {});
        const id = typeof raw.id === "string" && raw.id.length > 0 ? raw.id : `${type}-${Math.random().toString(36).slice(2, 9)}`;
        const name = raw.name || metadata.displayName || raw.identifier || id;
        return {
          id,
          name,
          type,
          properties,
          metadata,
          source: sourceLabel || metadata.source || "library",
        };
      }

      function initializeCatalog() {
        state.components = DEFAULT_COMPONENT_CATALOG.map((entry) => normalizeComponent(entry, "reference"))
          .filter(Boolean);
        state.selectedA = state.components[0] || null;
        state.selectedB = state.components.length > 1 ? state.components[1] : state.components[0] || null;
        renderImportSummary(buildSummaryFromComponents(state.components));
      }

      function registerEvents() {
        const resetBtn = document.getElementById("btn-reset");
        if (resetBtn) {
          resetBtn.addEventListener("click", resetArena);
        }

        const runBtn = document.getElementById("btn-run");
        if (runBtn) {
          runBtn.addEventListener("click", runTest);
        }

        const exportBtn = document.getElementById("btn-export");
        if (exportBtn) {
          exportBtn.addEventListener("click", exportResults);
        }

        const importBuilderBtn = document.getElementById("btn-import-builder");
        if (importBuilderBtn) {
          importBuilderBtn.addEventListener("click", () => {
            const loaded = loadLatestBuilderExport();
            if (!loaded) {
              setStatus("No builder export found. Sync from the builder to populate real components.");
            }
          });
        }

        const jsonInput = document.getElementById("input-import-json");
        if (jsonInput) {
          jsonInput.addEventListener("change", handleFileImport, false);
        }

        const modeSelect = document.getElementById("mode");
        if (modeSelect) {
          modeSelect.value = state.mode;
          modeSelect.addEventListener("change", (event) => {
            state.mode = event.target.value === "compare" ? "compare" : "single";
            updateCompareVisibility();
          });
        }

        const selectA = document.getElementById("component-a");
        if (selectA) {
          selectA.addEventListener("change", (event) => {
            state.selectedA = state.components.find((component) => component.id === event.target.value) || null;
            updateMeshesForSelection();
          });
        }

        const selectB = document.getElementById("component-b");
        if (selectB) {
          selectB.addEventListener("change", (event) => {
            state.selectedB = state.components.find((component) => component.id === event.target.value) || null;
            updateMeshesForSelection();
          });
        }

        [
          "input-voltage",
          "input-frequency",
          "input-temperature",
          "input-humidity",
          "input-duty",
          "input-duration",
          "input-load",
        ].forEach((id) => {
          const input = document.getElementById(id);
          if (input) {
            input.addEventListener("change", readTestVariables);
            input.addEventListener("blur", readTestVariables);
          }
        });

        const reloadBtn = document.getElementById("reload-import");
        if (reloadBtn) {
          reloadBtn.addEventListener("click", () => {
            const payload = loadArenaPayloadFromStorage({ announce: true });
            if (!payload) {
              setStatus("No builder snapshot found. Sync from the builder to populate real components.");
            }
          });
        }

        document.querySelectorAll("[data-command]").forEach((button) => {
          button.addEventListener("click", () => {
            const command = button.getAttribute("data-command");
            if (command) {
              handleCommand(command);
            }
          });
        });
      }

      function populateComponentSelectors() {
        const selectA = document.getElementById("component-a");
        const selectB = document.getElementById("component-b");
        if (!selectA || !selectB) {
          return;
        }

        const options = state.components.map((component) => ({
          value: component.id,
          label: `${component.name} (${component.type})`,
        }));

        const populateSelect = (select, selectedId, placeholder) => {
          select.innerHTML = "";
          const placeholderOption = document.createElement("option");
          placeholderOption.value = "";
          placeholderOption.textContent = placeholder;
          select.appendChild(placeholderOption);
          options.forEach((option) => {
            const opt = document.createElement("option");
            opt.value = option.value;
            opt.textContent = option.label;
            select.appendChild(opt);
          });

          if (selectedId && options.some((option) => option.value === selectedId)) {
            select.value = selectedId;
          } else if (options.length > 0) {
            select.value = options[0].value;
          } else {
            select.value = "";
          }
        };

        populateSelect(selectA, state.selectedA?.id || "", "Select component A");
        populateSelect(selectB, state.selectedB?.id || "", "Select component B");

        state.selectedA = state.components.find((component) => component.id === selectA.value) || null;
        state.selectedB = state.components.find((component) => component.id === selectB.value) || null;
        const modeSelect = document.getElementById("mode");
        const hasOpponents = state.components.length > 1 && Boolean(state.selectedA) && Boolean(state.selectedB);
        state.mode = hasOpponents ? "compare" : "single";
        if (modeSelect) {
          modeSelect.value = state.mode;
        }
        updateMeshesForSelection();
      }

      function updateCompareVisibility() {
        const compare = state.mode === "compare";
        document.querySelectorAll(".compare-only").forEach((element) => {
          element.style.display = compare ? "" : "none";
        });
        if (componentGroupB) {
          componentGroupB.visible = compare && Boolean(state.selectedB);
        }
      }

      function updateMeshesForSelection() {
        const groupA = ensureComponentGroup("A", state.selectedA);
        if (groupA) {
          energizeComponent(groupA, 0.24);
        }
        const groupB = ensureComponentGroup("B", state.selectedB);
        if (groupB) {
          energizeComponent(groupB, 0.24);
        }
        updateCompareVisibility();
      }

      function readTestVariables() {
        const readNumber = (id, fallback) => {
          const input = document.getElementById(id);
          if (!input) {
            return fallback;
          }
          const value = Number.parseFloat(input.value);
          if (Number.isFinite(value)) {
            return value;
          }
          return fallback;
        };

        state.testVariables = {
          voltage: readNumber("input-voltage", state.testVariables.voltage),
          frequencyHz: readNumber("input-frequency", state.testVariables.frequencyHz),
          temperatureC: readNumber("input-temperature", state.testVariables.temperatureC),
          ambientHumidityPercent: readNumber("input-humidity", state.testVariables.ambientHumidityPercent),
          dutyCyclePercent: readNumber("input-duty", state.testVariables.dutyCyclePercent),
          durationSeconds: readNumber("input-duration", state.testVariables.durationSeconds),
          loadImpedanceOhms: readNumber("input-load", state.testVariables.loadImpedanceOhms),
        };

        return state.testVariables;
      }

      function setImportStatus(message) {
        const element = document.getElementById("import-status");
        if (!element) {
          return;
        }
        element.textContent = message;
      }

      function buildSummaryFromComponents(components) {
        if (!Array.isArray(components) || !components.length) {
          return null;
        }
        const byType = components.reduce((acc, component) => {
          const key = component.type || "unknown";
          acc[key] = (acc[key] || 0) + 1;
          return acc;
        }, {});
        return {
          totalComponents: components.length,
          totalWires: 0,
          totalJunctions: 0,
          byType,
        };
      }

      function renderImportSummary(summary) {
        if (importTagsElement) {
          importTagsElement.innerHTML = "";
        }
        if (componentSummaryElement) {
          componentSummaryElement.innerHTML = "";
        }

        const resolved = summary || buildSummaryFromComponents(state.components);
        if (!resolved) {
          return;
        }

        const chips = [
          ["Components", resolved.totalComponents ?? resolved.componentCount],
          ["Wires", resolved.totalWires ?? resolved.wireCount],
          ["Junctions", resolved.totalJunctions ?? resolved.junctionCount],
        ];

        if (importTagsElement) {
          chips.forEach(([label, value]) => {
            if (typeof value === "number" && Number.isFinite(value)) {
              const tag = document.createElement("span");
              tag.className = "import-tag";
              tag.textContent = `${label}: ${value}`;
              importTagsElement.appendChild(tag);
            }
          });
        }

        const byType = resolved.byType || resolved.componentsByType;
        if (componentSummaryElement && byType && typeof byType === "object") {
          Object.entries(byType)
            .filter((entry) => typeof entry[1] === "number" && Number.isFinite(entry[1]))
            .sort((a, b) => (b[1] ?? 0) - (a[1] ?? 0))
            .forEach(([type, count]) => {
              const li = document.createElement("li");
              const label = document.createElement("span");
              label.textContent = String(type);
              const value = document.createElement("span");
              value.textContent = String(count);
              li.appendChild(label);
              li.appendChild(value);
              componentSummaryElement.appendChild(li);
            });
        }
      }

      function updateImportStatus() {
        if (state.importManifest) {
          const manifest = state.importManifest;
          const exportedTime = manifest.exportedAt ? new Date(manifest.exportedAt) : null;
          const exportedLabel = exportedTime && !Number.isNaN(exportedTime.getTime())
            ? exportedTime.toLocaleString()
            : "unknown time";
          setImportStatus(
            `${manifest.label} - ${manifest.componentCount} component${manifest.componentCount === 1 ? "" : "s"} - ${manifest.sourceName || "unknown source"} - ${exportedLabel}`
          );
          renderImportSummary(manifest.summary || null);
        } else {
          setImportStatus("Using reference component library. Load a builder export to sync live components.");
          renderImportSummary(null);
        }
      }

      function readPersistedSession(sessionId) {
        if (!sessionId) {
          return null;
        }
        const key = `${STORAGE_KEYS.prefix}${sessionId}`;
        const stores = [window.localStorage, window.sessionStorage];
        for (const store of stores) {
          try {
            if (!store) {
              continue;
            }
            const raw = store.getItem(key);
            if (raw) {
              return JSON.parse(raw);
            }
          } catch (error) {
            console.warn("Arena storage read failed", error);
          }
        }
        return null;
      }

      function loadLatestBuilderExport() {
        let sessionId = null;
        try {
          sessionId = window.localStorage?.getItem(STORAGE_KEYS.last) || window.sessionStorage?.getItem(STORAGE_KEYS.last) || null;
        } catch (error) {
          console.warn("Unable to access storage for builder export", error);
        }

        if (!sessionId) {
          return false;
        }

        const envelope = readPersistedSession(sessionId);
        if (!envelope) {
          return false;
        }

        return applyImportEnvelope(envelope, {
          sessionId,
          label: envelope.payload?.sessionName || "Builder Export",
          source: "builder",
        });
      }

      function loadArenaPayloadFromStorage({ announce = false } = {}) {
        if (typeof window === "undefined" || typeof window.localStorage === "undefined") {
          return null;
        }
        let payload = null;
        try {
          payload = parseArenaPayload(window.localStorage.getItem(ARENA_STORAGE_KEY));
        } catch (error) {
          console.warn("Arena: unable to read quick import payload", error);
          payload = null;
        }

        if (!payload) {
          return null;
        }

        const applied = applyArenaPayload(payload, { source: payload.source || "builder", label: payload.label || "Builder Snapshot" });
        if (applied && announce) {
          setStatus("Reloaded builder snapshot.");
        } else if (!applied && announce) {
          setStatus("Unable to load builder snapshot.");
        }
        return applied ? payload : null;
      }

      function loadSessionFromUrl() {
        const url = new URL(window.location.href);
        const sessionId = url.searchParams.get("session");
        if (!sessionId) {
          return false;
        }
        const envelope = readPersistedSession(sessionId);
        if (!envelope) {
          setStatus("Unable to load requested session. Using current library instead.");
          return false;
        }
        return applyImportEnvelope(envelope, { sessionId, label: envelope.payload?.sessionName || "Builder Export", source: "builder" });
      }

      function parseArenaPayload(value) {
        if (!value) {
          return null;
        }
        try {
          const payload = JSON.parse(value);
          if (payload && typeof payload === "object") {
            return payload;
          }
        } catch (error) {
          console.warn("Arena: failed to parse import payload", error);
        }
        return null;
      }

      function applyImportEnvelope(envelope, options) {
        if (!envelope) {
          return false;
        }
        const payload = envelope.payload || envelope;
        const componentsRaw = Array.isArray(payload.components) ? payload.components : [];
        const normalized = componentsRaw
          .map((item) => normalizeComponent(item, payload.source?.name || options?.source || "import"))
          .filter(Boolean);

        if (!normalized.length) {
          setStatus("Import did not include any components. Retaining current library.");
          return false;
        }

        state.components = normalized;
        state.selectedA = normalized[0] || null;
        state.selectedB = normalized.length > 1 ? normalized[1] : normalized[0] || null;

        state.importManifest = {
          sessionId: envelope.sessionId || options?.sessionId || null,
          label: payload.sessionName || options?.label || "Imported Components",
          exportedAt: envelope.exportedAt || payload.exportedAt || new Date().toISOString(),
          sourceName: (payload.source && (payload.source.name || payload.source.type)) || options?.source || "import",
          componentCount: normalized.length,
          wireCount: Array.isArray(payload.wires) ? payload.wires.length : 0,
          metrics: payload.analysis || payload.metrics || null,
          summary: payload.summary || null,
        };

        populateComponentSelectors();
        updateCompareVisibility();
        updateImportStatus();
        setStatus("Loaded component set from import.");
        return true;
      }

      function applyArenaPayload(payload, options = {}) {
        if (!payload || typeof payload !== "object") {
          return false;
        }

        const fromPayload = (candidate, fallback) => {
          if (Array.isArray(candidate)) {
            return candidate;
          }
          if (fallback && Array.isArray(fallback)) {
            return fallback;
          }
          return [];
        };

        const components = fromPayload(payload.components, payload.state?.components);
        const wires = fromPayload(payload.wires, payload.state?.wires);
        const junctions = fromPayload(payload.junctions, payload.state?.junctions);

        const envelope = {
          sessionId: options.sessionId || payload.sessionId || null,
          exportedAt: payload.generatedAt ? new Date(payload.generatedAt).toISOString() : payload.exportedAt || null,
          payload: {
            components,
            wires,
            junctions,
            analysis: payload.metrics || payload.analysis || null,
            metrics: payload.metrics || null,
            summary: payload.summary || null,
            sessionName: payload.label || payload.sessionName || options.label || "Builder Snapshot",
            source: typeof payload.source === "object" && payload.source !== null
              ? payload.source
              : { name: String(payload.source || options.source || "builder") },
            testVariables: payload.testVariables || null,
            state: payload.state || { components },
          },
        };

        const applied = applyImportEnvelope(envelope, options);
        if (applied && payload.metrics && state.importManifest) {
          state.importManifest.metrics = payload.metrics;
        }
        if (applied && payload.summary && state.importManifest) {
          state.importManifest.summary = payload.summary;
        }
        if (applied && payload.generatedAt && state.importManifest) {
          state.importManifest.exportedAt = new Date(payload.generatedAt).toISOString();
        }
        return applied;
      }

      function handleFileImport(event) {
        const input = event.target;
        const file = input.files?.[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            const applied = applyImportEnvelope(data, {
              sessionId: data.sessionId || null,
              label: data.sessionName || "Uploaded Dataset",
              source: "upload",
            });
            if (applied) {
              setStatus("Imported components from JSON file.");
            } else {
              setStatus("Unable to import data from JSON file. Check format.");
            }
          } catch (error) {
            console.error("JSON import error", error);
            setStatus("Invalid JSON file. Unable to import components.");
          }
        };

        reader.readAsText(file);
        input.value = "";
      }

      function runTest() {
        if (!state.components.length) {
          setStatus("No components available. Import a component library first.");
          return;
        }

        readTestVariables();

        if (!state.selectedA) {
          state.selectedA = state.components[0];
        }

        const componentA = state.selectedA;
        const metricsA = computeComponentMetrics(componentA, state.testVariables);
        let componentB = null;
        let metricsB = null;

        if (state.mode === "compare") {
          componentB = state.selectedB || state.components[1] || componentA;
          state.selectedB = componentB;
          metricsB = componentB ? computeComponentMetrics(componentB, state.testVariables) : null;
        }

        renderMetricGrid("metrics-a", metricsA, { accent: "A" });
        renderMetricGrid("metrics-b", metricsB, { accent: "B" });

        const deltaMetrics = metricsB ? computeDeltaMetrics(metricsA, metricsB) : null;
        renderMetricGrid("metrics-delta", deltaMetrics, { accent: "delta", isDelta: true });

        updateMeshesForMetrics(metricsA, metricsB);

        state.lastRun = {
          timestamp: new Date().toISOString(),
          mode: state.mode,
          components: {
            A: summarizeComponent(componentA),
            B: metricsB ? summarizeComponent(componentB) : null,
          },
          testVariables: Object.assign({}, state.testVariables),
          metrics: {
            A: metricsA,
            B: metricsB,
            delta: deltaMetrics,
          },
          importManifest: state.importManifest,
        };

        const summaryParts = [`A: ${formatWithUnit(metricsA.currentRms, "A")} - ${formatWithUnit(metricsA.powerDissipation, "W")}`];
        if (metricsB) {
          summaryParts.push(`B: ${formatWithUnit(metricsB.currentRms, "A")} - ${formatWithUnit(metricsB.powerDissipation, "W")}`);
        }
        setStatus(`Test complete. ${summaryParts.join(" | ")}`);
      }

      function summarizeComponent(component) {
        if (!component) {
          return null;
        }
        return {
          id: component.id,
          name: component.name,
          type: component.type,
          properties: component.properties,
          metadata: component.metadata,
          source: component.source,
        };
      }

      function computeComponentMetrics(component, variables) {
        const profile = COMPONENT_PROFILES[component.type] || { defaultProperties: {} };
        const props = Object.assign({}, profile.defaultProperties || {}, component.properties || {});

        const voltage = Number.isFinite(variables.voltage) ? variables.voltage : 0;
        const frequency = Math.max(Number.isFinite(variables.frequencyHz) ? variables.frequencyHz : 0, 0);
        const omega = 2 * Math.PI * frequency;
        const temperatureOffset = (variables.temperatureC ?? 25) - 25;

        let resistance = props.resistance;
        if (typeof props.tempCoeff === "number" && Number.isFinite(resistance)) {
          resistance = resistance * (1 + props.tempCoeff * temperatureOffset);
        }

        if (typeof props.seriesResistance === "number" && Number.isFinite(props.seriesResistance)) {
          resistance = Number.isFinite(resistance)
            ? resistance + props.seriesResistance
            : props.seriesResistance;
        }

        if (component.type === "switch") {
          const onResistance = props.onResistance ?? resistance ?? 0.05;
          const offResistance = props.offResistance ?? 1000000;
          resistance = props.isOn === false ? offResistance : onResistance;
        }

        if (component.type === "battery") {
          resistance = Math.max(variables.loadImpedanceOhms || resistance || props.internalResistance || 1, 0.0001);
        }

        let reactanceC = 0;
        if (typeof props.capacitance === "number" && props.capacitance > 0 && omega > 0) {
          reactanceC = -1 / (omega * props.capacitance);
        }

        let reactanceL = 0;
        if (typeof props.inductance === "number" && props.inductance > 0 && omega > 0) {
          reactanceL = omega * props.inductance;
        }

        const netReactance = reactanceL + reactanceC;

        let effectiveResistance = Number.isFinite(resistance) ? resistance : 0;
        if (!Number.isFinite(effectiveResistance) || effectiveResistance < 0.0001) {
          effectiveResistance = 0.0001;
        }

        let impedance = Math.sqrt(Math.pow(effectiveResistance, 2) + Math.pow(netReactance, 2));
        if (!Number.isFinite(impedance) || impedance < 0.0001) {
          impedance = effectiveResistance;
        }

        let current = impedance > 0 ? voltage / impedance : 0;
        let voltageAcross = voltage;

        if (component.type === "led") {
          const forward = props.forwardVoltage ?? 2;
          const seriesR = Math.max(props.seriesResistance ?? effectiveResistance ?? 100, 0.1);
          voltageAcross = Math.max(voltage - forward, 0);
          current = voltageAcross / seriesR;
          impedance = seriesR;
          effectiveResistance = seriesR;
        }

        if (component.type === "battery") {
          const internalR = Math.max(props.internalResistance ?? 0.2, 0.0001);
          const loadR = Math.max(variables.loadImpedanceOhms || 0, 0.0001);
          const totalR = internalR + loadR;
          current = voltage / totalR;
          impedance = totalR;
          effectiveResistance = loadR;
        }

        const dutyCycle = Math.max(Math.min(variables.dutyCyclePercent ?? 100, 100), 0) / 100;
        const rmsCurrent = current * Math.sqrt(dutyCycle || 1);
        const power = voltageAcross * current * dutyCycle;
        const energyDelivered = power * (variables.durationSeconds ?? 0);
        const storedEnergyCap = typeof props.capacitance === "number" ? 0.5 * props.capacitance * voltage * voltage : 0;
        const storedEnergyInd = typeof props.inductance === "number" ? 0.5 * props.inductance * current * current : 0;
        const storedEnergy = storedEnergyCap + storedEnergyInd;
        const phaseAngle = Math.atan2(netReactance, effectiveResistance);
        const thermalResistance = props.thermalResistance ?? profile.defaultProperties?.thermalResistance ?? 60;
        const thermalRise = thermalResistance ? (power * thermalResistance) / 1000 : 0;

        let efficiency = props.efficiency;
        if (!Number.isFinite(efficiency)) {
          if (component.type === "battery" && impedance > 0) {
            efficiency = effectiveResistance / impedance;
          } else if (component.type === "led") {
            efficiency = props.efficiency ?? 0.35;
          } else if (component.type === "resistor") {
            efficiency = 0;
          } else {
            efficiency = null;
          }
        }

        return {
          componentId: component.id,
          name: component.name,
          type: component.type,
          operatingVoltage: voltage,
          currentRms: rmsCurrent,
          currentPeak: current * Math.sqrt(2),
          powerDissipation: power,
          impedance,
          reactance: netReactance,
          resistance: effectiveResistance,
          phaseAngleDegrees: phaseAngle * (180 / Math.PI),
          storedEnergy,
          energyDelivered,
          thermalRise,
          efficiency,
          ambientTemperature: variables.temperatureC,
          humidity: variables.ambientHumidityPercent,
          dutyCyclePercent: variables.dutyCyclePercent,
        };
      }

      function computeDeltaMetrics(metricsA, metricsB) {
        if (!metricsA || !metricsB) {
          return null;
        }
        const percentDifference = (a, b) => {
          if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) {
            return null;
          }

          const id = typeof component.id === 'string' ? component.id : String(component.id ?? '');
          const type = typeof component.type === 'string' && ALLOWED_TYPES.includes(component.type) ? component.type : undefined;

          if (!id || !type) {
            return null;
          }

          const manufacturer = typeof component.manufacturer === 'string' ? component.manufacturer : 'Manufacturer';
          const name = typeof component.name === 'string' ? component.name : 'Component';
          const family = typeof component.family === 'string' ? component.family : '';
          const highlight = typeof component.highlight === 'string' ? component.highlight : '';
          const rating = typeof component.rating === 'number' ? component.rating : null;

          const metrics = Array.isArray(component.metrics)
            ? component.metrics.slice(0, 3).map((metric) => {
                if (!metric || typeof metric !== 'object') {
                  return null;
                }
                const label = typeof metric.label === 'string' ? metric.label : 'Metric';
                const value = typeof metric.value === 'string' ? metric.value : String(metric.value ?? '');
                const unit = typeof metric.unit === 'string' ? metric.unit : undefined;
                return { label, value, unit };
              }).filter(Boolean)
            : [];

          return { id, type, manufacturer, name, family, highlight, rating, metrics };
        })
        .filter(Boolean);
    }

    function lookupComponent(componentId, fallbackType) {
      if (!manufacturerRoster.length) {
        return undefined;
      }

      if (componentId) {
        const matchById = manufacturerRoster.find((component) => component.id === componentId);
        if (matchById) {
          return matchById;
        }
      }

      if (fallbackType) {
        return manufacturerRoster.find((component) => component.type === fallbackType);
      }

      return undefined;
    }

    function formatDescriptor(component, fallbackType, fallbackManufacturer) {
      if (component) {
        return `${component.manufacturer} - ${component.name}`;
      }
      if (fallbackManufacturer && fallbackType) {
        return `${fallbackManufacturer} - ${fallbackType}`;
      }
      if (fallbackType) {
        return fallbackType;
      }
      return 'Component';
    }

    function reportStatus(message) {
      if (typeof window !== 'undefined' && window.parent && typeof window.parent.postMessage === 'function') {
        window.parent.postMessage({ type: 'arena:status', payload: { message } }, '*');
      }
    }

    function notifyReady() {
      if (typeof window !== 'undefined' && window.parent && typeof window.parent.postMessage === 'function') {
        window.parent.postMessage({ type: 'arena:ready' }, '*');

      reportStatus('Arena ready. Select a preset or tweak values to begin.');
    }

    function syncMeshVisibility(modeValue) {
      if (meshB) {

    }

    function applyConfig(config) {
      if (!config || typeof config !== 'object') {
        return;
      }

      const modeSelect = document.getElementById(MODE_ID);
      const compASelect = document.getElementById(COMP_TYPE_A_ID);
      const compBSelect = document.getElementById(COMP_TYPE_B_ID);
      const valueAInput = document.getElementById(VALUE_A_ID);
      const valueBInput = document.getElementById(VALUE_B_ID);
      const voltageInput = document.getElementById(VOLTAGE_ID);
      const frequencyInput = document.getElementById(FREQUENCY_ID);

      activeComponentIds.a = typeof config.componentIdA === 'string' ? config.componentIdA : null;
      activeComponentIds.b = typeof config.componentIdB === 'string' ? config.componentIdB : null;
      manufacturerNames.a = typeof config.manufacturerNameA === 'string' ? config.manufacturerNameA : null;
      manufacturerNames.b = typeof config.manufacturerNameB === 'string' ? config.manufacturerNameB : null;

      if (modeSelect && config.mode) {
        modeSelect.value = config.mode;
        modeSelect.dispatchEvent(new Event('change', { bubbles: true }));
      }

      if (compASelect && config.compA) {
        compASelect.value = config.compA;
      }

      if (compBSelect && config.compB) {
        compBSelect.value = config.compB;
      }

      if (valueAInput && typeof config.valueA === 'number' && !Number.isNaN(config.valueA)) {
        valueAInput.value = String(config.valueA);
      }

      if (valueBInput && typeof config.valueB === 'number' && !Number.isNaN(config.valueB)) {
        valueBInput.value = String(config.valueB);
      }

      if (voltageInput && typeof config.voltage === 'number' && !Number.isNaN(config.voltage)) {
        voltageInput.value = String(config.voltage);
      }

      if (frequencyInput && typeof config.frequency === 'number' && !Number.isNaN(config.frequency)) {
        frequencyInput.value = String(config.frequency);
      }

      const currentMode = (modeSelect && modeSelect.value) || 'single';
      syncMeshVisibility(currentMode);

      const stat = document.getElementById(STAT_ID);
      const descriptorA = lookupComponent(activeComponentIds.a, compASelect ? compASelect.value : config.compA);
      const descriptorB = currentMode === 'compare'
        ? lookupComponent(activeComponentIds.b, compBSelect ? compBSelect.value : config.compB)
        : undefined;
      const descriptorLabelA = formatDescriptor(descriptorA, config.compA, manufacturerNames.a);
      const descriptorLabelB = currentMode === 'compare'
        ? formatDescriptor(descriptorB, config.compB, manufacturerNames.b)
        : null;

      if (stat) {
        if (currentMode === 'compare' && descriptorLabelB) {
          stat.textContent = `Preset staged: ${descriptorLabelA} vs ${descriptorLabelB}`;
        } else {
          stat.textContent = `Preset staged: ${descriptorLabelA}`;
        }
      }
      if (currentMode === 'compare' && descriptorLabelB) {
        reportStatus(`Preset staged inside the arena: ${descriptorLabelA} vs ${descriptorLabelB}.`);
      } else {
        reportStatus(`Preset staged inside the arena: ${descriptorLabelA}.`);
      }
    }

    function init() {

      scene.background = new THREE.Color(0x0a0a1a);

      camera.position.set(0, 2, 6);
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

          <!-- Import collapsible -->
