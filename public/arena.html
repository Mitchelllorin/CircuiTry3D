<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="application-name" content="CircuiTry3D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>CircuiTry3D — Component Arena</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <style>
    .arena-header {
      position: fixed;
      top: calc(8px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .arena-brand {
      font-size: clamp(13px, 2vw, 17px);
      font-weight: 900;
      letter-spacing: -0.015em;
      display: inline-flex;
      gap: 2px;
      filter: drop-shadow(0 0 8px rgba(40,255,190,0.35));
      pointer-events: auto;
    }

    .arena-brand span {
      display: inline-block;
    }

    .arena-brand-green {
      color: #39ffb7;
      text-shadow: 0 0 8px rgba(57,255,183,0.6), 0 0 14px rgba(5,214,172,0.4);
    }

    .arena-brand-orange {
      color: #ff8b2b;
      text-shadow: 0 0 6px rgba(255,167,65,0.55), 0 0 12px rgba(255,120,28,0.4);
    }

    .arena-nav {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      justify-content: center;
      pointer-events: auto;
    }

    .arena-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(57,255,183,0.28);
      background: rgba(8,26,36,0.55);
      color: #dbeafe;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.6rem;
      font-weight: 700;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 12px rgba(1, 19, 30, 0.4);
      cursor: pointer;
    }

    .arena-nav-btn:hover {
      border-color: rgba(57,255,183,0.65);
      background: rgba(14,48,60,0.68);
      color: #f8fafc;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --panel-bg: rgba(0, 0, 0, 0.68);
      --panel-border: rgba(136, 204, 255, 0.28);
      --panel-border-strong: rgba(0, 255, 136, 0.45);
      --metric-bg: rgba(12, 22, 42, 0.8);
      --metric-border: rgba(136, 204, 255, 0.22);
      --metric-accent-a: rgba(0, 255, 136, 0.45);
      --metric-accent-b: rgba(136, 204, 255, 0.45);
      --metric-accent-delta: rgba(255, 160, 0, 0.5);
      --text-muted: #94a3b8;
      --text-strong: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: radial-gradient(ellipse at top, #1e1b4b 0%, #020617 55%, #010413 100%);
      color: var(--text-strong);
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      box-sizing: border-box;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% -10%, rgba(14, 165, 233, 0.28), transparent 55%),
        radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.25), transparent 52%),
        radial-gradient(circle at 20% 80%, rgba(244, 63, 94, 0.2), transparent 60%);
      z-index: 0;
      pointer-events: none;
      opacity: 0.9;
    }

    #arena {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    .hud {
      position: fixed;
      top: calc(100px + var(--safe-top));
      left: calc(16px + var(--safe-left));
      right: calc(16px + var(--safe-right));
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      z-index: 3;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid rgba(94, 234, 212, 0.45);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      letter-spacing: 0.01em;
      font-size: 14px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 rgba(34, 211, 238, 0);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(34, 211, 238, 0.25);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .file-btn {
      position: relative;
      overflow: hidden;
    }

    .file-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .panel {
      position: fixed;
      top: calc(164px + var(--safe-top));
      left: calc(16px + var(--safe-left));
      width: 340px;
      max-width: calc(100vw - 32px - var(--safe-left) - var(--safe-right));
      max-height: calc(100vh - 194px - var(--safe-top) - var(--safe-bottom));
      background: rgba(10, 12, 28, 0.82);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(96, 165, 250, 0.35);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      z-index: 4;
      box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.45);
    }

    .panel-scroll {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 4px;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      background: rgba(136, 204, 255, 0.3);
      border-radius: 999px;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.82);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row label {
      width: 130px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .row input,
    .row select {
      flex: 1;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(51, 65, 85, 0.9);
      background: rgba(8, 15, 28, 0.92);
      color: var(--text-strong);
      font-size: 13px;
    }

    .import-status {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.85);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(136, 204, 255, 0.18);
      background: rgba(12, 22, 42, 0.65);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .panel-header .section-heading {
      margin: 0;
    }

    .panel-subtext {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(148, 163, 184, 0.85);
    }

    .chip-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(136, 204, 255, 0.35);
      background: rgba(12, 22, 42, 0.4);
      color: var(--text-strong);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .chip-btn:hover {
      background: rgba(24, 32, 48, 0.6);
      border-color: rgba(136, 204, 255, 0.5);
    }

    .import-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .import-tag {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(12, 22, 42, 0.65);
      border: 1px solid rgba(136, 204, 255, 0.18);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.85);
    }

    .summary-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .summary-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(148, 163, 184, 0.85);
      border-bottom: 1px solid rgba(136, 204, 255, 0.12);
      padding-bottom: 4px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .metric-card {
      background: var(--metric-bg);
      border: 1px solid var(--metric-border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .metric-card.metric-accent-a {
      border-color: var(--metric-accent-a);
    }

    .metric-card.metric-accent-b {
      border-color: var(--metric-accent-b);
    }

    .metric-card.metric-accent-delta {
      border-color: var(--metric-accent-delta);
    }

    .metric-label {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.85);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .metric-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-strong);
    }

    .metric-detail {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.85);
    }

    .metric-empty {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.7);
      padding: 8px 6px;
    }

    .stat {
      font-size: 12px;
      color: rgba(129, 140, 248, 0.95);
      background: rgba(30, 64, 175, 0.25);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.25);
      letter-spacing: 0.02em;
      min-height: 44px;
    }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        cursor: grab;
      }

    .compare-only {
      display: none;
    }

    .failure-analysis {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .failure-ok {
      font-size: 12px;
      color: rgba(52, 211, 153, 0.9);
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(52, 211, 153, 0.25);
      background: rgba(6, 78, 59, 0.25);
    }

    .failure-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .failure-stressed {
      background: rgba(250, 204, 21, 0.2);
      border: 1px solid rgba(250, 204, 21, 0.5);
      color: #fde68a;
    }

    .failure-warning {
      background: rgba(251, 146, 60, 0.2);
      border: 1px solid rgba(251, 146, 60, 0.5);
      color: #fed7aa;
    }

    .failure-critical {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
    }

    .failure-failed {
      background: rgba(220, 38, 38, 0.35);
      border: 1px solid rgba(220, 38, 38, 0.7);
      color: #fef2f2;
      box-shadow: 0 0 8px rgba(220, 38, 38, 0.4);
    }

    .failure-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-strong);
      margin-bottom: 2px;
    }

    .failure-desc {
      font-size: 11px;
      line-height: 1.55;
      color: rgba(148, 163, 184, 0.9);
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(8, 15, 28, 0.55);
      border: 1px solid rgba(136, 204, 255, 0.12);
    }

    @media (pointer: coarse) {
      .btn {
        min-height: 52px;
        padding: 14px 22px;
        font-size: 16px;
      }

      .row label {
        font-size: 13px;
      }

      .row input,
      .row select {
        min-height: 46px;
      }

      .panel {
        width: calc(100vw - 32px - var(--safe-left) - var(--safe-right));
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <header class="arena-header">
    <div class="arena-brand" aria-label="CircuiTry3D">
      <span class="arena-brand-green">Circui</span>
      <span class="arena-brand-orange">Try</span>
      <span class="arena-brand-green">3D</span>
    </div>
    <nav class="arena-nav" aria-label="Main navigation">
      <a class="arena-nav-btn" href="/" target="_top">Home</a>
      <a class="arena-nav-btn" href="/app" target="_top">Builder</a>
      <a class="arena-nav-btn" href="/practice" target="_top">Practice</a>
      <a class="arena-nav-btn" href="/pricing" target="_top">Pricing</a>
      <a class="arena-nav-btn" href="/community" target="_top">Community</a>
      <a class="arena-nav-btn" href="/account" target="_top">Account</a>
    </nav>
  </header>
  <div class="hud">
    <button class="btn" id="btn-reset" data-command="reset">Reset</button>
    <button class="btn" id="btn-run" data-command="run-test">Run Test</button>
    <button class="btn" id="btn-export" data-command="export">Export Results</button>
    <button class="btn" id="btn-import-builder">Load Builder Export</button>
    <label class="btn file-btn">
      Import JSON
      <input type="file" id="input-import-json" accept="application/json" />
    </label>
  </div>
  <div class="panel">
    <div class="panel-scroll">
      <section class="panel-section">
        <div class="panel-header">
          <div class="section-heading">Import Sources</div>
          <button class="chip-btn" id="reload-import" type="button">Reload</button>
        </div>
        <div id="import-status" class="import-status panel-subtext"></div>
        <div class="import-tags" id="import-tags"></div>
        <div class="row">
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="single">Single Component</option>
            <option value="compare">Compare (A vs B)</option>
          </select>
        </div>
      </section>
      <section class="panel-section" id="component-summary-section">
        <div class="section-heading">Component Summary</div>
        <ul class="summary-list" id="component-summary"></ul>
      </section>
      <section class="panel-section">
        <div class="section-heading">Component Selection</div>
        <div class="row">
          <label for="component-a">Component A</label>
          <select id="component-a"></select>
        </div>
        <div class="row compare-only">
          <label for="component-b">Component B</label>
          <select id="component-b"></select>
        </div>
      </section>
      <section class="panel-section">
        <div class="section-heading">Test Variables</div>
        <div class="row">
          <label for="input-voltage">Voltage (V)</label>
          <input id="input-voltage" type="number" value="5" step="0.1" />
        </div>
        <div class="row">
          <label for="input-frequency">Frequency (Hz)</label>
          <input id="input-frequency" type="number" value="1000" step="1" />
        </div>
        <div class="row">
          <label for="input-temperature">Ambient Temp (C)</label>
          <input id="input-temperature" type="number" value="25" step="1" />
        </div>
        <div class="row">
          <label for="input-humidity">Humidity (%)</label>
          <input id="input-humidity" type="number" value="45" step="1" />
        </div>
        <div class="row">
          <label for="input-duty">Duty Cycle (%)</label>
          <input id="input-duty" type="number" value="100" step="1" />
        </div>
        <div class="row">
          <label for="input-duration">Duration (s)</label>
          <input id="input-duration" type="number" value="60" step="1" />
        </div>
        <div class="row">
          <label for="input-load">Load Impedance (Ohm)</label>
          <input id="input-load" type="number" value="100" step="1" />
        </div>
      </section>
      <section class="panel-section">
        <div class="section-heading">Metrics ? Component A</div>
        <div id="metrics-a" class="metric-grid"></div>
      </section>
      <section class="panel-section compare-only">
        <div class="section-heading">Metrics ? Component B</div>
        <div id="metrics-b" class="metric-grid"></div>
      </section>
      <section class="panel-section compare-only">
        <div class="section-heading">Relative Delta</div>
        <div id="metrics-delta" class="metric-grid"></div>
      </section>
      <section class="panel-section">
        <div class="section-heading">Failure Analysis — A</div>
        <div class="failure-analysis" id="failure-a"></div>
      </section>
      <section class="panel-section compare-only">
        <div class="section-heading">Failure Analysis — B</div>
        <div class="failure-analysis" id="failure-b"></div>
      </section>
      <section class="panel-section">
        <div class="section-heading">Status</div>
        <div class="stat" id="stat-out">Ready.</div>
      </section>
    </div>
    </div>
    <canvas id="arena"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
    <script>
      if (typeof window.THREE === "undefined") {
        document.write('<script src="vendor/three.min.js"><\\/script>');
      }
    </script>
    <script>
    (() => {
      "use strict";

      const state = {

        selectedA: null,

        testVariables: {

      /**
       * Resolves any imported component type string to a canonical physics family.
       * 1. Exact match against COMPONENT_PROFILES keys
       * 2. Exact match against COMPONENT_FAMILY_MAP keys
       * 3. Substring scan of COMPONENT_FAMILY_MAP keys
       * 4. Property-signature heuristic
       * 5. Falls back to "generic"
       *
       * @param {string} rawType - The raw type string from an imported component
       * @param {Object} [props]  - Optional component properties for heuristic fallback
       * @returns {string} Canonical family name guaranteed to exist in COMPONENT_PROFILES
       */
      function resolveComponentFamily(rawType, props) {
        if (!rawType || typeof rawType !== "string") {
          return "generic";
        }
        const t = rawType.toLowerCase().trim().replace(/[\s_]+/g, "-");

        // 1. Direct match against known profile keys
        if (COMPONENT_PROFILES[t]) {
          return t;
        }

        // 2. Exact match in COMPONENT_FAMILY_MAP (handles aliases and common abbrevs)
        if (COMPONENT_FAMILY_MAP[t]) {
          return COMPONENT_FAMILY_MAP[t];
        }

        // 3. Starts-with or contains scan — handles part numbers like "IRF840", "2N2222", "BC547"
        for (const [keyword, family] of Object.entries(COMPONENT_FAMILY_MAP)) {
          if (t.startsWith(keyword) || t.includes(keyword)) {
            return family;
          }
        }

        // 4. Property-signature heuristic for completely unknown types
        if (props && typeof props === "object") {
          if (typeof props.inductance === "number") return "inductor";
          if (typeof props.capacitance === "number") return "capacitor";
          if (typeof props.forwardVoltage === "number") return "diode";
          if (typeof props.rds_on === "number" || typeof props.vth === "number") return "mosfet";
          if (typeof props.hfe === "number" || typeof props.vce_max === "number") return "bjt";
          if (typeof props.coilVoltage === "number") return "relay";
          if (typeof props.ratedCurrentA === "number" && typeof props.meltingI2t === "number") return "fuse";
          if (typeof props.internalResistance === "number" || typeof props.capacityMah === "number") return "battery";
          if (typeof props.resistance === "number") return "resistor";
          if (typeof props.turnsRatio === "number") return "transformer";
        }

        return "generic";
      }

          positions[i * 3] = (Math.random() - 0.5) * 16;
          positions[i * 3 + 1] = Math.random() * 5.5 + 0.3;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 16;
          particleSpeeds.push(Math.random() * 0.7 + 0.25);

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({

        function initializeCameraState() {
          cameraState.target.copy(CAMERA_DEFAULT_TARGET);
          cameraState.initialTarget.copy(cameraState.target);
          cameraOffset.copy(CAMERA_DEFAULT_POSITION).sub(cameraState.target);
          cameraState.spherical.setFromVector3(cameraOffset);
          cameraState.spherical.radius = THREE.MathUtils.clamp(
            cameraState.spherical.radius,
            CAMERA_RADIUS_LIMITS.min,
            CAMERA_RADIUS_LIMITS.max
          );
          cameraState.spherical.phi = THREE.MathUtils.clamp(
            cameraState.spherical.phi,
            CAMERA_PHI_LIMITS.min,
            CAMERA_PHI_LIMITS.max
          );
          normalizeAzimuth();
          cameraState.initialSpherical.copy(cameraState.spherical);
          cameraState.needsUpdate = true;
          updateCamera(true);
        }

        function normalizeAzimuth() {
          cameraState.spherical.theta = THREE.MathUtils.euclideanModulo(
            cameraState.spherical.theta + Math.PI,
            TWO_PI
          ) - Math.PI;
        }

        function updateCamera(force = false) {
          if (!camera) {
            return;
          }
          if (!force && !cameraState.needsUpdate) {
            return;
          }

          cameraState.spherical.radius = THREE.MathUtils.clamp(
            cameraState.spherical.radius,
            CAMERA_RADIUS_LIMITS.min,
            CAMERA_RADIUS_LIMITS.max
          );
          cameraState.spherical.phi = THREE.MathUtils.clamp(
            cameraState.spherical.phi,
            CAMERA_PHI_LIMITS.min,
            CAMERA_PHI_LIMITS.max
          );

          cameraState.target.y = THREE.MathUtils.clamp(
            cameraState.target.y,
            CAMERA_DEFAULT_TARGET.y - CAMERA_PAN_LIMITS.y,
            CAMERA_DEFAULT_TARGET.y + CAMERA_PAN_LIMITS.y
          );
          cameraState.target.x = THREE.MathUtils.clamp(
            cameraState.target.x,
            -CAMERA_PAN_LIMITS.x,
            CAMERA_PAN_LIMITS.x
          );
          cameraState.target.z = THREE.MathUtils.clamp(
            cameraState.target.z,
            -CAMERA_PAN_LIMITS.z,
            CAMERA_PAN_LIMITS.z
          );

          const offset = cameraOffset.setFromSpherical(cameraState.spherical);
          camera.position.copy(cameraState.target).add(offset);
          camera.lookAt(cameraState.target);
          camera.updateMatrix();
          camera.updateMatrixWorld(true);
          cameraState.needsUpdate = false;
        }

          activePointers.clear();
          multiTouchState.active = false;
          multiTouchState.lastDistance = 0;
          multiTouchState.lastMidpoint.set(0, 0);
          updateCamera(true);
        }

        function applyPan(deltaX, deltaY) {
          if (!camera || !renderer) {
            return;
          }
          const element = renderer.domElement;
          if (!element) {
            return;
          }

          camera.updateMatrix();
          cameraOffset.copy(camera.position).sub(cameraState.target);
          let targetDistance = cameraOffset.length();
          targetDistance *= Math.tan((camera.fov / 2) * (Math.PI / 180));

          if (!Number.isFinite(targetDistance) || targetDistance <= 0) {
            targetDistance = 0.01;
          }

          if (element.clientHeight === 0) {
            return;
          }

          const moveX = (2 * deltaX * targetDistance) / element.clientHeight;
          const moveY = (2 * deltaY * targetDistance) / element.clientHeight;

          panOffset.set(0, 0, 0);

          panVector.setFromMatrixColumn(camera.matrix, 0);
          panVector.multiplyScalar(-moveX * cameraState.panSpeed);
          panOffset.add(panVector);

          panVector.setFromMatrixColumn(camera.matrix, 1);
          panVector.multiplyScalar(moveY * cameraState.panSpeed);
          panOffset.add(panVector);

          cameraState.target.add(panOffset);
          cameraState.target.y = THREE.MathUtils.clamp(
            cameraState.target.y,
            CAMERA_DEFAULT_TARGET.y - CAMERA_PAN_LIMITS.y,
            CAMERA_DEFAULT_TARGET.y + CAMERA_PAN_LIMITS.y
          );
          cameraState.target.x = THREE.MathUtils.clamp(
            cameraState.target.x,
            -CAMERA_PAN_LIMITS.x,
            CAMERA_PAN_LIMITS.x
          );
          cameraState.target.z = THREE.MathUtils.clamp(
            cameraState.target.z,
            -CAMERA_PAN_LIMITS.z,
            CAMERA_PAN_LIMITS.z
          );

          cameraState.needsUpdate = true;
        }

        function registerInteractionEvents(element) {
          element.addEventListener("pointerdown", handlePointerDown, { passive: false });
          element.addEventListener("pointermove", handlePointerMove, { passive: false });
          element.addEventListener("pointerup", handlePointerUp, { passive: false });
          element.addEventListener("pointercancel", handlePointerUp, { passive: false });
          element.addEventListener("pointerleave", handlePointerUp, { passive: false });
          element.addEventListener("wheel", handleWheel, { passive: false });
          element.addEventListener("contextmenu", (event) => {
            event.preventDefault();
          });
        }

        function getPrimaryPointers() {
          return Array.from(activePointers.values())
            .sort((a, b) => a.id - b.id)
            .slice(0, 2);
        }

        function handlePointerDown(event) {
          if (!renderer) {
            return;
          }
          if (event.pointerType === "touch") {
            event.preventDefault();
          }

          const pointer = {
            id: event.pointerId,
            current: new THREE.Vector2(event.clientX, event.clientY),
            last: new THREE.Vector2(event.clientX, event.clientY)
          };

          activePointers.set(event.pointerId, pointer);
          try {
            renderer.domElement.setPointerCapture(event.pointerId);
          } catch (error) {
            // Some platforms (e.g., iPadOS Safari) do not support pointer capture on touch pointers.
          }

          if (event.pointerType !== "touch") {
            renderer.domElement.style.cursor = "grabbing";
          }

          if (activePointers.size >= 2) {
            const [first, second] = getPrimaryPointers();
            multiTouchState.active = true;
            multiTouchState.lastDistance = first.current.distanceTo(second.current);
            scratchVec2C.copy(first.current).add(second.current).multiplyScalar(0.5);
            multiTouchState.lastMidpoint.copy(scratchVec2C);
          } else {
            multiTouchState.active = false;
            multiTouchState.lastDistance = 0;
          }
        }

        function handlePointerMove(event) {
          if (!activePointers.has(event.pointerId)) {
            return;
          }
          if (event.pointerType === "touch") {
            event.preventDefault();
          }

          const pointer = activePointers.get(event.pointerId);
          pointer.last.copy(pointer.current);
          pointer.current.set(event.clientX, event.clientY);

          if (activePointers.size === 1) {
            const deltaX = pointer.current.x - pointer.last.x;
            const deltaY = pointer.current.y - pointer.last.y;
            const buttons = event.buttons;
            const isTouch = event.pointerType === "touch";
            const isPen = event.pointerType === "pen";
            const leftButtonDown = (buttons & 1) !== 0;
            const rightButtonDown = (buttons & 2) !== 0;
            const middleButtonDown = (buttons & 4) !== 0;
            const modifierPan = event.shiftKey || event.altKey || event.metaKey;
            const panGesture = (!isTouch && !isPen && (rightButtonDown || middleButtonDown)) || modifierPan;
            const rotateGesture = !panGesture && (isTouch || isPen || leftButtonDown);

            if (panGesture) {
              if (deltaX !== 0 || deltaY !== 0) {
                applyPan(deltaX, deltaY);
              }
            } else if (rotateGesture) {
              if (deltaX !== 0) {
                cameraState.spherical.theta -= deltaX * cameraState.rotateSpeed;
                normalizeAzimuth();
                cameraState.needsUpdate = true;
              }
              if (deltaY !== 0) {
                const verticalSpeed = cameraState.rotateVerticalSpeed ?? cameraState.rotateSpeed;
                cameraState.spherical.phi -= deltaY * verticalSpeed;
                cameraState.spherical.phi = THREE.MathUtils.clamp(
                  cameraState.spherical.phi,
                  CAMERA_PHI_LIMITS.min,
                  CAMERA_PHI_LIMITS.max
                );
                cameraState.needsUpdate = true;
              }
            }
          } else if (activePointers.size >= 2) {
            const [first, second] = getPrimaryPointers();
            scratchVec2A.copy(first.current);
            scratchVec2B.copy(second.current);
            const midpoint = scratchVec2C.copy(scratchVec2A).add(scratchVec2B).multiplyScalar(0.5);

            if (multiTouchState.active) {
              const deltaMidX = midpoint.x - multiTouchState.lastMidpoint.x;
              const deltaMidY = midpoint.y - multiTouchState.lastMidpoint.y;
              if (deltaMidX !== 0 || deltaMidY !== 0) {
                applyPan(deltaMidX, deltaMidY);
              }

              const distance = scratchVec2A.distanceTo(scratchVec2B);
              const distanceDelta = distance - multiTouchState.lastDistance;
              const element = renderer ? renderer.domElement : null;
              if (element && Math.abs(distanceDelta) > 0.3) {
                if (element.clientWidth !== 0) {
                  const normalized = distanceDelta / element.clientWidth;
                  const scale = THREE.MathUtils.clamp(
                    1 - normalized * cameraState.zoomSpeed,
                    0.7,
                    1.3
                  );
                  if (!Number.isNaN(scale) && Number.isFinite(scale)) {
                    cameraState.spherical.radius *= scale;
                    cameraState.needsUpdate = true;
                  }
                }
                multiTouchState.lastDistance = distance;
              } else {
                multiTouchState.lastDistance = distance;
              }
            } else {
              multiTouchState.active = true;
              multiTouchState.lastDistance = scratchVec2A.distanceTo(scratchVec2B);
            }

            multiTouchState.lastMidpoint.copy(midpoint);
          }
        }

        function handlePointerUp(event) {
          if (!renderer || !activePointers.has(event.pointerId)) {
            return;
          }
          if (event.pointerType === "touch") {
            event.preventDefault();
          }

          if (renderer && typeof renderer.domElement.releasePointerCapture === "function") {
            try {
              renderer.domElement.releasePointerCapture(event.pointerId);
            } catch (error) {
              // Ignore release errors on platforms without pointer capture support.
            }
          }
          activePointers.delete(event.pointerId);

          if (activePointers.size === 0 && renderer.domElement) {
            renderer.domElement.style.cursor = "grab";
          }

          if (activePointers.size < 2) {
            multiTouchState.active = false;
            multiTouchState.lastDistance = 0;
            multiTouchState.lastMidpoint.set(0, 0);
          }
        }

        function handleWheel(event) {
          if (!camera) {
            return;
          }

          event.preventDefault();
          const isPinchGesture = event.ctrlKey || event.metaKey || event.deltaZ !== 0;
          const isLineDelta = event.deltaMode === DOM_DELTA_LINE;
          const isPanModifier = event.shiftKey;

          // Shift+scroll to pan, otherwise scroll to zoom
          if (isPanModifier) {
            const panScale = isLineDelta ? 40 : 1;
            if (event.deltaX !== 0 || event.deltaY !== 0) {
              applyPan(event.deltaX * panScale, event.deltaY * panScale);
            }
            return;
          }

          // Default: scroll wheel zooms
          const zoomFactor = isLineDelta ? cameraState.wheelZoomSpeed * 40 :
                            isPinchGesture ? cameraState.wheelZoomSpeed :
                            cameraState.wheelZoomSpeed * 12;
          cameraState.spherical.radius += event.deltaY * zoomFactor;
          cameraState.needsUpdate = true;
        }

        function resetCameraView() {
          resetCameraControl();
          if (renderer && renderer.domElement) {
            renderer.domElement.style.cursor = "grab";
          }
        }

      function buildComponent(type, nominalValue, isPrimary) {
        const palette = COMPONENT_PALETTES[type] || COMPONENT_PALETTES.default;
        const group = new THREE.Group();
        group.userData = {
          palette,
          componentType: type,
          energy: 0.3,
          bobOffset: Math.random() * Math.PI * 2,
          baseScale: computeScale(nominalValue),
          nominalValue,
        };

        const material = new THREE.MeshStandardMaterial({
          color: palette.base,
          metalness: 0.35,
          roughness: 0.28,
          emissive: palette.glow,
          emissiveIntensity: 0.35,
        });

        let core;
        switch (type) {
          case "resistor": {
            core = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 0.5), material);
            const leadGeometry = new THREE.CylinderGeometry(0.07, 0.07, 0.9, 20);
            const leadMaterial = new THREE.MeshStandardMaterial({
              color: 0xbcd0ff,
              metalness: 0.85,
              roughness: 0.25,
              emissive: 0x1e293b,
              emissiveIntensity: 0.1,
            });
            const leadL = new THREE.Mesh(leadGeometry, leadMaterial);
            leadL.position.x = -1.05;
            leadL.rotation.z = Math.PI / 2;
            const leadR = leadL.clone();
            leadR.position.x = 1.05;
            group.add(leadL, leadR);

            const bandMaterial = new THREE.MeshStandardMaterial({
              color: palette.band || 0xfacc15,
              metalness: 0.45,
              roughness: 0.35,
              emissive: palette.band || palette.glow,
              emissiveIntensity: 0.22,
            });
            [-0.35, 0, 0.35].forEach((offset) => {
              const band = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.58), bandMaterial);
              band.position.x = offset;
              group.add(band);
            });
            break;
          }
          case "capacitor": {
            core = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 1.2, 48), material);
            const capTopMat = new THREE.MeshStandardMaterial({
              color: palette.accent || 0xffffff,
              metalness: 0.9,
              roughness: 0.18,
              emissive: palette.glow,
              emissiveIntensity: 0.12,
            });
            const top = new THREE.Mesh(new THREE.CircleGeometry(0.55, 48), capTopMat);
            top.rotation.x = Math.PI / 2;
            top.position.y = 0.6;
            const bottom = top.clone();
            bottom.position.y = -0.6;
            bottom.rotation.x = -Math.PI / 2;
            group.add(top, bottom);

            const leadMaterial = new THREE.MeshStandardMaterial({
              color: 0x86efac,
              metalness: 0.6,
              roughness: 0.45,
            });
            const leadGeometry = new THREE.CylinderGeometry(0.045, 0.045, 1.4, 16);
            const lead1 = new THREE.Mesh(leadGeometry, leadMaterial);
            lead1.position.set(-0.2, -1.1, 0);
            const lead2 = lead1.clone();
            lead2.position.x = 0.2;
            group.add(lead1, lead2);
            break;
          }
          case "inductor": {
            core = new THREE.Mesh(new THREE.TorusKnotGeometry(0.55, 0.16, 100, 18, 2, 3), material);
            break;
          }
          case "led": {
            core = new THREE.Mesh(new THREE.ConeGeometry(0.45, 1.2, 36, 1, true), material);
            core.position.y = 0.35;
            const bulb = new THREE.Mesh(
              new THREE.SphereGeometry(0.38, 36, 36),
              new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: palette.glow,
                emissiveIntensity: 0.85,
                metalness: 0.1,
                roughness: 0.08,
                transparent: true,
                opacity: 0.75,
              })
            );
            bulb.position.y = 0.65;
            group.add(bulb);

            const base = new THREE.Mesh(
              new THREE.CylinderGeometry(0.26, 0.32, 0.28, 32),
              new THREE.MeshStandardMaterial({
                color: 0x1f2937,
                metalness: 0.75,
                roughness: 0.42,
              })
            );
            base.position.y = -0.35;
            group.add(base);

            const legGeometry = new THREE.CylinderGeometry(0.045, 0.045, 1.35, 16);
            const legMaterial = new THREE.MeshStandardMaterial({
              color: 0xdbeafe,
              metalness: 0.9,
              roughness: 0.25,
            });
            const leg1 = new THREE.Mesh(legGeometry, legMaterial);
            leg1.position.set(-0.14, -1.05, 0);
            const leg2 = leg1.clone();
            leg2.position.x = 0.14;
            group.add(leg1, leg2);
            break;
          }
          case "battery": {
            core = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.65, 1.2, 48), material);
            const capMaterial = new THREE.MeshStandardMaterial({
              color: palette.accent || 0xffffff,
              metalness: 0.85,
              roughness: 0.2,
              emissive: palette.glow,
              emissiveIntensity: 0.18,
            });
            const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.18, 32), capMaterial);
            cap.position.y = 0.69;
            const terminal = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.22, 24), capMaterial);
            terminal.position.y = 0.84;
            group.add(cap, terminal);
            break;
          }
          case "switch": {
            core = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.8), material);
            const base = new THREE.Mesh(
              new THREE.BoxGeometry(1.4, 0.1, 1),
              new THREE.MeshStandardMaterial({
                color: palette.accent || 0x0f766e,
                metalness: 0.4,
                roughness: 0.35,
                emissive: palette.glow,
                emissiveIntensity: 0.12,
              })
            );
            base.position.y = -0.25;
            const lever = new THREE.Mesh(
              new THREE.CylinderGeometry(0.08, 0.04, 0.9, 24),
              new THREE.MeshStandardMaterial({
                color: palette.glow,
                metalness: 0.9,
                roughness: 0.3,
              })
            );
            lever.position.set(0, 0.45, 0);
            lever.rotation.z = -Math.PI / 6;
            group.add(base, lever);
            break;
          }
          default: {
            core = new THREE.Mesh(new THREE.OctahedronGeometry(0.75, 0), material);
            break;
          }
          case "mosfet": {
            // TO-220 style package: black rectangular body
            core = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.4, 0.4), material);
            // Metal heat tab at the top back
            const tabMat = new THREE.MeshStandardMaterial({
              color: palette.accent || 0x94a3b8,
              metalness: 0.92,
              roughness: 0.18,
              emissive: palette.glow,
              emissiveIntensity: 0.12,
            });
            const tab = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.5, 0.15), tabMat);
            tab.position.set(0, 0.96, 0.12);
            group.add(tab);
            const holeGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.16, 20);
            const hole = new THREE.Mesh(holeGeo, tabMat);
            hole.rotation.z = Math.PI / 2;
            hole.position.set(0, 0.96, 0.12);
            group.add(hole);
            // Three metal leads (Gate, Drain, Source)
            const legMat = new THREE.MeshStandardMaterial({
              color: 0xdbeafe,
              metalness: 0.95,
              roughness: 0.18,
            });
            const legGeo = new THREE.BoxGeometry(0.08, 1.2, 0.04);
            [-0.32, 0, 0.32].forEach((xPos, idx) => {
              const leg = new THREE.Mesh(legGeo, legMat);
              leg.position.set(xPos, -1.3, 0);
              group.add(leg);
              // Bend at base
              const bend = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.04, 0.25), legMat);
              bend.position.set(xPos, -0.7, -0.1);
              group.add(bend);
            });
            break;
          }
          case "heatsink": {
            // Flat aluminum base
            core = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.22, 1.6), material);
            // Vertical fins
            const finMat = new THREE.MeshStandardMaterial({
              color: palette.base,
              metalness: 0.82,
              roughness: 0.28,
              emissive: palette.glow,
              emissiveIntensity: 0.06,
            });
            for (let f = 0; f < 8; f++) {
              const fin = new THREE.Mesh(new THREE.BoxGeometry(2.1, 1.1, 0.07), finMat);
              fin.position.set(0, 0.66, -0.66 + f * 0.19);
              group.add(fin);
            }
            // Mounting hole suggestion (small cylinder cutouts)
            const mountMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, metalness: 0.5, roughness: 0.5 });
            [-0.8, 0.8].forEach((xPos) => {
              const mount = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.25, 16), mountMat);
              mount.position.set(xPos, 0, 0);
              group.add(mount);
            });
            break;
          }
        }

        group.add(core);
        group.userData.core = core;

        const halo = new THREE.Mesh(
          new THREE.SphereGeometry(0.95, 32, 32),
          new THREE.MeshBasicMaterial({
            color: palette.glow,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          })
        );
        group.add(halo);
        group.userData.halo = halo;

        const orbiters = [];
        for (let i = 0; i < 3; i++) {
          const orb = new THREE.Mesh(
            new THREE.SphereGeometry(0.12 + i * 0.03, 18, 18),
            new THREE.MeshBasicMaterial({
              color: palette.orbit,
              transparent: true,
              opacity: 0.78 - i * 0.2,
              depthWrite: false,
              blending: THREE.AdditiveBlending,
            })
          );
          orb.userData = {
            radius: 0.95 + i * 0.22,
            height: 0.28 + i * 0.16,
            speed: 0.7 + i * 0.42,
          };
          orbiters.push(orb);
          group.add(orb);
        }
        group.userData.orbiters = orbiters;

        group.scale.setScalar(group.userData.baseScale);
        group.position.y = 0.25;

        if (isPrimary) {
          const badge = new THREE.Mesh(
            new THREE.CircleGeometry(0.44, 32),
            new THREE.MeshBasicMaterial({
              color: 0x22d3ee,
              transparent: true,
              opacity: 0.4,
              depthWrite: false,
            })
          );
          badge.rotation.x = -Math.PI / 2;
          badge.position.set(0, -0.68, 0);
          group.add(badge);
        }

        return group;
      }

      function computeScale(value) {
        if (!Number.isFinite(value) || value <= 0) {
          return 1;
        }
        const scaled = Math.log10(value + 10) / 3;
        return THREE.MathUtils.clamp(0.75 + scaled, 0.7, 2.3);
      }

      function rebuildComponentGroup(slot, type, nominalValue) {
        const isPrimary = slot === "A";
        const current = isPrimary ? componentGroupA : componentGroupB;
        if (current) {
          scene.remove(current);
          disposeGroup(current);
        }

        const nextGroup = buildComponent(type, nominalValue, isPrimary);
        nextGroup.position.x = COMPONENT_POSITIONS[slot];
        nextGroup.visible = isPrimary || (state.mode === "compare" && Boolean(state.selectedB));
        scene.add(nextGroup);

        if (isPrimary) {
          componentGroupA = nextGroup;
        } else {
          componentGroupB = nextGroup;
        }

        return nextGroup;
      }

      function ensureComponentGroup(slot, component) {
        const isPrimary = slot === "A";
        const current = isPrimary ? componentGroupA : componentGroupB;

        if (!component) {
          if (current) {
            current.visible = false;
          }
          return current || null;
        }

        const paletteKey = component.type && COMPONENT_PALETTES[component.type]
          ? component.type
          : "default";
        const nominalValue = extractNominalValue(component);
        const baseScale = computeScale(nominalValue);

        let group = current;
        if (!group || group.userData.componentType !== paletteKey) {
          group = rebuildComponentGroup(slot, paletteKey, nominalValue);
        } else {
          group.visible = isPrimary || (state.mode === "compare" && Boolean(state.selectedB));
          group.userData.baseScale = baseScale;
          group.scale.setScalar(group.userData.baseScale);
        }

        group.userData.nominalValue = nominalValue;
        group.userData.componentType = paletteKey;
        group.userData.bobOffset = group.userData.bobOffset ?? Math.random() * Math.PI * 2;
        return group;
      }

      function disposeGroup(group) {
        group.traverse((child) => {
          if (child.geometry) {
            child.geometry.dispose();
          }
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach((mat) => mat.dispose());
            } else {
              child.material.dispose();
            }
          }
        });
      }

        function animate() {
          requestAnimationFrame(animate);
          if (!clock) {
            updateCamera();
            renderer.render(scene, camera);
            return;
          }

          const delta = clock.getDelta();
          const elapsed = clock.elapsedTime;

          updateComponentAnimation(componentGroupA, elapsed, delta);
          if (componentGroupB && componentGroupB.visible) {
            updateComponentAnimation(componentGroupB, elapsed + 0.6, delta);
          }

          if (energyRing) {
            energyRing.rotation.z += delta * 0.55;
            const energyLevel = Math.max(
              componentGroupA ? componentGroupA.userData.energy || 0 : 0,
              componentGroupB && componentGroupB.visible ? componentGroupB.userData.energy || 0 : 0,
            );
            energyRing.material.opacity = 0.35 + energyLevel * 0.35;
            const pulse = 1 + Math.sin(elapsed * 1.4) * 0.04 + energyLevel * 0.12;
            energyRing.scale.setScalar(pulse);
          }

          if (pulseRing && pulseRing.userData.life > 0) {
            pulseRing.userData.life -= delta * 0.9;
            const life = Math.max(pulseRing.userData.life, 0);
            pulseRing.material.opacity = life * pulseRing.userData.strength;
            const scale = 1 + (1 - life) * (1.4 + pulseRing.userData.strength * 1.2);
            pulseRing.scale.setScalar(scale);
          }

          animateParticles(delta);
          updateFailureParticles(delta);

          updateCamera();
          renderer.render(scene, camera);
        }

      function updateComponentAnimation(group, elapsed, delta) {
        if (!group) {
          return;
        }
        const energy = group.userData.energy || 0.25;
        group.rotation.y += delta * (0.8 + energy * 2.8);
        group.rotation.x = Math.sin(elapsed * 0.8 + group.userData.bobOffset) * 0.2;
        group.position.y = 0.25 + Math.sin(elapsed * 1.6 + group.userData.bobOffset) * (0.12 + energy * 0.12);
        (group.userData.orbiters || []).forEach((orb, idx) => {
          const data = orb.userData;
          const angle = elapsed * (data.speed + energy) + idx * Math.PI * 0.75;
          orb.position.set(
            Math.cos(angle) * data.radius,
            data.height + Math.sin(angle * 1.8) * 0.12,
            Math.sin(angle) * data.radius,
          );
        });
      }

      function animateParticles(delta) {
        if (!particles) {
          return;
        }
        const positions = particles.geometry.getAttribute("position");
        for (let i = 0; i < particleSpeeds.length; i++) {
          positions.array[i * 3 + 1] += particleSpeeds[i] * delta;
          if (positions.array[i * 3 + 1] > 7) {
            positions.array[i * 3] = (Math.random() - 0.5) * 16;
            positions.array[i * 3 + 1] = Math.random() * 2;
            positions.array[i * 3 + 2] = (Math.random() - 0.5) * 16;
          }
        }
        positions.needsUpdate = true;
      }

      function triggerPulse(intensity) {
        if (!pulseRing) {
          return;
        }
        pulseRing.userData.life = 1;
        pulseRing.userData.strength = THREE.MathUtils.clamp(intensity, 0.2, 1.1);
        pulseRing.scale.setScalar(1);
      }
