<?xml version="1.0" encoding="UTF-8"?>
<!--
  CircuiTry3D app icon — series circuit frame matching circuit-logo.svg style.

  Circuit corners (512×512 canvas):
    TL (56,  98)   TR (456,  98)
    BL (56, 414)   BR (456, 414)

  LEFT   : Battery  — red plates (#ff2b2b) centred at y=256
  TOP    : Resistor R1 — orange (#ff8844) 3-peak ANSI zigzag, body x=152→360, at y=98
  RIGHT  : Resistor R2 — same zigzag rotated 90°, body y=182→330, at x=456
  BOTTOM : Resistor R3 — reversed zigzag, body x=360→152, at y=414
  WIRE   : green #00ff88 (matches circuit-logo.svg exactly)

-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- ── Background gradient ── -->
    <radialGradient id="bg" cx="50%" cy="50%" r="64%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>

    <!-- ── Workspace grid overlay ──
         Mirrors the Three.js grid in the main circuit builder:
           Fine  grid : 0x0a0a1a (#0a0a1a) — fineGrid   lines, 16 px cells
           Coarse grid: 0x111122 (#111122) — gridHelper  lines, 32 px cells
    -->
    <pattern id="grid-fine" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#0a0a1a" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-coarse" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="url(#grid-fine)"/>
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#111122" stroke-width="1"/>
    </pattern>

    <!-- ── Circuit glow (applied to wires, resistors, battery, dots) ── -->
    <!-- filterUnits="userSpaceOnUse" so it covers the whole 512×512 canvas,
         including peaks that extend outside the circuit rectangle          -->
    <filter id="circuitGlow" x="0" y="0" width="512" height="512"
            filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Arrowhead for 5 A current-direction corner indicators ── -->
    <marker id="arrowCurrent"
            markerWidth="10" markerHeight="8" refX="9" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,8 L10,4 Z" fill="#ffffff" opacity="0.9"/>
    </marker>

  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ── Workspace grid overlay (drawn above background, below all circuit elements) ── -->
  <rect width="512" height="512" fill="url(#grid-coarse)"/>

  <!-- ════════════════════════════════════════════════════════════
       WIRES — green #00ff88, stroke-width 6, matching circuit-logo.svg
       ════════════════════════════════════════════════════════════ -->

  <!-- TOP: left wire lead (TL corner → R1 body start) -->
  <line x1="56" y1="98" x2="152" y2="98"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>
  <!-- TOP: right wire lead (R1 body end → TR corner) -->
  <line x1="360" y1="98" x2="456" y2="98"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>

  <!-- RIGHT: top wire lead (TR corner → R2 body start) -->
  <line x1="456" y1="98" x2="456" y2="182"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>
  <!-- RIGHT: bottom wire lead (R2 body end → BR corner) -->
  <line x1="456" y1="330" x2="456" y2="414"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>

  <!-- BOTTOM: right wire lead (BR corner → R3 body start) -->
  <line x1="456" y1="414" x2="360" y2="414"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>
  <!-- BOTTOM: left wire lead (R3 body end → BL corner) -->
  <line x1="152" y1="414" x2="56" y2="414"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>

  <!-- LEFT: upper wire (TL corner → battery + plate) -->
  <line x1="56" y1="98" x2="56" y2="244"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>
  <!-- LEFT: lower wire (battery − plate → BL corner) -->
  <line x1="56" y1="268" x2="56" y2="414"
        stroke="#00ff88" stroke-width="6" stroke-linecap="round"
        filter="url(#circuitGlow)"/>

  <!-- ════════════════════════════════════════════════════════════
       RESISTORS — orange #ff8844, same ANSI 3-peak zigzag as circuit-logo.svg
       Zigzag source: "-30,0 -22,0 -17,-10 -7,10 3,-10 13,10 18,0 30,0"
       Scaled ×3.467 to span 208 px (body), amplitude ±34.7 px ≈ ±35 px
       ════════════════════════════════════════════════════════════ -->

  <!-- R1 — TOP horizontal, left→right, body x=152→360 at y=98
       Scale 3.467: centre (256,98)
       Up-peaks  y=63  (above wire, away from interior)
       Down-peaks y=133 (below wire, into interior)     -->
  <polyline
    points="152,98 180,98 197,63 232,133 266,63 301,133 318,98 360,98"
    fill="none" stroke="#ff8844" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#circuitGlow)"/>

  <!-- R2 — RIGHT vertical, top→bottom, body y=182→330 at x=456
       Same zigzag rotated 90° CW (SVG rotate(90): (x,y)→(−y,x))
       Scale 2.467: centre (456,256)
       Right-peaks x=481 (away from interior, outside circuit)
       Left-peaks  x=431 (into interior)                         -->
  <polyline
    points="456,182 456,202 481,214 431,239 481,263 431,288 456,300 456,330"
    fill="none" stroke="#ff8844" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#circuitGlow)"/>

  <!-- R3 — BOTTOM horizontal, right→left, body x=360→152 at y=414
       Reversed zigzag (current flows right→left)
       Down-peaks y=449 (below wire, away from interior)
       Up-peaks   y=379 (above wire, into interior)              -->
  <polyline
    points="360,414 318,414 301,449 266,379 232,449 197,379 180,414 152,414"
    fill="none" stroke="#ff8844" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#circuitGlow)"/>

  <!-- ════════════════════════════════════════════════════════════
       BATTERY — red #ff2b2b on the left branch, centred at y=256
       Positive plate (long)  at y=244  (centre−12)
       Negative plate (short) at y=268  (centre+12)
       ════════════════════════════════════════════════════════════ -->
  <!-- + plate (wide) -->
  <line x1="33" y1="244" x2="79" y2="244"
        stroke="#ff2b2b" stroke-width="13" stroke-linecap="square"/>
  <!-- − plate (narrow) -->
  <line x1="43" y1="268" x2="69" y2="268"
        stroke="#ff2b2b" stroke-width="7" stroke-linecap="square"/>
  <!-- Polarity markers -->
  <text x="20" y="248" text-anchor="middle"
        font-family="sans-serif" font-size="20" font-weight="700"
        fill="#ff6b6b">+</text>
  <text x="20" y="274" text-anchor="middle"
        font-family="sans-serif" font-size="20" font-weight="700"
        fill="#ff6b6b">−</text>
  <!-- Voltage label — inline right of − marker, red matching battery color -->
  <text x="80" y="274" text-anchor="start"
        font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700"
        fill="#ff2b2b"
        stroke="#050b1f" stroke-width="1.5" paint-order="stroke fill">12V</text>

  <!-- ════════════════════════════════════════════════════════════
       JUNCTION DOTS — purple #8844ff (matching the 3D app's junction sphere color 0x8844ff)
       Large (r=9) at circuit corners; small (r=6) at component endpoints
       stroke="#0f172a" matches circuit-logo.svg junction style
       ════════════════════════════════════════════════════════════ -->
  <circle cx="56"  cy="98"  r="9" fill="#8844ff" stroke="#0f172a" stroke-width="1.5" filter="url(#circuitGlow)"/>
  <circle cx="456" cy="98"  r="9" fill="#8844ff" stroke="#0f172a" stroke-width="1.5" filter="url(#circuitGlow)"/>
  <circle cx="456" cy="414" r="9" fill="#8844ff" stroke="#0f172a" stroke-width="1.5" filter="url(#circuitGlow)"/>
  <circle cx="56"  cy="414" r="9" fill="#8844ff" stroke="#0f172a" stroke-width="1.5" filter="url(#circuitGlow)"/>

  <circle cx="152" cy="98"  r="6" fill="#8844ff" stroke="#0f172a" stroke-width="1"   filter="url(#circuitGlow)"/>
  <circle cx="360" cy="98"  r="6" fill="#8844ff" stroke="#0f172a" stroke-width="1"   filter="url(#circuitGlow)"/>
  <circle cx="456" cy="182" r="6" fill="#8844ff" stroke="#0f172a" stroke-width="1"   filter="url(#circuitGlow)"/>
  <circle cx="456" cy="330" r="6" fill="#8844ff" stroke="#0f172a" stroke-width="1"   filter="url(#circuitGlow)"/>
  <circle cx="360" cy="414" r="6" fill="#8844ff" stroke="#0f172a" stroke-width="1"   filter="url(#circuitGlow)"/>
  <circle cx="152" cy="414" r="6" fill="#8844ff" stroke="#0f172a" stroke-width="1"   filter="url(#circuitGlow)"/>

  <!-- ════════════════════════════════════════════════════════════
       COMPONENT LABELS — matching circuit-logo.svg label style
       font-family / fill / stroke / paint-order identical to the wordmark logo
       R1 above  (y=50, peaks at y=63),  R2 right  (x≈498, peaks at x=481),
       R3 below  (y=469, peaks at y=449), red ? for R2 unknown value
       ════════════════════════════════════════════════════════════ -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14"
     fill="#88ccff" font-weight="600"
     stroke="#050b1f" stroke-width="1.5" paint-order="stroke fill">
    <!-- R1 — centred above top resistor -->
    <text x="256" y="50"   text-anchor="middle">R&#x2081; = 3 k&#x03A9;</text>
    <!-- R2 — to the right of right resistor (label ends just inside canvas) -->
    <text x="498" y="260"  text-anchor="end">R&#x2082; =</text>
    <!-- R3 — centred below bottom resistor -->
    <text x="256" y="469"  text-anchor="middle">R&#x2083; = 5 k&#x03A9;</text>
  </g>
  <!-- Unknown-value prompt for R2 (red ?, matching circuit-logo.svg) -->
  <text x="498" y="260"
        font-family="system-ui, -apple-system, sans-serif" font-size="18"
        fill="#ff2b2b" font-weight="800" text-anchor="start"
        stroke="#050b1f" stroke-width="1.5" paint-order="stroke fill">?</text>

  <!-- ════════════════════════════════════════════════════════════
       CURRENT INDICATORS — white, 5 A at TL and BR corners
       TL: current flows ↑ along left wire then → along top wire
       BR: current flows ↓ along right wire then ← along bottom wire
       ════════════════════════════════════════════════════════════ -->
  <!-- Top-left corner 5A arrow (inside circuit, near TL junction 56,98) -->
  <path d="M 91,157 L 91,115 L 137,115"
        fill="none" stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrowCurrent)"/>
  <text x="99" y="149"
        font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700"
        fill="#ffffff"
        stroke="#050b1f" stroke-width="1.5" paint-order="stroke fill">5A</text>

  <!-- Bottom-right corner 5A arrow (inside circuit, near BR junction 456,414) -->
  <path d="M 421,360 L 421,403 L 374,403"
        fill="none" stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrowCurrent)"/>
  <text x="381" y="382"
        font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700"
        fill="#ffffff"
        stroke="#050b1f" stroke-width="1.5" paint-order="stroke fill">5A</text>

</svg>
