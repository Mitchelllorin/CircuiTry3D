<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0f172a"/>
  <svg x="6" y="6" width="500" height="500" viewBox="0 0 300 300">
    <defs>
      <pattern id="bgGrid2" width="22" height="22" patternUnits="userSpaceOnUse">
        <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
      </pattern>
      <filter id="glow2">
        <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Dark background -->
    <rect width="300" height="300" fill="#0f172a"/>
    <rect width="300" height="300" fill="url(#bgGrid2)"/>

    <!-- WIRES (green) -->
    <g stroke="#00ff88" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="65" y1="70"  x2="65" y2="130"/>
      <line x1="65" y1="168" x2="65" y2="228"/>
      <line x1="65"  y1="70" x2="108" y2="70"/>
      <line x1="192" y1="70" x2="235" y2="70"/>
      <line x1="235" y1="70"  x2="235" y2="107"/>
      <line x1="235" y1="191" x2="235" y2="228"/>
      <line x1="65"  y1="228" x2="108" y2="228"/>
      <line x1="192" y1="228" x2="235" y2="228"/>
    </g>

    <!-- R1 – top horizontal resistor -->
    <g transform="translate(150,70)" stroke="#ff8800" stroke-width="3" fill="none"
       stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)">
      <polyline points="-42,0 -30,0 -22,-13 -10,13 2,-13 14,13 22,0 42,0"/>
    </g>

    <!-- R2 – right vertical resistor -->
    <g transform="translate(235,149) rotate(90)" stroke="#ff8800" stroke-width="3" fill="none"
       stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)">
      <polyline points="-42,0 -30,0 -22,-13 -10,13 2,-13 14,13 22,0 42,0"/>
    </g>

    <!-- R3 – bottom horizontal resistor -->
    <g transform="translate(150,228)" stroke="#ff8800" stroke-width="3" fill="none"
       stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)">
      <polyline points="-42,0 -30,0 -22,-13 -10,13 2,-13 14,13 22,0 42,0"/>
    </g>

    <!-- Battery -->
    <line x1="50" y1="130" x2="80" y2="130" stroke="#cc3333" stroke-width="5" stroke-linecap="square"/>
    <line x1="56" y1="168" x2="74" y2="168" stroke="#cc3333" stroke-width="3" stroke-linecap="square"/>
    <text x="40" y="127" font-size="12" fill="#ff6b6b" font-weight="bold" text-anchor="middle">+</text>
    <text x="40" y="152" font-size="10" fill="#88ccff" font-weight="bold" text-anchor="middle">12V</text>
    <text x="40" y="174" font-size="12" fill="#ff6b6b" font-weight="bold" text-anchor="middle">-</text>

    <!-- Junction dots at corners (purple, large) -->
    <circle cx="65"  cy="70"  r="5.5" fill="#8b5cf6"/>
    <circle cx="235" cy="70"  r="5.5" fill="#8b5cf6"/>
    <circle cx="235" cy="228" r="5.5" fill="#8b5cf6"/>
    <circle cx="65"  cy="228" r="5.5" fill="#8b5cf6"/>

    <!-- Junction dots at component connections (purple, medium) -->
    <circle cx="108" cy="70"  r="4" fill="#8b5cf6"/>
    <circle cx="192" cy="70"  r="4" fill="#8b5cf6"/>
    <circle cx="235" cy="107" r="4" fill="#8b5cf6"/>
    <circle cx="235" cy="191" r="4" fill="#8b5cf6"/>
    <circle cx="192" cy="228" r="4" fill="#8b5cf6"/>
    <circle cx="108" cy="228" r="4" fill="#8b5cf6"/>

    <!-- Component labels -->
    <g font-family="system-ui,-apple-system,sans-serif" font-weight="600"
       stroke="#050b1f" stroke-width="2" paint-order="stroke fill">
      <text x="150" y="50"  font-size="11" fill="#88ccff" text-anchor="middle">R₁ = 3 kΩ</text>
      <text x="248" y="152" font-size="10" fill="#88ccff" text-anchor="start">R₂ =</text>
      <text x="150" y="250" font-size="11" fill="#88ccff" text-anchor="middle">R₃ = 5 kΩ</text>
    </g>
    <text x="278" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="13"
          fill="#ff8800" font-weight="800" text-anchor="start"
          stroke="#050b1f" stroke-width="1.5" paint-order="stroke fill">?</text>

    <!-- 5A current indicators -->
    <!-- Top-left: L-bracket with vertical down and horizontal right → -->
    <g stroke="#d1d5db" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="82,115 82,87 120,87"/>
      <polyline points="115,82 120,87 115,92"/>
    </g>
    <text x="125" y="91" font-family="system-ui,-apple-system,sans-serif" font-size="12"
          fill="#d1d5db" font-weight="600">5A</text>
    <!-- Bottom-right: L-bracket with vertical up and horizontal left ← -->
    <g stroke="#d1d5db" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="218,183 218,211 180,211"/>
      <polyline points="185,206 180,211 185,216"/>
    </g>
    <text x="175" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="12"
          fill="#d1d5db" font-weight="600" text-anchor="end">5A</text>
  </svg>
</svg>
