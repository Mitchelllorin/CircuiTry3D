<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automotive Circuit Simulator — CircuiTry3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07071a;
      color: #c8d8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      width: 100%; height: 100vh;
      user-select: none;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      display: block;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }

    /* ── Panels ──────────────────────────────────────── */
    .panel {
      position: absolute;
      background: rgba(7, 7, 28, 0.88);
      border: 1px solid rgba(136, 204, 255, 0.22);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.65;
      color: #c8d8f0;
      pointer-events: all;
      backdrop-filter: blur(6px);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 700;
      color: #88ccff;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(136, 204, 255, 0.18);
      letter-spacing: 0.03em;
    }

    /* ── Info Panel ──────────────────────────────────── */
    #info-panel { top: 12px; left: 12px; width: 210px; }

    .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .val        { color: #00ff88; font-weight: 600; }
    .val.warn   { color: #ff9966; }
    .val.danger { color: #ff4444; }
    .val.blue   { color: #88ccff; }

    #active-circuits-wrap {
      margin-top: 7px;
      padding-top: 6px;
      border-top: 1px solid rgba(136, 204, 255, 0.1);
    }
    .active-label { font-size: 10px; color: #3d5570; margin-bottom: 3px; }
    .chip {
      display: inline-block;
      background: rgba(136, 204, 255, 0.1);
      border: 1px solid rgba(136, 204, 255, 0.28);
      border-radius: 4px;
      padding: 1px 7px;
      margin: 2px 2px 0 0;
      font-size: 10px;
      color: #88ccff;
    }

    /* ── Fuse Panel ──────────────────────────────────── */
    #fuse-panel { top: 12px; right: 12px; width: 180px; display: none; }

    .fuse-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-top: 6px;
    }
    .fuse-slot {
      background: rgba(20, 20, 50, 0.8);
      border: 1px solid rgba(80, 110, 160, 0.3);
      border-radius: 5px;
      padding: 5px 3px;
      font-size: 10px;
      text-align: center;
      line-height: 1.4;
    }
    .fuse-slot .famp { font-size: 9px; color: #3d5570; }
    .fuse-slot.active { background: rgba(0,255,136,0.08); border-color: #00ff88; color: #00ff88; }
    .fuse-slot.active .famp { color: #00cc66; }
    .fuse-slot.blown  { background: rgba(255,50,50,0.1); border-color: #ff4444; color: #ff4444; }
    .fuse-slot.blown  .famp { color: #cc2222; }
    .fuse-hint { font-size: 10px; color: #3d5570; margin-top: 6px; }

    /* ── Controls Panel ──────────────────────────────── */
    #controls-panel {
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      align-items: center;
      padding: 9px 14px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: calc(100vw - 28px);
    }

    .ctrl-btn {
      background: rgba(15, 15, 40, 0.92);
      border: 1px solid rgba(136, 204, 255, 0.28);
      border-radius: 8px;
      color: #a8bcd8;
      padding: 8px 13px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s, box-shadow 0.18s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
    .ctrl-btn:hover {
      background: rgba(40, 40, 80, 0.95);
      border-color: #88ccff;
      color: #88ccff;
    }
    .ctrl-btn.active {
      background: rgba(136, 204, 255, 0.15);
      border-color: #88ccff;
      color: #88ccff;
      box-shadow: 0 0 8px rgba(136, 204, 255, 0.25);
    }
    #btn-horn:hover       { border-color: #ff9966; color: #ff9966; }
    #btn-horn.active      { background: rgba(255,153,102,0.12); border-color: #ff9966; color: #ff9966; box-shadow: 0 0 8px rgba(255,153,102,0.3); }
    #btn-starter:hover    { border-color: #00ff88; color: #00ff88; }
    #btn-starter.active   { background: rgba(0,255,136,0.1); border-color: #00ff88; color: #00ff88; box-shadow: 0 0 8px rgba(0,255,136,0.25); }
    #btn-overload         { border-color: rgba(255,80,80,0.35); }
    #btn-overload:hover   { border-color: #ff4444; color: #ff4444; }

    /* ── Component Info ──────────────────────────────── */
    #component-info { bottom: 12px; right: 12px; width: 235px; display: none; }

    .ci-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .ci-row  { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; }
    .ci-lbl  { color: #6680a0; }
    .ci-val  { color: #00ff88; font-weight: 600; }
    .ci-desc {
      margin-top: 8px; padding-top: 7px;
      border-top: 1px solid rgba(136,204,255,0.1);
      font-size: 11px; color: #6888a8; line-height: 1.5;
    }

    /* ── Labels Overlay ──────────────────────────────── */
    #labels-layer, #area-labels-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .comp-label {
      position: absolute;
      font-size: 10px;
      color: rgba(170,200,240,0.82);
      background: rgba(7, 7, 26, 0.6);
      border: 1px solid rgba(136,204,255,0.18);
      border-radius: 3px;
      padding: 1px 5px;
      white-space: nowrap;
      transform: translate(-50%, calc(-100% - 6px));
      pointer-events: none;
    }
    .area-label {
      position: absolute;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: rgba(80, 120, 180, 0.5);
      text-transform: uppercase;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* ── Notification ────────────────────────────────── */
    #notification {
      position: absolute;
      top: 48%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(7, 7, 30, 0.95);
      border: 1px solid rgba(255,80,80,0.5);
      border-radius: 10px;
      padding: 13px 22px;
      font-size: 13px;
      color: #ff7777;
      display: none;
      text-align: center;
      pointer-events: none;
      z-index: 200;
      white-space: pre-line;
      max-width: 300px;
      line-height: 1.5;
    }

    /* ── Hint ────────────────────────────────────────── */
    #hint {
      position: absolute; bottom: 70px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; color: rgba(100,140,200,0.45);
      pointer-events: none; white-space: nowrap;
    }

    /* ── Fuse panel close btn ───────────────────────── */
    #fuse-close {
      position: absolute; top: 8px; right: 10px;
      cursor: pointer; color: #3d5570; font-size: 14px;
    }
    #fuse-close:hover { color: #88ccff; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="labels-layer"></div>
  <div id="area-labels-layer"></div>

  <!-- ── Info Panel ── -->
  <div id="info-panel" class="panel">
    <div class="panel-title">⚡ System Status</div>
    <div class="stat-row">
      <span>Battery</span>
      <span class="val" id="sv-battery">12.6 V</span>
    </div>
    <div class="stat-row">
      <span>Total Draw</span>
      <span class="val" id="sv-current">0.0 A</span>
    </div>
    <div class="stat-row">
      <span>Alternator</span>
      <span class="val warn" id="sv-alt">Off</span>
    </div>
    <div id="active-circuits-wrap">
      <div class="active-label">ACTIVE CIRCUITS</div>
      <div id="active-chips"><span style="color:#3d5570">—</span></div>
    </div>
  </div>

  <!-- ── Fuse Panel ── -->
  <div id="fuse-panel" class="panel">
    <div class="panel-title">🔌 Fuse Box</div>
    <span id="fuse-close" onclick="closeFusePanel()">✕</span>
    <div class="fuse-grid" id="fuse-grid"></div>
    <div class="fuse-hint">Blown fuse = circuit disabled</div>
  </div>

  <!-- ── Controls Panel ── -->
  <div id="controls-panel" class="panel">
    <button class="ctrl-btn" id="btn-headlights" onclick="toggleHeadlights()">💡 Headlights</button>
    <button class="ctrl-btn" id="btn-ignition"   onclick="toggleIgnition()">🔑 Ignition</button>
    <button class="ctrl-btn" id="btn-horn"        onclick="pressHorn()">📯 Horn</button>
    <button class="ctrl-btn" id="btn-starter"     onclick="crankStarter()">🔄 Starter</button>
    <button class="ctrl-btn" id="btn-overload"    onclick="overloadDemo()">⚡ Overload</button>
  </div>

  <!-- ── Component Info ── -->
  <div id="component-info" class="panel">
    <div class="ci-name" id="ci-name">—</div>
    <div class="ci-row"><span class="ci-lbl">Voltage</span><span class="ci-val" id="ci-volt">—</span></div>
    <div class="ci-row"><span class="ci-lbl">Current</span><span class="ci-val" id="ci-curr">—</span></div>
    <div class="ci-row"><span class="ci-lbl">Status</span> <span class="ci-val" id="ci-status">—</span></div>
    <div class="ci-desc" id="ci-desc">—</div>
  </div>

  <!-- ── Notification ── -->
  <div id="notification"></div>

  <!-- ── Hint ── -->
  <div id="hint">Drag to orbit · Scroll to zoom · Click component for info</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  'use strict';

  /* ================================================================
     CIRCUIT STATE
     ================================================================ */
  var S = {
    headlights:    false,
    ignition:      false,
    horn:          false,
    starter:       false,
    engineRunning: false,
    fusesBlown: {
      headlights: false,
      horn:       false,
      interior:   false,
      ignition:   false
    }
  };

  /* ================================================================
     COMPONENT DEFINITIONS
     ================================================================ */
  var COMP = {
    battery: {
      name: '12V Battery',
      pos:  new THREE.Vector3(-1.1, 0.35, -2.4),
      size: [0.52, 0.30, 0.68],
      baseColor:   0x1a3a88,
      glowColor:   0x4488ff,
      voltage: '12.6 V (13.8 V charging)',
      current: '0 A idle / peaks at crank',
      desc:  'Lead-acid 12 V battery. Provides initial power to all loads and is recharged by the alternator while the engine runs. Positive terminal → fuse box.'
    },
    alternator: {
      name: 'Alternator',
      pos:  new THREE.Vector3(0.6, 0.35, -2.35),
      size: [0.45, 0.38, 0.45],
      baseColor:   0x1e2e10,
      glowColor:   0x88dd22,
      voltage: '13.8–14.4 V (output)',
      current: '30–80 A max output',
      desc:  'Belt-driven AC generator with internal rectifier. Charges the battery and powers all electrical loads while the engine is running.'
    },
    fuseBox: {
      name: 'Fuse Box',
      pos:  new THREE.Vector3(1.1, 0.28, -1.7),
      size: [0.58, 0.22, 0.52],
      baseColor:   0x0e1828,
      glowColor:   0x3366cc,
      voltage: '12 V (buss)',
      current: 'Sum of all circuits',
      desc:  'Central power distribution unit. Each circuit is protected by an individual blade fuse rated for the circuit\'s max current. Click \'Overload\' to blow a fuse.'
    },
    headlightL: {
      name: 'Headlight — Left',
      pos:  new THREE.Vector3(-1.52, 0.18, -3.22),
      size: [0.26, 0.16, 0.22],
      baseColor:   0x2a2a00,
      glowColor:   0xffee88,
      voltage: '12 V',
      current: '4.2 A (55 W halogen)',
      desc:  'Left halogen headlight assembly, 55 W H4 bulb. Positive feed from HDLT fuse, ground via chassis return. Illuminates the road ahead.'
    },
    headlightR: {
      name: 'Headlight — Right',
      pos:  new THREE.Vector3(1.52, 0.18, -3.22),
      size: [0.26, 0.16, 0.22],
      baseColor:   0x2a2a00,
      glowColor:   0xffee88,
      voltage: '12 V',
      current: '4.2 A (55 W halogen)',
      desc:  'Right halogen headlight assembly, 55 W H4 bulb. Positive feed from HDLT fuse, chassis ground return. Controlled by headlight switch.'
    },
    starter: {
      name: 'Starter Motor',
      pos:  new THREE.Vector3(0.0, 0.32, -2.85),
      size: [0.38, 0.34, 0.38],
      baseColor:   0x1a1a1a,
      glowColor:   0xff7733,
      voltage: '12 V',
      current: '80–150 A during crank',
      desc:  'High-torque DC motor that cranks the engine flywheel. Draws 80–150 A for 1–3 seconds. Direct heavy cable from battery positive; must have ignition ON via solenoid.'
    },
    horn: {
      name: 'Horn',
      pos:  new THREE.Vector3(0.0, 0.2, -3.38),
      size: [0.30, 0.16, 0.22],
      baseColor:   0x220808,
      glowColor:   0xff9966,
      voltage: '12 V',
      current: '3.0 A (36 W)',
      desc:  'Electromagnetic disc horn producing ~115 dB. Momentary circuit: pressing the horn button grounds the relay coil, completing the circuit through the HORN fuse.'
    },
    ignition: {
      name: 'Ignition Switch',
      pos:  new THREE.Vector3(0.55, 0.42, -0.98),
      size: [0.24, 0.22, 0.24],
      baseColor:   0x1a1200,
      glowColor:   0xffcc44,
      voltage: '12 V',
      current: '0.5 A (coil/relay only)',
      desc:  'Key-operated rotary switch on the steering column. Positions: LOCK → ACC → ON → START. Energises the ignition relay, enabling engine management and accessories.'
    },
    interiorLight: {
      name: 'Interior Light',
      pos:  new THREE.Vector3(0.0, 0.55, 0.25),
      size: [0.32, 0.08, 0.20],
      baseColor:   0x1a1500,
      glowColor:   0xffee99,
      voltage: '12 V',
      current: '0.8 A (10 W LED)',
      desc:  'Dome LED panel illuminating the passenger cabin. Activated when ignition is ON or door switch is open. Draws only 0.8 A due to LED efficiency.'
    }
  };

  /* ================================================================
     FUSE DEFINITIONS
     ================================================================ */
  var FUSES = [
    { id: 'headlights', label: 'HDLT',  amps: 15, circuit: 'headlights' },
    { id: 'ignition',   label: 'IGN',   amps: 10, circuit: 'ignition'   },
    { id: 'horn',       label: 'HORN',  amps: 10, circuit: 'horn'       },
    { id: 'interior',   label: 'INT',   amps:  5, circuit: 'interior'   },
    { id: 'acc',        label: 'ACC',   amps: 10, circuit: null         },
    { id: 'ecm',        label: 'ECM',   amps:  5, circuit: null         }
  ];

  /* ================================================================
     WIRE PATH DEFINITIONS
     Points: [x, y, z]
     circuits: which circuits make this wire "live"
     ================================================================ */
  var WIRE_DEFS = [
    /* Battery (+) → Fuse Box — main positive buss */
    {
      id: 'batt_to_fuse', color: 0xff2222, type: 'pos',
      circuits: ['headlights','horn','interior','ignition'],
      pts: [[-1.1,0.38,-2.4],[-0.4,0.38,-2.1],[0.2,0.38,-1.85],[1.1,0.38,-1.7]]
    },
    /* Battery (+) → Starter — heavy cranking cable */
    {
      id: 'batt_to_starter', color: 0xff5500, type: 'pos',
      circuits: ['starter'],
      pts: [[-1.1,0.36,-2.4],[-0.5,0.36,-2.65],[0.0,0.36,-2.85]]
    },
    /* Alternator → Battery — charging line */
    {
      id: 'alt_to_batt', color: 0xffcc00, type: 'charge',
      circuits: ['alternator'],
      pts: [[0.6,0.36,-2.35],[0.0,0.36,-2.28],[-0.6,0.36,-2.38],[-1.1,0.36,-2.4]]
    },
    /* Fuse Box → Headlight L */
    {
      id: 'fuse_to_hl_l', color: 0xff3333, type: 'pos',
      circuits: ['headlights'],
      pts: [[1.1,0.38,-1.7],[0.2,0.38,-2.05],[-0.8,0.36,-2.6],[-1.52,0.3,-3.22]]
    },
    /* Fuse Box → Headlight R */
    {
      id: 'fuse_to_hl_r', color: 0xff3333, type: 'pos',
      circuits: ['headlights'],
      pts: [[1.1,0.38,-1.7],[1.35,0.36,-2.2],[1.52,0.3,-3.22]]
    },
    /* Fuse Box → Horn */
    {
      id: 'fuse_to_horn', color: 0xff6622, type: 'pos',
      circuits: ['horn'],
      pts: [[1.1,0.38,-1.7],[0.55,0.36,-2.5],[0.0,0.36,-3.38]]
    },
    /* Fuse Box → Ignition Switch */
    {
      id: 'fuse_to_ign', color: 0xff3333, type: 'pos',
      circuits: ['ignition'],
      pts: [[1.1,0.36,-1.7],[0.8,0.36,-1.2],[0.55,0.44,-0.98]]
    },
    /* Ignition → Interior Light */
    {
      id: 'ign_to_int', color: 0xff4444, type: 'pos',
      circuits: ['interior'],
      pts: [[0.55,0.44,-0.98],[0.3,0.5,-0.5],[0.0,0.52,0.25]]
    },
    /* Chassis ground (dotted, dark) — from main components to body */
    {
      id: 'gnd_left', color: 0x333333, type: 'gnd',
      circuits: ['headlights','horn','interior','ignition','starter'],
      pts: [[-1.1,0.28,-2.4],[-1.52,0.12,-2.2],[-1.6,0.05,-1.0]]
    },
    {
      id: 'gnd_right', color: 0x333333, type: 'gnd',
      circuits: ['headlights'],
      pts: [[1.52,0.28,-3.22],[1.58,0.06,-2.5]]
    }
  ];

  /* ================================================================
     AREA LABELS (projected onto scene)
     ================================================================ */
  var AREA_LABELS = [
    { text: 'Engine Bay',  pos: new THREE.Vector3(0,  0.1, -2.35) },
    { text: 'Firewall',    pos: new THREE.Vector3(-1.0, 0.1, -1.38) },
    { text: 'Dashboard',   pos: new THREE.Vector3(-0.8, 0.45,-1.0) },
    { text: 'Cabin',       pos: new THREE.Vector3(0,  0.1,  0.8) },
    { text: 'Chassis GND', pos: new THREE.Vector3(-1.62, 0.1, -0.6) }
  ];

  /* ================================================================
     THREE.JS INIT
     ================================================================ */
  var renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('canvas'),
    antialias: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x07071a);
  scene.fog = new THREE.FogExp2(0x07071a, 0.03);

  var camera = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.1, 120);

  /* Lighting */
  scene.add(new THREE.AmbientLight(0x1a2840, 1.4));

  var dirLight = new THREE.DirectionalLight(0x6699bb, 0.9);
  dirLight.position.set(4, 10, 6);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  scene.add(dirLight);

  var fillLight = new THREE.PointLight(0x334466, 0.7, 18);
  fillLight.position.set(-3, 6, 4);
  scene.add(fillLight);

  /* ================================================================
     CAR CHASSIS GEOMETRY
     ================================================================ */
  function buildChassis() {
    var g = new THREE.Group();
    g.name = 'chassis';

    /* ── Floor panel ── */
    var floorMat = new THREE.MeshStandardMaterial({
      color: 0x0e0e26,
      metalness: 0.72,
      roughness: 0.38,
      emissive: 0x040412
    });
    var floor = new THREE.Mesh(new THREE.BoxGeometry(3.22, 0.07, 7.1), floorMat);
    floor.receiveShadow = true;
    g.add(floor);

    /* ── Side sill rails ── */
    var railMat = new THREE.MeshStandardMaterial({ color: 0x181830, metalness: 0.85, roughness: 0.25 });
    [-1.55, 1.55].forEach(function(x) {
      var r = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.16, 7.1), railMat);
      r.position.set(x, 0.045, 0);
      r.castShadow = true;
      g.add(r);
    });

    /* ── Front & rear crossmembers ── */
    var crossMat = new THREE.MeshStandardMaterial({ color: 0x181832, metalness: 0.8, roughness: 0.3 });
    [-3.47, 3.47].forEach(function(z) {
      var c = new THREE.Mesh(new THREE.BoxGeometry(3.42, 0.13, 0.13), crossMat);
      c.position.set(0, 0.04, z);
      g.add(c);
    });

    /* ── Firewall ── */
    var fwMat = new THREE.MeshStandardMaterial({ color: 0x141828, metalness: 0.55, roughness: 0.55 });
    var fw = new THREE.Mesh(new THREE.BoxGeometry(3.22, 0.55, 0.09), fwMat);
    fw.position.set(0, 0.275, -1.4);
    fw.castShadow = true;
    g.add(fw);

    /* ── Dashboard ── */
    var dashMat = new THREE.MeshStandardMaterial({
      color: 0x0c0c1e, metalness: 0.3, roughness: 0.75, emissive: 0x03030a
    });
    var dash = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.32, 0.09), dashMat);
    dash.position.set(0, 0.16, -1.08);
    g.add(dash);

    /* ── Engine bay floor tint ── */
    var eBayMat = new THREE.MeshStandardMaterial({ color: 0x0b0b20, emissive: 0x050510 });
    var eBay = new THREE.Mesh(new THREE.BoxGeometry(3.22, 0.01, 2.05), eBayMat);
    eBay.position.set(0, 0.04, -2.44);
    g.add(eBay);

    /* ── Wheel arches (approximate — dark circles at corners) ── */
    var archMat = new THREE.MeshStandardMaterial({ color: 0x070714, metalness: 0.4, roughness: 0.8 });
    [[-1.55,-2.5],[1.55,-2.5],[-1.55,2.5],[1.55,2.5]].forEach(function(xz) {
      var arch = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.52, 0.08, 20), archMat);
      arch.position.set(xz[0], 0.04, xz[1]);
      g.add(arch);
    });

    /* ── Glowing car-body outline ── */
    var outPts = [
      /* Traced outer perimeter with rounded corners approx */
      -1.65, 0.09, -3.1,
      -1.58, 0.09, -3.5,
       1.58, 0.09, -3.5,
       1.65, 0.09, -3.1,
       1.7,  0.09, -2.5,
       1.7,  0.09,  2.5,
       1.65, 0.09,  3.1,
       1.58, 0.09,  3.5,
      -1.58, 0.09,  3.5,
      -1.65, 0.09,  3.1,
      -1.7,  0.09,  2.5,
      -1.7,  0.09, -2.5,
      -1.65, 0.09, -3.1
    ];
    var outGeo = new THREE.BufferGeometry();
    outGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(outPts), 3));
    var outLine = new THREE.Line(outGeo, new THREE.LineBasicMaterial({ color: 0x223a66, linewidth: 1 }));
    g.add(outLine);

    /* ── Firewall glow line ── */
    var fwPts = new Float32Array([-1.58,0.09,-1.4, 1.58,0.09,-1.4]);
    var fwGeo = new THREE.BufferGeometry();
    fwGeo.setAttribute('position', new THREE.BufferAttribute(fwPts, 3));
    var fwLine = new THREE.Line(fwGeo, new THREE.LineBasicMaterial({ color: 0x2244aa }));
    g.add(fwLine);

    /* ── Circuit-board grid on floor ── */
    var grid = new THREE.GridHelper(8, 20, 0x0d1a30, 0x0a1020);
    grid.position.y = -0.04;
    g.add(grid);

    /* ── Chassis ground symbol (corner plate) ── */
    var gndMat = new THREE.MeshStandardMaterial({
      color: 0x0a2a0a, emissive: 0x003300, metalness: 0.4, roughness: 0.6
    });
    var gndPlate = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.025, 0.28), gndMat);
    gndPlate.position.set(-1.6, 0.038, -1.0);
    g.add(gndPlate);

    scene.add(g);
  }
  buildChassis();

  /* ================================================================
     COMPONENT MESHES
     ================================================================ */
  var meshes = {};   // compId → base mesh
  var glows  = {};   // compId → glow shell mesh
  var compGroups = {}; // compId → group (for position)

  function buildComponents() {
    Object.keys(COMP).forEach(function(id) {
      var def = COMP[id];
      var grp = new THREE.Group();
      grp.name = 'comp_' + id;
      grp.position.copy(def.pos);

      /* Base mesh */
      var geo = new THREE.BoxGeometry(def.size[0], def.size[1], def.size[2]);
      var mat = new THREE.MeshStandardMaterial({
        color: def.baseColor,
        metalness: 0.55,
        roughness: 0.5,
        emissive: 0x000000
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.compId = id;
      grp.add(mesh);

      /* Glow shell (BackSide + AdditiveBlending → halo around edges) */
      var glowGeo = new THREE.BoxGeometry(def.size[0]+0.08, def.size[1]+0.08, def.size[2]+0.08);
      var glowMat = new THREE.MeshBasicMaterial({
        color: def.glowColor,
        transparent: true,
        opacity: 0,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      var glowMesh = new THREE.Mesh(glowGeo, glowMat);
      glowMesh.userData.isGlow = true;
      grp.add(glowMesh);

      scene.add(grp);
      meshes[id]    = mesh;
      glows[id]     = glowMesh;
      compGroups[id] = grp;
    });

    /* Battery +/- terminals */
    var termGeo = new THREE.CylinderGeometry(0.042, 0.042, 0.09, 8);
    var pos = new THREE.Mesh(termGeo, new THREE.MeshBasicMaterial({ color: 0xff3333 }));
    pos.position.set(-0.88, 0.55, -2.28);
    scene.add(pos);
    var neg = new THREE.Mesh(termGeo, new THREE.MeshBasicMaterial({ color: 0x777777 }));
    neg.position.set(-1.35, 0.55, -2.28);
    scene.add(neg);

    /* Ground strap bolt on firewall */
    var boltGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.06, 6);
    var boltMat = new THREE.MeshBasicMaterial({ color: 0x00cc44 });
    var bolt = new THREE.Mesh(boltGeo, boltMat);
    bolt.position.set(-1.6, 0.06, -1.0);
    bolt.rotation.z = Math.PI / 2;
    scene.add(bolt);
  }
  buildComponents();

  /* ================================================================
     WIRE PATHS  (CatmullRomCurve3 + Line + Particles)
     ================================================================ */
  var wires = {}; // id → { line, curve, particles, active, def }

  function buildWires() {
    WIRE_DEFS.forEach(function(def) {
      var pts = def.pts.map(function(p) { return new THREE.Vector3(p[0], p[1], p[2]); });
      var curve = new THREE.CatmullRomCurve3(pts, false, 'chordal', 0.5);

      /* Line */
      var lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(64));
      var lineMat = new THREE.LineBasicMaterial({
        color: def.color,
        transparent: true,
        opacity: def.type === 'gnd' ? 0.18 : 0.38
      });
      var line = new THREE.Line(lineGeo, lineMat);
      scene.add(line);

      /* Particles */
      var pColor = def.type === 'charge' ? 0xffcc00 :
                   def.type === 'gnd'    ? 0x444444 : 0xff3333;
      var particles = [];
      var pGeo = new THREE.SphereGeometry(0.028, 5, 5);
      for (var i = 0; i < 9; i++) {
        var pMat = new THREE.MeshBasicMaterial({
          color: pColor, transparent: true, opacity: 0,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        var pm = new THREE.Mesh(pGeo, pMat);
        pm.visible = false;
        scene.add(pm);
        particles.push({ mesh: pm, t: i / 9, speed: 0.0042 + Math.random() * 0.002 });
      }

      wires[def.id] = { line: line, curve: curve, particles: particles, active: false, def: def };
    });
  }
  buildWires();

  /* ================================================================
     HEADLIGHT BEAMS
     ================================================================ */
  var beams = [];

  function buildHeadlightBeams() {
    [-1.3, 1.3].forEach(function(x) {
      var spot = new THREE.SpotLight(0xfff5cc, 0, 9, Math.PI / 6, 0.55, 1.2);
      spot.position.set(x, 1.6, -3.6);
      spot.target.position.set(x * 0.7, 0, -9);
      scene.add(spot);
      scene.add(spot.target);

      /* Visible cone */
      var cGeo = new THREE.ConeGeometry(1.1, 3.2, 16, 1, true);
      var cMat = new THREE.MeshBasicMaterial({
        color: 0xfff5cc, transparent: true, opacity: 0,
        side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false
      });
      var cone = new THREE.Mesh(cGeo, cMat);
      cone.rotation.x = Math.PI / 2;
      cone.position.set(x, 0.18, -5.0);
      scene.add(cone);

      beams.push({ spot: spot, cone: cone });
    });
  }
  buildHeadlightBeams();

  /* ================================================================
     CIRCUIT LOGIC
     ================================================================ */
  function isActive(circuit) {
    switch (circuit) {
      case 'headlights':  return S.headlights  && !S.fusesBlown.headlights;
      case 'ignition':    return S.ignition;
      case 'horn':        return S.horn        && !S.fusesBlown.horn;
      case 'interior':    return S.ignition    && !S.fusesBlown.interior;
      case 'starter':     return S.starter     && S.ignition;
      case 'alternator':  return S.engineRunning;
      default:            return false;
    }
  }

  function setGlow(id, on, baseOpacity) {
    if (!glows[id] || !meshes[id]) return;
    var def = COMP[id];
    var op  = on ? (baseOpacity !== undefined ? baseOpacity : 0.55) : 0;
    glows[id].material.opacity = op;
    if (on) {
      var c = new THREE.Color(def.glowColor);
      meshes[id].material.emissive.copy(c).multiplyScalar(0.22);
    } else {
      meshes[id].material.emissive.setHex(0x000000);
    }
  }

  function updateCircuits() {
    /* Wire opacity + particle visibility */
    WIRE_DEFS.forEach(function(def) {
      var wo = wires[def.id];
      var live = def.circuits.some(function(c) { return isActive(c); });
      wo.active = live;
      wo.line.material.opacity = live ? (def.type === 'gnd' ? 0.5 : 0.88)
                                      : (def.type === 'gnd' ? 0.14 : 0.32);
      var bright = live ? 0.85 : (def.type === 'gnd' ? 0x111111 : def.color);
      if (!live) wo.line.material.color.setHex(def.color);
      wo.particles.forEach(function(p) { p.mesh.visible = live; });
    });

    /* Component glows */
    setGlow('battery', true, 0.22);
    setGlow('alternator',    isActive('alternator'));
    setGlow('headlightL',    isActive('headlights'));
    setGlow('headlightR',    isActive('headlights'));
    setGlow('ignition',      isActive('ignition'));
    setGlow('horn',          isActive('horn'));
    setGlow('starter',       isActive('starter'));
    setGlow('interiorLight', isActive('interior'));
    setGlow('fuseBox', (isActive('headlights') || isActive('ignition')
                     || isActive('horn') || isActive('interior')), 0.3);

    /* Headlight beams */
    var hlon = isActive('headlights');
    beams.forEach(function(b) { b.spot.intensity = hlon ? 2.2 : 0; });

    updateInfoPanel();
    updateFuseUI();
  }

  function totalCurrent() {
    var t = 0;
    if (isActive('headlights'))  t += 8.4;
    if (isActive('ignition'))    t += 0.5;
    if (isActive('horn'))        t += 3.0;
    if (isActive('interior'))    t += 0.8;
    if (isActive('starter'))     t += 120;
    return t;
  }

  function updateInfoPanel() {
    var charging = isActive('alternator');
    document.getElementById('sv-battery').textContent = charging ? '13.8 V' : '12.6 V';
    var tc = totalCurrent();
    var cur = document.getElementById('sv-current');
    cur.textContent = tc.toFixed(1) + ' A';
    cur.className = tc > 80 ? 'val danger' : tc > 10 ? 'val warn' : 'val';
    var altEl = document.getElementById('sv-alt');
    altEl.textContent = charging ? 'Charging ▲' : 'Off';
    altEl.className = charging ? 'val' : 'val warn';

    var actives = [];
    if (isActive('headlights'))  actives.push('Headlights');
    if (isActive('ignition'))    actives.push('Ignition');
    if (isActive('horn'))        actives.push('Horn');
    if (isActive('starter'))     actives.push('Starter');
    if (isActive('interior'))    actives.push('Interior');
    if (isActive('alternator'))  actives.push('Alternator');

    var chips = document.getElementById('active-chips');
    if (actives.length === 0) {
      chips.innerHTML = '<span style="color:#3d5570">—</span>';
    } else {
      chips.innerHTML = actives.map(function(a) {
        return '<span class="chip">' + a + '</span>';
      }).join('');
    }
  }

  /* ================================================================
     FUSE UI
     ================================================================ */
  function initFuseUI() {
    var grid = document.getElementById('fuse-grid');
    grid.innerHTML = '';
    FUSES.forEach(function(f) {
      var el = document.createElement('div');
      el.className = 'fuse-slot';
      el.id = 'fs-' + f.id;
      el.innerHTML = '<div>' + f.label + '</div><div class="famp">' + f.amps + 'A</div>';
      grid.appendChild(el);
    });
  }
  initFuseUI();

  function updateFuseUI() {
    FUSES.forEach(function(f) {
      var el = document.getElementById('fs-' + f.id);
      if (!el) return;
      el.className = 'fuse-slot';
      if (f.circuit && S.fusesBlown[f.circuit]) {
        el.className = 'fuse-slot blown';
      } else if (f.circuit && isActive(f.circuit)) {
        el.className = 'fuse-slot active';
      }
    });
  }

  function closeFusePanel() {
    document.getElementById('fuse-panel').style.display = 'none';
  }

  /* ================================================================
     CONTROL HANDLERS  (exposed globally for onclick)
     ================================================================ */
  function toggleHeadlights() {
    if (S.fusesBlown.headlights) {
      notify('⚡ Headlight fuse blown!\nUse \'Fix Fuse\' to replace it.', 'danger');
      return;
    }
    S.headlights = !S.headlights;
    document.getElementById('btn-headlights').classList.toggle('active', S.headlights);
    updateCircuits();
  }
  window.toggleHeadlights = toggleHeadlights;

  function toggleIgnition() {
    S.ignition = !S.ignition;
    document.getElementById('btn-ignition').classList.toggle('active', S.ignition);
    if (!S.ignition) {
      S.starter = false;
      document.getElementById('btn-starter').classList.remove('active');
    }
    updateCircuits();
  }
  window.toggleIgnition = toggleIgnition;

  var hornTimer = null;
  function pressHorn() {
    if (S.horn) return;
    S.horn = true;
    document.getElementById('btn-horn').classList.add('active');
    updateCircuits();
    if (hornTimer) clearTimeout(hornTimer);
    hornTimer = setTimeout(function() {
      S.horn = false;
      document.getElementById('btn-horn').classList.remove('active');
      updateCircuits();
    }, 900);
  }
  window.pressHorn = pressHorn;

  var starterTimer = null;
  function crankStarter() {
    if (!S.ignition) { notify('🔑 Turn Ignition ON first!', 'warn'); return; }
    if (S.starter) return;
    S.starter = true;
    document.getElementById('btn-starter').classList.add('active');
    updateCircuits();
    if (starterTimer) clearTimeout(starterTimer);
    starterTimer = setTimeout(function() {
      S.starter = false;
      S.engineRunning = true;
      document.getElementById('btn-starter').classList.remove('active');
      updateCircuits();
      notify('🚗 Engine started!\nAlternator now charging at 13.8 V', 'success');
    }, 2200);
  }
  window.crankStarter = crankStarter;

  function overloadDemo() {
    if (S.fusesBlown.headlights) {
      /* Repair */
      S.fusesBlown.headlights = false;
      document.getElementById('btn-overload').textContent = '⚡ Overload';
      notify('🔧 Headlight fuse replaced.\nCircuit restored.', 'success');
    } else {
      /* Blow it */
      S.fusesBlown.headlights = true;
      S.headlights = false;
      document.getElementById('btn-headlights').classList.remove('active');
      document.getElementById('btn-overload').textContent = '🔧 Fix Fuse';
      notify('💥 HDLT fuse blown!\nHeadlights overloaded — circuit open.', 'danger');
    }
    updateCircuits();
  }
  window.overloadDemo = overloadDemo;

  /* ================================================================
     NOTIFICATION
     ================================================================ */
  var notifTimer = null;
  function notify(msg, type, dur) {
    var el = document.getElementById('notification');
    el.textContent = msg;
    el.style.display = 'block';
    var colors = {
      danger:  ['rgba(255,60,60,0.55)',   '#ff6666'],
      warn:    ['rgba(255,153,102,0.5)',   '#ff9966'],
      success: ['rgba(0,255,136,0.45)',    '#00ff88']
    };
    var c = colors[type] || colors.warn;
    el.style.borderColor = c[0];
    el.style.color = c[1];
    if (notifTimer) clearTimeout(notifTimer);
    notifTimer = setTimeout(function() { el.style.display = 'none'; }, dur || 3200);
  }

  /* ================================================================
     COMPONENT LABELS + AREA LABELS
     ================================================================ */
  var labelEls = {};
  var areaEls  = [];

  function buildLabels() {
    var lc = document.getElementById('labels-layer');
    var ac = document.getElementById('area-labels-layer');

    Object.keys(COMP).forEach(function(id) {
      var el = document.createElement('div');
      el.className = 'comp-label';
      el.textContent = COMP[id].name;
      lc.appendChild(el);
      labelEls[id] = el;
    });

    AREA_LABELS.forEach(function(al) {
      var el = document.createElement('div');
      el.className = 'area-label';
      el.textContent = al.text;
      ac.appendChild(el);
      areaEls.push({ el: el, pos: al.pos });
    });
  }
  buildLabels();

  function updateLabels() {
    Object.keys(COMP).forEach(function(id) {
      var el = labelEls[id];
      if (!el) return;
      var p = COMP[id].pos.clone();
      p.y += COMP[id].size[1] / 2 + 0.04;
      var v = p.project(camera);
      if (v.z > 1) { el.style.display = 'none'; return; }
      el.style.display = 'block';
      el.style.left = ((v.x * 0.5 + 0.5) * window.innerWidth)  + 'px';
      el.style.top  = ((-v.y * 0.5 + 0.5) * window.innerHeight) + 'px';
    });

    areaEls.forEach(function(a) {
      var v = a.pos.clone().project(camera);
      if (v.z > 1) { a.el.style.display = 'none'; return; }
      a.el.style.display = 'block';
      a.el.style.left = ((v.x * 0.5 + 0.5) * window.innerWidth)  + 'px';
      a.el.style.top  = ((-v.y * 0.5 + 0.5) * window.innerHeight) + 'px';
    });
  }

  /* ================================================================
     RAYCASTING — CLICK TO SELECT COMPONENT
     ================================================================ */
  var raycaster = new THREE.Raycaster();
  var mousePt   = new THREE.Vector2();
  var canvas    = document.getElementById('canvas');

  canvas.addEventListener('click', function(e) {
    if (e.target !== canvas) return;
    mousePt.x = (e.clientX / window.innerWidth)  *  2 - 1;
    mousePt.y = (e.clientY / window.innerHeight) * -2 + 1;
    raycaster.setFromCamera(mousePt, camera);
    var hits = raycaster.intersectObjects(Object.values(meshes), false);
    if (hits.length) {
      var id = hits[0].object.userData.compId;
      if (id === 'fuseBox') {
        var fp = document.getElementById('fuse-panel');
        fp.style.display = fp.style.display === 'block' ? 'none' : 'block';
        updateFuseUI();
      } else {
        showCompInfo(id);
      }
    } else {
      /* Click on empty space → hide component info */
      document.getElementById('component-info').style.display = 'none';
    }
  });

  function showCompInfo(id) {
    var def = COMP[id];
    if (!def) return;
    document.getElementById('ci-name').textContent  = def.name;
    document.getElementById('ci-volt').textContent  = def.voltage;
    document.getElementById('ci-curr').textContent  = def.current;
    document.getElementById('ci-desc').textContent  = def.desc;

    /* Dynamic status */
    var st = 'Standby';
    if (id === 'battery')      st = S.ignition ? (isActive('starter') ? 'Discharging (high)' : 'Discharging') : 'Idle';
    if (id === 'alternator')   st = isActive('alternator') ? '✔ Charging' : 'Off (engine stopped)';
    if (id === 'fuseBox')      st = 'Distributing power';
    if (id === 'headlightL' || id === 'headlightR') st = isActive('headlights') ? '✔ ON' : S.fusesBlown.headlights ? '✘ Fuse Blown' : 'Off';
    if (id === 'ignition')     st = S.ignition ? '✔ ON' : 'Off';
    if (id === 'horn')         st = isActive('horn') ? '✔ ACTIVE' : 'Off';
    if (id === 'starter')      st = isActive('starter') ? '✔ CRANKING' : 'Off';
    if (id === 'interiorLight')st = isActive('interior') ? '✔ ON' : S.fusesBlown.interior ? '✘ Fuse Blown' : 'Off';

    document.getElementById('ci-status').textContent = st;
    document.getElementById('component-info').style.display = 'block';
  }

  /* ================================================================
     ORBIT CONTROLS  (manual mouse drag)
     ================================================================ */
  var orbit = {
    theta:  0,
    phi:    0.80,
    radius: 14.5,
    target: new THREE.Vector3(0, 0, -0.5),
    dragging: false,
    px: 0, py: 0
  };

  function applyOrbit() {
    var sinP = Math.sin(orbit.phi);
    var cosP = Math.cos(orbit.phi);
    camera.position.set(
      orbit.target.x + orbit.radius * sinP * Math.sin(orbit.theta),
      orbit.target.y + orbit.radius * cosP,
      orbit.target.z + orbit.radius * sinP * Math.cos(orbit.theta)
    );
    camera.lookAt(orbit.target);
  }
  applyOrbit();

  canvas.addEventListener('mousedown', function(e) {
    if (e.target !== canvas) return;
    orbit.dragging = true;
    orbit.px = e.clientX;
    orbit.py = e.clientY;
  });
  window.addEventListener('mouseup',   function() { orbit.dragging = false; });
  window.addEventListener('mousemove', function(e) {
    if (!orbit.dragging) return;
    var dx = e.clientX - orbit.px;
    var dy = e.clientY - orbit.py;
    orbit.px = e.clientX;
    orbit.py = e.clientY;
    orbit.theta -= dx * 0.009;
    orbit.phi = Math.max(0.12, Math.min(Math.PI * 0.47, orbit.phi + dy * 0.009));
    applyOrbit();
  });
  canvas.addEventListener('wheel', function(e) {
    orbit.radius = Math.max(5.5, Math.min(24, orbit.radius + e.deltaY * 0.022));
    applyOrbit();
  });

  /* Touch support for iframe/mobile */
  var touch0 = null;
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      orbit.dragging = true;
      orbit.px = e.touches[0].clientX;
      orbit.py = e.touches[0].clientY;
      touch0 = null;
    } else if (e.touches.length === 2) {
      orbit.dragging = false;
      touch0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && orbit.dragging) {
      var dx = e.touches[0].clientX - orbit.px;
      var dy = e.touches[0].clientY - orbit.py;
      orbit.px = e.touches[0].clientX;
      orbit.py = e.touches[0].clientY;
      orbit.theta -= dx * 0.009;
      orbit.phi = Math.max(0.12, Math.min(Math.PI * 0.47, orbit.phi + dy * 0.009));
      applyOrbit();
    } else if (e.touches.length === 2 && touch0 !== null) {
      var d1 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      orbit.radius = Math.max(5.5, Math.min(24, orbit.radius - (d1 - touch0) * 0.04));
      touch0 = d1;
      applyOrbit();
    }
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', function() { orbit.dragging = false; touch0 = null; });

  /* ================================================================
     ANIMATION LOOP
     ================================================================ */
  var frame = 0;

  function animate() {
    requestAnimationFrame(animate);
    frame++;

    /* ── Particle animation ── */
    WIRE_DEFS.forEach(function(def) {
      var wo = wires[def.id];
      if (!wo.active) return;
      var spd = def.type === 'gnd' ? 0.0018 : def.type === 'charge' ? 0.003 : 0.005;
      wo.particles.forEach(function(p) {
        p.t = (p.t + p.speed) % 1;
        wo.curve.getPoint(p.t, p.mesh.position);
        p.mesh.material.opacity = 0.75 + Math.sin(frame * 0.18 + p.t * 22) * 0.2;
      });
    });

    /* ── Headlight flicker ── */
    if (isActive('headlights')) {
      var flicker = 2.15 + Math.sin(frame * 0.07) * 0.12;
      beams.forEach(function(b) { b.spot.intensity = flicker; });
      /* Beam cone */
      beams.forEach(function(b) {
        b.cone.material.opacity = 0.055 + Math.sin(frame * 0.09) * 0.015;
      });
    } else {
      beams.forEach(function(b) { b.cone.material.opacity = 0; });
    }

    /* ── Component glow pulse ── */
    Object.keys(glows).forEach(function(id) {
      var gm = glows[id];
      if (gm.material.opacity <= 0.01) return;
      var base = id === 'battery' ? 0.18 : id === 'interiorLight' ? 0.42 : 0.50;
      gm.material.opacity = base + Math.sin(frame * 0.055 + id.length * 0.8) * 0.1;
    });

    /* ── Starter motor vibration ── */
    if (isActive('starter') && compGroups.starter) {
      compGroups.starter.position.x = COMP.starter.pos.x + (Math.random() - 0.5) * 0.018;
      compGroups.starter.position.z = COMP.starter.pos.z + (Math.random() - 0.5) * 0.018;
    } else if (compGroups.starter) {
      compGroups.starter.position.copy(COMP.starter.pos);
    }

    /* ── Alternator spin hint (very subtle y-rotation on mesh) ── */
    if (isActive('alternator') && meshes.alternator) {
      meshes.alternator.rotation.y += 0.04;
    }

    updateLabels();
    renderer.render(scene, camera);
  }

  /* ================================================================
     RESIZE
     ================================================================ */
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    applyOrbit();
  });

  /* ================================================================
     BOOT
     ================================================================ */
  updateCircuits();
  animate();

  console.log('[CircuiTry3D] Automotive Circuit Simulator ready.');

  </script>
</body>
</html>
