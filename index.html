    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        touch-action: pan-x pan-y;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: "Inter", "Poppins", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #050b1f;
        color: #ffffff;
        overscroll-behavior: none;
      }

      #root {
        width: 100%;
        height: 100vh;
        overscroll-behavior: contain;
      }

      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        background: radial-gradient(125% 125% at 50% 10%, rgba(47, 84, 235, 0.25) 0%, rgba(9, 17, 43, 0.85) 45%, #050b1f 100%);
      }

      .loader-wordmark {
        font-size: 2.4rem;
        font-weight: 900;
        letter-spacing: -0.015em;
        display: inline-flex;
        gap: 4px;
        filter: drop-shadow(0 0 22px rgba(40, 255, 190, 0.4));
      }

      .loader-wordmark .brand-blue {
        color: #88ccff;
        text-shadow: 0 0 18px rgba(136, 204, 255, 0.7), 0 0 34px rgba(136, 204, 255, 0.55);
      }

      .loader-wordmark .brand-orange {
        color: #ff8844;
        text-shadow: 0 0 16px rgba(255, 136, 68, 0.65), 0 0 30px rgba(255, 136, 68, 0.55);
      }

      .loader-wordmark .brand-green {
        color: #00ff88;
        text-shadow: 0 0 18px rgba(0, 255, 136, 0.7), 0 0 34px rgba(0, 255, 136, 0.55);
      }

      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(136, 204, 255, 0.2);
        border-top-color: #88ccff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loader-status {
        color: rgba(136, 204, 255, 0.75);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        margin-top: 10px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="loader-wordmark">
          <span class="brand-blue">Circui</span>
          <span class="brand-orange">Try</span>
          <span class="brand-green">3D</span>
        </div>
        <div class="loader-spinner"></div>
        <div class="loader-status">Initializing...</div>
      </div>
      <div id="loader-status" style="color: rgba(136, 204, 255, 0.6); font-size: 0.9rem; margin-top: 10px;">Initializing...</div>
    </div>
    <div id="root"></div>

    <!-- Plain (non-module) fallback script — runs synchronously before the
         module bundle loads, so it is always registered regardless of network
         conditions.  Provides a "please refresh" message after 10 s when the
         bundle is taking unusually long, and removes the loader entirely after
         20 s so the user is never permanently stuck. -->
    <script>
      (function () {
        var loaderEl = document.getElementById('initial-loader');
        var statusEl = document.getElementById('loader-status');

        // Listen for the app-ready signal dispatched by main.tsx / App.tsx.
        document.addEventListener('ctapp:ready', function () {
          if (loaderEl) {
            loaderEl.style.transition = 'opacity 0.3s ease';
            loaderEl.style.opacity = '0';
            setTimeout(function () {
              if (loaderEl && loaderEl.parentNode) loaderEl.parentNode.removeChild(loaderEl);
            }, 320);
          }
        }, { once: true });

        // After 10 s without a ready signal, update the status text so the
        // user knows the load is taking longer than expected.
        var slowTimer = setTimeout(function () {
          if (statusEl) {
            statusEl.textContent = 'Still loading\u2026 please check your connection.';
            statusEl.style.color = 'rgba(255, 180, 80, 0.85)';
          }
        }, 10000);

        // After 20 s, force-remove the loader and show a refresh prompt so
        // the user is never stuck on the loading screen indefinitely.
        setTimeout(function () {
          clearTimeout(slowTimer);
          if (!loaderEl) return;
          if (statusEl) {
            statusEl.textContent = 'Unable to load \u2014 please refresh the page.';
            statusEl.style.color = 'rgba(255, 100, 80, 0.9)';
          }
          // Add a visible refresh button
          var btn = document.createElement('button');
          btn.textContent = 'Refresh';
          btn.style.cssText = 'margin-top:18px;padding:10px 28px;background:#00ff88;color:#0a0a1a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.06em;';
          btn.onclick = function () { window.location.reload(); };
          loaderEl.appendChild(btn);
        }, 20000);
      })();
    </script>

    <script type="module" src="src/main.tsx"></script>
  </body>
