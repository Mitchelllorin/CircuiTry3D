<!DOCTYPE html>
<html>
<head>
    <title>Current Flow Direct Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: monospace; background: #0a0a0a; color: #0f0; }
        #canvas { width: 100%; height: 400px; background: #000; border: 2px solid #0f0; }
        #status { margin-top: 20px; padding: 10px; background: #111; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <h2>⚡ Current Flow Animation Direct Test</h2>
    <div id="canvas"></div>
    <div id="status">
        <div id="test-results"></div>
        <button onclick="startFlow()" style="margin-top:10px; padding:10px; background:#0f0; color:#000; border:none; cursor:pointer;">
            ▶ Start Current Flow Animation
        </button>
    </div>
    
    <script>
        const results = [];
        
        // Test 1: Check Three.js
        if (typeof THREE !== 'undefined') {
            results.push('✅ Three.js loaded');
        } else {
            results.push('❌ Three.js NOT loaded');
        }
        
        // Setup scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 800/400, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(800, 400);
        document.getElementById('canvas').appendChild(renderer.domElement);
        
        camera.position.z = 5;
        
        // Create a wire (line)
        const wireGeometry = new THREE.BufferGeometry();
        const wirePoints = new Float32Array([
            -3, 0, 0,  // start
            3, 0, 0    // end
        ]);
        wireGeometry.setAttribute('position', new THREE.BufferAttribute(wirePoints, 3));
        const wireMaterial = new THREE.LineBasicMaterial({ color: 0x00ff88 });
        const wire = new THREE.Line(wireGeometry, wireMaterial);
        scene.add(wire);
        
        // Add ambient light
        const light = new THREE.AmbientLight(0x404040);
        scene.add(light);
        
        results.push('✅ 3D scene created');
        results.push('✅ Wire created (green line)');
        
        // Create particles
        const particles = [];
        let animationRunning = false;
        
        function createParticle(x) {
            const geometry = new THREE.SphereGeometry(0.1, 8, 8);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x88ccff,  // Blue - low current
                transparent: true,
                opacity: 0.8
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, 0, 0);
            scene.add(sphere);
            return { mesh: sphere, x: x, speed: 0.02 };
        }
        
        function startFlow() {
            if (animationRunning) return;
            animationRunning = true;
            
            // Create 5 particles along the wire
            for (let i = 0; i < 5; i++) {
                particles.push(createParticle(-3 + (i * 1.2)));
            }
            
            results.push('✅ Current flow animation STARTED');
            results.push(`   Created ${particles.length} particles`);
            document.getElementById('test-results').innerHTML = '<pre>' + results.join('\n') + '</pre>';
            
            animate();
        }
        
        function animate() {
            if (!animationRunning) return;
            requestAnimationFrame(animate);
            
            // Move particles along the wire
            particles.forEach(p => {
                p.x += p.speed;
                if (p.x > 3) p.x = -3;  // wrap around
                p.mesh.position.x = p.x;
                
                // Color shift based on position
                const t = (p.x + 3) / 6;  // 0 to 1
                if (t < 0.5) {
                    // Blue to Orange
                    const blend = t / 0.5;
                    p.mesh.material.color.setHex(
                        blend < 0.5 
                            ? 0x88ccff  // Blue
                            : 0xff8844  // Orange
                    );
                } else {
                    // Orange to Green
                    p.mesh.material.color.setHex(0x00ff88);  // Green
                }
            });
            
            renderer.render(scene, camera);
        }
        
        // Initial render
        renderer.render(scene, camera);
        
        // Display results
        results.push('');
        results.push('🎯 READY TO TEST');
        results.push('Click "Start Current Flow Animation" button');
        results.push('');
        results.push('Expected: Blue → Orange → Green particles moving along wire');
        document.getElementById('test-results').innerHTML = '<pre>' + results.join('\n') + '</pre>';
    </script>
</body>
</html>
